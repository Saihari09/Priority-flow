<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>PriorityFlow — Task Scheduler</title>
    <!-- PWA / Homescreen -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="PriorityFlow">
    <meta name="theme-color" content="#5B5BFF" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0F0F1E" media="(prefers-color-scheme: dark)">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%235B5BFF' width='100' height='100' rx='22'/><text x='50' y='68' font-size='52' text-anchor='middle' fill='white'>P</text></svg>">
    <link rel="manifest" href="manifest.json">
    <link href="https://api.fontshare.com/css?f[]=satoshi@400,500,600,700&f[]=cabinet-grotesk@500,600,700" rel="stylesheet">
    <style>
/* ============= ROOT & VARIABLES ============= */
:root {
    --c-primary: #5B5BFF;
    --c-primary-light: #7B7BFF;
    --c-primary-dark: #4A4AE6;
    --c-primary-bg: rgba(91,91,255,0.08);
    --c-success: #10B981;
    --c-success-bg: rgba(16,185,129,0.1);
    --c-warning: #F59E0B;
    --c-warning-bg: rgba(245,158,11,0.1);
    --c-danger: #EF4444;
    --c-danger-bg: rgba(239,68,68,0.1);
    --c-text: #1F2937;
    --c-text-muted: #6B7280;
    --c-border: #E5E7EB;
    --c-bg: #FFFFFF;
    --c-surface: #F9FAFB;
    --c-surface-hover: #F3F4F6;
    --c-shadow: rgba(0,0,0,0.08);
    --c-celebrate-1: #FFD700;
    --c-celebrate-2: #FF6B6B;
    --c-celebrate-3: #4ECDC4;
    --font-body: 'Satoshi', -apple-system, sans-serif;
    --font-display: 'Cabinet Grotesk', -apple-system, sans-serif;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-xs: 6px;
    --transition: all 0.2s ease;
}
[data-theme="dark"] {
    --c-text: #F3F4F6;
    --c-text-muted: #9CA3AF;
    --c-border: #374151;
    --c-bg: #0F0F1E;
    --c-surface: #1A1A2E;
    --c-surface-hover: #242442;
    --c-shadow: rgba(0,0,0,0.3);
    --c-primary-bg: rgba(91,91,255,0.15);
    --c-success-bg: rgba(16,185,129,0.15);
    --c-warning-bg: rgba(245,158,11,0.15);
    --c-danger-bg: rgba(239,68,68,0.15);
}

/* ============= RESET ============= */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; font-family: var(--font-body); color: var(--c-text); background: var(--c-bg); transition: background 0.3s, color 0.3s; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea { font-family: inherit; color: inherit; }
a { color: var(--c-primary); text-decoration: none; }

/* ============= APP LAYOUT ============= */
.app { display: flex; height: 100vh; overflow: hidden; }
.sidebar {
    width: 280px; min-width: 280px; background: var(--c-surface);
    border-right: 1px solid var(--c-border); display: flex; flex-direction: column;
    overflow-y: auto; padding: 1.25rem 1rem; gap: 1.25rem;
}
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.topbar {
    background: var(--c-bg); border-bottom: 1px solid var(--c-border);
    padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
}
.content { flex: 1; overflow-y: auto; padding: 1.5rem; }

/* ============= SIDEBAR ============= */
.sidebar__section { margin-bottom: 0.25rem; }
.sidebar__label {
    font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--c-text-muted); margin-bottom: 0.5rem; padding: 0 0.25rem;
}
.sidebar__sync {
    display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem;
    border-radius: var(--radius-sm); margin-bottom: 0.5rem;
}
.sidebar__avatar {
    width: 36px; height: 36px; border-radius: 50%; background: var(--c-primary-bg);
    display: flex; align-items: center; justify-content: center; font-weight: 700;
    font-size: 0.85rem; color: var(--c-primary); overflow: hidden;
}
.sidebar__avatar img { width: 100%; height: 100%; object-fit: cover; }
.sidebar__user { flex: 1; min-width: 0; }
.sidebar__username { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar__sync-status { font-size: 0.75rem; color: var(--c-text-muted); display: flex; align-items: center; gap: 0.35rem; cursor: pointer; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--c-border); transition: var(--transition); }
.sync-dot.connected { background: var(--c-success); }
.sync-dot.syncing { background: var(--c-warning); animation: pulse 1s infinite; }
.sync-dot.error { background: var(--c-danger); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

/* Sidebar: Today's Key Tasks */
.key-task { display: flex; align-items: flex-start; gap: 0.5rem; padding: 0.4rem 0.25rem; border-radius: var(--radius-xs); cursor: pointer; transition: var(--transition); }
.key-task:hover { background: var(--c-surface-hover); }
.key-task__check { width: 16px; height: 16px; border: 2px solid var(--c-border); border-radius: 4px; flex-shrink: 0; margin-top: 2px; transition: var(--transition); display: flex; align-items: center; justify-content: center; }
.key-task__check.done { background: var(--c-success); border-color: var(--c-success); color: #fff; }
.key-task__title { font-size: 0.85rem; line-height: 1.3; flex: 1; }
.key-task__title.done { text-decoration: line-through; color: var(--c-text-muted); }
.key-task__score { font-size: 0.7rem; font-weight: 700; color: var(--c-primary); background: var(--c-primary-bg); padding: 0.1rem 0.4rem; border-radius: 4px; flex-shrink: 0; }

/* Sidebar: Habits */
.habit-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.35rem 0.25rem; font-size: 0.85rem; }
.habit-item__streak { font-weight: 700; color: var(--c-warning); font-size: 0.8rem; margin-left: auto; }

/* Sidebar: Review Dots */
.review-dots { display: flex; gap: 0.35rem; padding: 0.25rem; }
.review-dot {
    width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--c-border);
    display: flex; align-items: center; justify-content: center; font-size: 0.6rem;
    font-weight: 700; color: var(--c-text-muted); transition: var(--transition);
}
.review-dot.done { background: var(--c-success-bg); border-color: var(--c-success); color: var(--c-success); }
.review-dot.today { border-color: var(--c-primary); color: var(--c-primary); }

/* ============= TOPBAR ============= */
.topbar__brand { font-family: var(--font-display); font-size: 1.35rem; font-weight: 700; white-space: nowrap; }
.topbar__tabs { display: flex; gap: 0.25rem; margin-left: 1rem; }
.topbar__tab {
    padding: 0.4rem 0.85rem; border-radius: var(--radius-xs); font-size: 0.85rem;
    font-weight: 500; color: var(--c-text-muted); transition: var(--transition);
}
.topbar__tab:hover { background: var(--c-surface); }
.topbar__tab.active { background: var(--c-primary-bg); color: var(--c-primary); font-weight: 600; }
.topbar__spacer { flex: 1; }
.topbar__search {
    padding: 0.4rem 0.75rem; border: 1px solid var(--c-border); border-radius: var(--radius-sm);
    background: var(--c-surface); font-size: 0.85rem; width: 200px; outline: none; transition: var(--transition);
}
.topbar__search:focus { border-color: var(--c-primary); box-shadow: 0 0 0 3px var(--c-primary-bg); }
.topbar__actions { display: flex; gap: 0.5rem; align-items: center; }

/* ============= BUTTONS ============= */
.btn {
    padding: 0.45rem 1rem; border-radius: var(--radius-sm); font-size: 0.85rem;
    font-weight: 600; transition: var(--transition); display: inline-flex; align-items: center; gap: 0.4rem;
}
.btn--primary { background: var(--c-primary); color: #fff; }
.btn--primary:hover { background: var(--c-primary-dark); }
.btn--secondary { background: var(--c-surface); border: 1px solid var(--c-border); }
.btn--secondary:hover { background: var(--c-surface-hover); }
.btn--danger { background: var(--c-danger-bg); color: var(--c-danger); }
.btn--danger:hover { background: var(--c-danger); color: #fff; }
.btn--ghost { color: var(--c-text-muted); }
.btn--ghost:hover { color: var(--c-text); background: var(--c-surface); }
.btn--sm { padding: 0.3rem 0.65rem; font-size: 0.8rem; }
.btn--icon { padding: 0.4rem; font-size: 1.1rem; border-radius: var(--radius-xs); }
.btn--icon:hover { background: var(--c-surface-hover); }

/* ============= FILTERS ============= */
.filters { display: flex; gap: 0.35rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
.filter-btn {
    padding: 0.35rem 0.75rem; border-radius: 20px; font-size: 0.8rem;
    font-weight: 500; color: var(--c-text-muted); border: 1px solid var(--c-border); transition: var(--transition);
}
.filter-btn:hover { background: var(--c-surface-hover); }
.filter-btn.active { background: var(--c-primary); color: #fff; border-color: var(--c-primary); }

/* ============= TASK CARDS ============= */
.task-list { display: flex; flex-direction: column; gap: 0.5rem; }
.task-card {
    background: var(--c-surface); border: 1px solid var(--c-border); border-radius: var(--radius);
    padding: 0.85rem 1rem; display: flex; align-items: flex-start; gap: 0.75rem;
    transition: var(--transition); cursor: default;
}
.task-card:hover { border-color: var(--c-primary-light); box-shadow: 0 2px 8px var(--c-shadow); }
.task-card.done { opacity: 0.5; }
.task-card.dragging { opacity: 0.4; transform: scale(0.98); }
.task-card__check {
    width: 20px; height: 20px; border: 2px solid var(--c-border); border-radius: 6px;
    flex-shrink: 0; margin-top: 1px; cursor: pointer; transition: var(--transition);
    display: flex; align-items: center; justify-content: center; font-size: 0.7rem;
}
.task-card__check:hover { border-color: var(--c-success); }
.task-card__check.done { background: var(--c-success); border-color: var(--c-success); color: #fff; }
.task-card__body { flex: 1; min-width: 0; }
.task-card__title { font-weight: 600; font-size: 0.95rem; line-height: 1.3; }
.task-card__title.done { text-decoration: line-through; color: var(--c-text-muted); }
.task-card__notes { font-size: 0.8rem; color: var(--c-text-muted); margin-top: 0.2rem; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-card__meta { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.45rem; }
.badge {
    font-size: 0.7rem; font-weight: 600; padding: 0.15rem 0.5rem; border-radius: 20px;
    display: inline-flex; align-items: center; gap: 0.25rem;
}
.badge--score { background: var(--c-primary-bg); color: var(--c-primary); }
.badge--category { background: var(--c-surface-hover); color: var(--c-text-muted); }
.badge--duration { background: var(--c-warning-bg); color: var(--c-warning); }
.badge--recurrence { background: var(--c-success-bg); color: var(--c-success); }
.badge--streak { background: var(--c-warning-bg); color: var(--c-warning); }
.badge--day { background: var(--c-primary-bg); color: var(--c-primary); }

/* Subtask progress */
.subtask-bar { width: 100%; height: 4px; background: var(--c-border); border-radius: 2px; margin-top: 0.45rem; overflow: hidden; }
.subtask-bar__fill { height: 100%; background: var(--c-success); border-radius: 2px; transition: width 0.3s; }

/* Task card actions */
.task-card__actions { display: flex; gap: 0.25rem; flex-shrink: 0; opacity: 0; transition: var(--transition); }
.task-card:hover .task-card__actions { opacity: 1; }

/* ============= EISENHOWER GRID ============= */
.eisenhower-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.quadrant {
    background: var(--c-surface); border: 1px solid var(--c-border); border-radius: var(--radius);
    padding: 1rem; min-height: 200px;
}
.quadrant__header { font-weight: 700; font-size: 0.85rem; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
.quadrant__dot { width: 10px; height: 10px; border-radius: 50%; }
.quadrant--do .quadrant__dot { background: var(--c-danger); }
.quadrant--schedule .quadrant__dot { background: var(--c-warning); }
.quadrant--delegate .quadrant__dot { background: var(--c-primary); }
.quadrant--eliminate .quadrant__dot { background: var(--c-text-muted); }
.quadrant__tasks { display: flex; flex-direction: column; gap: 0.35rem; min-height: 60px; }
.quadrant.drag-over { background: var(--c-primary-bg); border-color: var(--c-primary); }

/* ============= PLANNER VIEW ============= */
.planner-grid { display: flex; flex-direction: column; gap: 0.25rem; }
.planner-slot {
    display: flex; align-items: stretch; gap: 0.5rem; padding: 0.35rem 0;
    border-bottom: 1px solid var(--c-border);
}
.planner-slot__time { width: 60px; font-size: 0.8rem; font-weight: 600; color: var(--c-text-muted); padding-top: 0.25rem; flex-shrink: 0; }
.planner-slot__task { flex: 1; min-height: 32px; border-radius: var(--radius-xs); padding: 0.25rem 0.5rem; font-size: 0.85rem; }
.planner-slot__task.has-task { background: var(--c-primary-bg); color: var(--c-primary); font-weight: 500; cursor: pointer; }
.planner-slot__task.empty { border: 1px dashed var(--c-border); color: var(--c-text-muted); font-size: 0.8rem; display: flex; align-items: center; }

/* ============= OVERVIEW VIEW ============= */
.overview-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
.stat-card {
    background: var(--c-surface); border: 1px solid var(--c-border); border-radius: var(--radius);
    padding: 1.25rem; text-align: center;
}
.stat-card__value { font-family: var(--font-display); font-size: 2rem; font-weight: 700; color: var(--c-primary); }
.stat-card__label { font-size: 0.8rem; color: var(--c-text-muted); margin-top: 0.25rem; font-weight: 500; }
.weekly-chart { display: flex; align-items: flex-end; gap: 0.5rem; height: 120px; padding: 1rem; background: var(--c-surface); border: 1px solid var(--c-border); border-radius: var(--radius); }
.weekly-chart__bar { flex: 1; background: var(--c-primary-bg); border-radius: 4px 4px 0 0; transition: height 0.5s; position: relative; min-height: 4px; }
.weekly-chart__bar--today { background: var(--c-primary); }
.weekly-chart__label { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); font-size: 0.65rem; color: var(--c-text-muted); font-weight: 600; }

/* ============= MODALS ============= */
.modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center; z-index: 1000;
    animation: fadeIn 0.2s ease;
}
.modal {
    background: var(--c-bg); border-radius: var(--radius); width: 90%; max-width: 520px;
    max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px var(--c-shadow);
    animation: slideUp 0.25s ease;
}
.modal__header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--c-border); display: flex; align-items: center; justify-content: space-between; }
.modal__title { font-family: var(--font-display); font-weight: 700; font-size: 1.15rem; }
.modal__body { padding: 1.5rem; }
.modal__footer { padding: 1rem 1.5rem; border-top: 1px solid var(--c-border); display: flex; justify-content: flex-end; gap: 0.5rem; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

/* ============= FORM ELEMENTS ============= */
.form-group { margin-bottom: 1rem; }
.form-label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 0.35rem; color: var(--c-text-muted); }
.form-input, .form-select, .form-textarea {
    width: 100%; padding: 0.5rem 0.75rem; border: 1px solid var(--c-border); border-radius: var(--radius-sm);
    background: var(--c-surface); font-size: 0.9rem; outline: none; transition: var(--transition);
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--c-primary); box-shadow: 0 0 0 3px var(--c-primary-bg); }
.form-textarea { resize: vertical; min-height: 60px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
.form-range { width: 100%; accent-color: var(--c-primary); }
.form-hint { font-size: 0.75rem; color: var(--c-text-muted); margin-top: 0.25rem; }

/* ============= MORNING FLOW ============= */
.morning-overlay {
    position: fixed; inset: 0; background: var(--c-bg); z-index: 2000;
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.5s ease;
}
.morning { text-align: center; max-width: 480px; padding: 2rem; }
.morning__greeting { font-family: var(--font-display); font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
.morning__subtitle { color: var(--c-text-muted); margin-bottom: 2rem; }
.morning__moods { display: flex; gap: 0.75rem; justify-content: center; margin-bottom: 1.5rem; }
.mood-btn {
    width: 52px; height: 52px; font-size: 1.5rem; border-radius: 50%;
    border: 2px solid var(--c-border); display: flex; align-items: center; justify-content: center;
    transition: var(--transition); cursor: pointer;
}
.mood-btn:hover, .mood-btn.selected { border-color: var(--c-primary); background: var(--c-primary-bg); transform: scale(1.15); }
.morning__energy-label { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; }
.morning__energy-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; justify-content: center; }
.morning__energy-val { font-weight: 700; font-size: 1.1rem; color: var(--c-primary); width: 24px; }
.morning__intention {
    width: 100%; padding: 0.75rem 1rem; border: 2px solid var(--c-border); border-radius: var(--radius);
    background: transparent; font-size: 1rem; text-align: center; outline: none; transition: var(--transition); margin-bottom: 1.5rem;
}
.morning__intention:focus { border-color: var(--c-primary); }
.morning__actions { display: flex; gap: 0.75rem; justify-content: center; }

/* Intention Banner */
.intention-banner {
    background: var(--c-primary-bg); border: 1px solid rgba(91,91,255,0.2); border-radius: var(--radius);
    padding: 0.65rem 1rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;
}
.intention-banner__icon { font-size: 1.1rem; }
.intention-banner__label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--c-primary); letter-spacing: 0.05em; }
.intention-banner__text { font-size: 0.9rem; font-weight: 500; }

/* ============= POMODORO ============= */
.pomodoro-modal { text-align: center; padding: 2rem 1.5rem; }
.pomodoro-circle { position: relative; width: 180px; height: 180px; margin: 0 auto 1.5rem; }
.pomodoro-circle svg { transform: rotate(-90deg); }
.pomodoro-circle__track { fill: none; stroke: var(--c-border); stroke-width: 6; }
.pomodoro-circle__progress { fill: none; stroke: var(--c-primary); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
.pomodoro-time { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.pomodoro-time__value { font-family: var(--font-display); font-size: 2.5rem; font-weight: 700; }
.pomodoro-time__label { font-size: 0.8rem; color: var(--c-text-muted); }
.pomodoro-task-title { font-weight: 600; margin-bottom: 0.5rem; }
.pomodoro-stats { font-size: 0.85rem; color: var(--c-text-muted); margin-bottom: 1.25rem; }

/* ============= TOAST ============= */
.toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 3000; display: flex; flex-direction: column-reverse; gap: 0.5rem; pointer-events: none; }
.toast {
    background: var(--c-bg); border: 1px solid var(--c-border); border-left: 4px solid var(--c-primary);
    border-radius: var(--radius-sm); padding: 0.85rem 1.25rem; box-shadow: 0 8px 30px var(--c-shadow);
    animation: toastIn 0.35s ease, toastOut 0.35s ease 3.65s forwards;
    font-weight: 600; font-size: 0.9rem; pointer-events: auto; max-width: 320px;
}
.toast--success { border-left-color: var(--c-success); }
.toast--warning { border-left-color: var(--c-warning); }
@keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(10px); } }

/* ============= CONFETTI ============= */
.confetti-canvas { position: fixed; inset: 0; z-index: 4000; pointer-events: none; }

/* ============= VIEW STATES ============= */
.view { display: none; }
.view.active { display: block; }

/* ============= EMPTY STATE ============= */
.empty-state { text-align: center; padding: 3rem 1rem; color: var(--c-text-muted); }
.empty-state__icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
.empty-state__text { font-size: 0.95rem; }

/* ============= BOTTOM NAV (mobile) ============= */
.bottom-nav {
    display: none; position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--c-bg); border-top: 1px solid var(--c-border);
    padding: 0.35rem 0; padding-bottom: max(0.35rem, env(safe-area-inset-bottom));
    z-index: 900; justify-content: space-around; align-items: center;
}
.bottom-nav__item {
    display: flex; flex-direction: column; align-items: center; gap: 0.15rem;
    font-size: 0.65rem; font-weight: 600; color: var(--c-text-muted); padding: 0.25rem 0.5rem;
    border-radius: var(--radius-xs); transition: var(--transition); -webkit-tap-highlight-color: transparent;
}
.bottom-nav__item.active { color: var(--c-primary); }

    <script>
'use strict';

// ============= EVENT BUS =============
class EventBus {
    constructor() { this._h = {}; }
    on(e, fn) { (this._h[e] ||= []).push(fn); }
    off(e, fn) { this._h[e] = (this._h[e] || []).filter(h => h !== fn); }
    emit(e, data) { (this._h[e] || []).forEach(fn => fn(data)); }
}

// ============= ID GENERATOR =============
class IdGenerator {
    static _counter = 0;
    static next() { return Date.now() * 1000 + (++IdGenerator._counter); }
}

// ============= STORAGE MANAGER =============
class StorageManager {
    get(key, fallback = null) {
        try {
            const raw = localStorage.getItem(key);
            return raw !== null ? JSON.parse(raw) : fallback;
        } catch { return fallback; }
    }
    set(key, value) { localStorage.setItem(key, JSON.stringify(value)); }
    remove(key) { localStorage.removeItem(key); }
}

// ============= ESCAPE HTML =============
function esc(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}

function getDateStr(d = new Date()) {
    return d.toISOString().slice(0, 10);
}

function getDayName(d) {
    return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
}

// ============= TASK MANAGER =============
class TaskManager {
    constructor(bus, storage) {
        this.bus = bus;
        this.store = storage;
        this.tasks = [];
        this.lastModified = 0;
    }

    load() {
        this.tasks = this.store.get('pf.tasks', []);
        this.lastModified = this.store.get('pf.lastModified', 0);
        // Migrate old IDs if needed
        this.tasks.forEach(t => {
            if (!Number.isInteger(t.id)) t.id = IdGenerator.next();
            if (!t.createdAt) t.createdAt = new Date().toISOString();
            if (t.subtasks) t.subtasks.forEach((s, i) => { if (s.id === undefined) s.id = i; });
        });
    }

    save() {
        this.lastModified = Date.now();
        this.store.set('pf.tasks', this.tasks);
        this.store.set('pf.lastModified', this.lastModified);
        this.bus.emit('tasks:changed');
    }

    getById(id) {
        return this.tasks.find(t => t.id === id) || null;
    }

    create(data) {
        const task = {
            id: IdGenerator.next(),
            title: (data.title || '').trim(),
            notes: (data.notes || '').trim(),
            category: data.category || '',
            urgency: Number(data.urgency) || 2,
            impact: Number(data.impact) || 2,
            energy: Number(data.energy) || 2,
            interest: Number(data.interest) || 2,
            day: data.day || 'Today',
            duration: Number(data.duration) || 30,
            done: false,
            completedAt: null,
            createdAt: new Date().toISOString(),
            subtasks: (data.subtasks || []).map(s => ({ id: IdGenerator.next(), text: s.text || s, done: false })),
            pomodoros: 0,
            focusMinutes: 0,
            manualRank: null,
            recurrence: data.recurrence || null,
            streak: data.recurrence ? { current: 0, best: 0, lastCompleted: null } : null,
        };
        if (!task.title) return null;
        this.tasks.push(task);
        this.save();
        this.bus.emit('task:created', task);
        return task;
    }

    update(id, data) {
        const task = this.getById(id);
        if (!task) return null;
        Object.assign(task, data);
        this.save();
        return task;
    }

    delete(id) {
        this.tasks = this.tasks.filter(t => t.id !== id);
        this.save();
    }

    toggle(id) {
        const task = this.getById(id);
        if (!task) return;
        task.done = !task.done;
        if (task.done) {
            task.completedAt = new Date().toISOString();
            if (task.streak) {
                const today = getDateStr();
                if (task.streak.lastCompleted !== today) {
                    task.streak.current++;
                    task.streak.best = Math.max(task.streak.best, task.streak.current);
                    task.streak.lastCompleted = today;
                }
            }
            this.createNextOccurrence(task);
            this.bus.emit('task:completed', task);
        } else {
            task.completedAt = null;
        }
        this.save();
    }

    toggleSubtask(taskId, subtaskId) {
        const task = this.getById(taskId);
        if (!task) return;
        const sub = task.subtasks.find(s => s.id === subtaskId);
        if (sub) {
            sub.done = !sub.done;
            this.save();
        }
    }

    skip(id) {
        const task = this.getById(id);
        if (!task) return;
        if (task.day === 'Today') task.day = 'Tomorrow';
        else if (task.day === 'Tomorrow') task.day = 'This week';
        this.save();
    }

    createNextOccurrence(task) {
        if (!task.recurrence) return;
        const rId = task.recurrence.recurrenceId || `rec_${task.id}`;
        // Ensure current task has recurrenceId set
        task.recurrence.recurrenceId = rId;
        // Check for existing pending with same recurrenceId
        const existing = this.tasks.find(t => t.recurrence?.recurrenceId === rId && !t.done && t.id !== task.id);
        if (existing) return;
        // Create next
        const next = {
            id: IdGenerator.next(),
            title: task.title,
            notes: task.notes,
            category: task.category,
            urgency: task.urgency,
            impact: task.impact,
            energy: task.energy,
            interest: task.interest,
            day: 'Tomorrow',
            duration: task.duration,
            done: false,
            completedAt: null,
            createdAt: new Date().toISOString(),
            subtasks: task.subtasks.map(s => ({ id: IdGenerator.next(), text: s.text, done: false })),
            pomodoros: 0,
            focusMinutes: 0,
            manualRank: null,
            recurrence: { type: task.recurrence.type, recurrenceId: rId },
            streak: { current: task.streak?.current || 0, best: task.streak?.best || 0, lastCompleted: task.streak?.lastCompleted || null },
        };
        this.tasks.push(next);
    }

    score(task) {
        let s = (task.urgency || 2) + (task.impact || 2) + (task.energy || 2) + (task.interest || 2);
        if (task.day === 'Today') s += 2;
        if (task.day === 'Tomorrow') s += 1;
        return s;
    }

    quadrant(task) {
        const u = task.urgency || 2, i = task.impact || 2;
        if (u >= 2 && i >= 2) return 'do';
        if (u < 2 && i >= 2) return 'schedule';
        if (u >= 2 && i < 2) return 'delegate';
        return 'eliminate';
    }

    getFiltered(filter, query) {
        let list = [...this.tasks];
        if (filter === 'high') list = list.filter(t => this.score(t) >= 10 && !t.done);
        else if (filter === 'today') list = list.filter(t => t.day === 'Today' && !t.done);
        else if (filter === 'done') list = list.filter(t => t.done);
        else list = list.filter(t => !t.done);
        if (query) {
            const q = query.toLowerCase();
            list = list.filter(t => (t.title || '').toLowerCase().includes(q) || (t.notes || '').toLowerCase().includes(q) || (t.category || '').toLowerCase().includes(q));
        }
        return this.sorted(list);
    }

    sorted(list) {
        return list.sort((a, b) => {
            if (a.done !== b.done) return a.done ? 1 : -1;
            if (a.manualRank !== null && b.manualRank !== null) return a.manualRank - b.manualRank;
            if (a.manualRank !== null) return -1;
            if (b.manualRank !== null) return 1;
            return this.score(b) - this.score(a);
        });
    }

    getTodayTasks() {
        return this.sorted(this.tasks.filter(t => t.day === 'Today' && !t.done)).slice(0, 5);
    }

    getHabits() {
        return this.tasks.filter(t => t.recurrence && t.streak);
    }

    todayStats() {
        const today = this.tasks.filter(t => t.day === 'Today');
        const done = today.filter(t => t.done);
        const totalFocus = today.reduce((s, t) => s + (t.focusMinutes || 0), 0);
        return { total: today.length, done: done.length, focusMinutes: totalFocus };
    }

    setTasks(tasks) {
        this.tasks = tasks;
    }
}

// ============= MODAL MANAGER =============
class ModalManager {
    constructor() {
        this._root = document.getElementById('modalRoot');
        this._stack = [];
    }

    open(renderFn) {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        const cleanup = renderFn(overlay);
        this._stack.push({ overlay, cleanup });
        this._root.appendChild(overlay);
        overlay.addEventListener('click', (e) => { if (e.target === overlay) this.closeCurrent(); });
        const escHandler = (e) => { if (e.key === 'Escape') { this.closeCurrent(); document.removeEventListener('keydown', escHandler); } };
        document.addEventListener('keydown', escHandler);
        return overlay;
    }

    closeCurrent() {
        const entry = this._stack.pop();
        if (entry) {
            if (typeof entry.cleanup === 'function') entry.cleanup();
            entry.overlay.remove();
        }
    }

    closeAll() { while (this._stack.length) this.closeCurrent(); }
}

// ============= THEME MANAGER =============
class ThemeManager {
    constructor(storage) {
        this.store = storage;
        this.theme = this.store.get('pf.theme', 'light');
        this.apply();
    }

    apply() { document.documentElement.setAttribute('data-theme', this.theme); }

    toggle() {
        this.theme = this.theme === 'light' ? 'dark' : 'light';
        this.store.set('pf.theme', this.theme);
        this.apply();
    }
}

// ============= GITHUB SYNC MANAGER =============
class GitHubSyncManager {
    constructor(bus, storage, taskManager) {
        this.bus = bus;
        this.store = storage;
        this.tm = taskManager;
        this._debounceTimer = null;
    }

    get token() { return this.store.get('pf.github.token', ''); }
    get gistId() { return this.store.get('pf.github.gistId', ''); }

    async _apiFetch(url, opts = {}) {
        const r = await fetch(url, {
            ...opts,
            headers: { 'Authorization': `token ${this.token}`, 'Content-Type': 'application/json', ...(opts.headers || {}) }
        });
        if (!r.ok) {
            const body = await r.json().catch(() => ({}));
            const msg = r.status === 401 ? 'Invalid token — needs gist scope'
                      : r.status === 404 ? 'Gist not found'
                      : r.status === 403 ? 'Rate limited or forbidden'
                      : `GitHub API error ${r.status}`;
            throw new Error(msg);
        }
        return r.json();
    }

    async connect(token, gistId) {
        this.store.set('pf.github.token', token);
        if (gistId) this.store.set('pf.github.gistId', gistId);
        await this.fetchUser();
        await this.sync();
    }

    async fetchUser() {
        if (!this.token) return;
        try {
            const user = await this._apiFetch('https://api.github.com/user');
            this.store.set('pf.github.username', user.login);
            this.store.set('pf.github.avatar', user.avatar_url);
            this.bus.emit('user:updated');
        } catch (err) {
            console.error('Fetch user error:', err);
        }
    }

    syncDebounced() {
        clearTimeout(this._debounceTimer);
        this._debounceTimer = setTimeout(() => this.sync().catch(() => {}), 3000);
    }

    async sync() {
        if (!this.token) return;
        this.bus.emit('sync:status', { state: 'syncing', text: 'Syncing...' });
        try {
            let gistId = this.gistId;
            if (!gistId || gistId === 'undefined') {
                const gists = await this._apiFetch('https://api.github.com/gists?per_page=100');
                const found = gists.find(g => g.files && g.files['priorityflow.json']);
                if (found) {
                    gistId = found.id;
                } else {
                    const created = await this._apiFetch('https://api.github.com/gists', {
                        method: 'POST',
                        body: JSON.stringify({
                            description: 'PriorityFlow sync',
                            public: false,
                            files: { 'priorityflow.json': { content: JSON.stringify({ tasks: this.tm.tasks, lastModified: this.tm.lastModified }) } }
                        })
                    });
                    gistId = created.id;
                }
                this.store.set('pf.github.gistId', gistId);
            }

            const gistData = await this._apiFetch(`https://api.github.com/gists/${gistId}`);
            const fileEntry = gistData.files?.['priorityflow.json'];

            if (!fileEntry) {
                await this._apiFetch(`https://api.github.com/gists/${gistId}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ files: { 'priorityflow.json': { content: JSON.stringify({ tasks: this.tm.tasks, lastModified: this.tm.lastModified }) } } })
                });
                this.bus.emit('sync:status', { state: 'connected', text: 'Pushed' });
            } else {
                const remote = JSON.parse(fileEntry.content);
                const remoteTs = remote.lastModified || 0;
                const localTs = this.tm.lastModified || 0;

                if (remoteTs > localTs) {
                    this.tm.setTasks(remote.tasks || []);
                    this.tm.lastModified = remoteTs;
                    this.store.set('pf.tasks', this.tm.tasks);
                    this.store.set('pf.lastModified', remoteTs);
                    this.bus.emit('tasks:changed');
                    this.bus.emit('sync:status', { state: 'connected', text: 'Pulled' });
                } else if (localTs > remoteTs) {
                    await this._apiFetch(`https://api.github.com/gists/${gistId}`, {
                        method: 'PATCH',
                        body: JSON.stringify({ files: { 'priorityflow.json': { content: JSON.stringify({ tasks: this.tm.tasks, lastModified: localTs }) } } })
                    });
                    this.bus.emit('sync:status', { state: 'connected', text: 'Pushed' });
                } else {
                    this.bus.emit('sync:status', { state: 'connected', text: 'In sync' });
                }
            }
        } catch (err) {
            console.error('Sync error:', err);
            const msg = err.message.includes('token') ? 'Bad token' : 'Sync failed';
            this.bus.emit('sync:status', { state: 'error', text: msg });
            throw err; // Re-throw so connect() can catch it
        }
    }

    disconnect() {
        this.store.remove('pf.github.token');
        this.store.remove('pf.github.gistId');
        this.store.remove('pf.github.username');
        this.store.remove('pf.github.avatar');
        this.bus.emit('user:updated');
        this.bus.emit('sync:status', { state: '', text: 'Not connected' });
    }
}

// ============= POMODORO MANAGER =============
class PomodoroManager {
    constructor(bus, storage, taskManager) {
        this.bus = bus;
        this.store = storage;
        this.tm = taskManager;
        this.state = null;
        this._intervalId = null;
        this._restore();
    }

    _restore() {
        const saved = this.store.get('pf.pomodoro');
        if (saved && saved.isRunning) {
            const elapsed = Math.floor((Date.now() - saved.savedAt) / 1000);
            saved.remaining = Math.max(0, saved.remaining - elapsed);
            this.state = saved;
            if (this.state.remaining > 0) this._tick();
            else this._transitionPhase();
        }
    }

    _persist() {
        if (this.state) {
            this.store.set('pf.pomodoro', { ...this.state, savedAt: Date.now() });
        } else {
            this.store.remove('pf.pomodoro');
        }
    }

    start(taskId, durationMin) {
        const task = this.tm.getById(taskId);
        if (!task) return;
        this.state = {
            taskId,
            taskTitle: task.title,
            durationSec: durationMin * 60,
            remaining: durationMin * 60,
            phase: 'focus',
            sessions: 0,
            totalFocusSec: 0,
            isRunning: true,
            isPaused: false,
        };
        this._persist();
        this._tick();
        this.bus.emit('pomodoro:started', this.state);
    }

    _tick() {
        clearInterval(this._intervalId);
        this._intervalId = setInterval(() => {
            if (!this.state || this.state.isPaused) return;
            this.state.remaining--;
            if (this.state.phase === 'focus') this.state.totalFocusSec++;
            this._persist();
            this.bus.emit('pomodoro:tick', this.state);
            if (this.state.remaining <= 0) this._transitionPhase();
        }, 1000);
    }

    _transitionPhase() {
        if (!this.state) return;
        this._playBeep();
        if (this.state.phase === 'focus') {
            this.state.sessions++;
            // Log focus time to task
            const task = this.tm.getById(this.state.taskId);
            if (task) {
                task.focusMinutes += Math.round(this.state.durationSec / 60);
                task.pomodoros++;
                this.tm.save();
            }
            this.bus.emit('pomodoro:sessionComplete', this.state);
            // Break
            const isLong = this.state.sessions % 4 === 0;
            this.state.phase = 'break';
            this.state.remaining = isLong ? 10 * 60 : 5 * 60;
            this._persist();
            this.bus.emit('pomodoro:tick', this.state);
        } else {
            // Back to focus
            this.state.phase = 'focus';
            this.state.remaining = this.state.durationSec;
            this._persist();
            this.bus.emit('pomodoro:tick', this.state);
        }
    }

    pause() {
        if (this.state) { this.state.isPaused = true; this._persist(); this.bus.emit('pomodoro:tick', this.state); }
    }

    resume() {
        if (this.state) { this.state.isPaused = false; this._persist(); this.bus.emit('pomodoro:tick', this.state); }
    }

    stop() {
        clearInterval(this._intervalId);
        this.state = null;
        this._persist();
        this.bus.emit('pomodoro:stopped');
    }

    _playBeep() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.value = 800; gain.gain.value = 0.3;
            osc.start(); osc.stop(ctx.currentTime + 0.2);
        } catch {}
    }
}

class MorningFlowManager {
    constructor(bus, storage) {
        this.bus = bus;
        this.store = storage;
    }

    needsCheckin() {
        const today = getDateStr();
        const data = this.store.get('pf.morning', {});
        return !data[today];
    }

    save(mood, energy, intention) {
        const today = getDateStr();
        const data = this.store.get('pf.morning', {});
        data[today] = { mood, energy, intention };
        this.store.set('pf.morning', data);
        this.bus.emit('morning:completed', { mood, energy, intention });
    }

    getToday() {
        const today = getDateStr();
        const data = this.store.get('pf.morning', {});
        return data[today] || null;
    }
}

// ============= REVIEW MANAGER =============
class ReviewManager {
    constructor(storage) {
        this.store = storage;
    }

    save(date, review) {
        const reviews = this.store.get('pf.reviews', {});
        reviews[date] = review;
        this.store.set('pf.reviews', reviews);
    }

    get(date) {
        const reviews = this.store.get('pf.reviews', {});
        return reviews[date] || null;
    }

    getWeek() {
        const days = [];
        const now = new Date();
        for (let i = 6; i >= 0; i--) {
            const d = new Date(now);
            d.setDate(d.getDate() - i);
            const key = getDateStr(d);
            days.push({ date: key, day: getDayName(d), hasReview: !!this.get(key), isToday: i === 0 });
        }
        return days;
    }
}

// ============= MOTIVATIONAL ENGINE =============
class MotivationalEngine {
    constructor(bus, taskManager) {
        this.bus = bus;
        this.tm = taskManager;
        this._toastRoot = document.getElementById('toastRoot');
        this._lastNudge = 0;

        bus.on('task:completed', (task) => this._onComplete(task));
        bus.on('pomodoro:sessionComplete', () => this._onPomodoroComplete());
        bus.on('morning:completed', () => this.toast('Great morning check-in! Your day is set up for success.', 'success'));

        // Idle nudge every 30 min
        setInterval(() => this._nudgeCheck(), 30 * 60 * 1000);
    }

    _onComplete(task) {
        const msgs = ['Nice work!', 'One down, keep going!', 'Task crushed!', "That's how it's done!", 'You\'re making progress!'];
        const todayMsgs = ['Key task done! You\'re on track.', 'Today\'s priorities are shrinking!'];
        if (task.streak && task.streak.current >= 7) {
            this.toast(`${task.streak.current}-day streak! You're building a real habit.`, 'success');
        } else if (task.day === 'Today') {
            this.toast(todayMsgs[Math.floor(Math.random() * todayMsgs.length)], 'success');
        } else {
            this.toast(msgs[Math.floor(Math.random() * msgs.length)], 'success');
        }
        // Check if all today tasks are done
        const todayTasks = this.tm.tasks.filter(t => t.day === 'Today');
        const allDone = todayTasks.length > 0 && todayTasks.every(t => t.done);
        const celebratedToday = localStorage.getItem('pf.celebrated.' + getDateStr());
        if (allDone && !celebratedToday) {
            localStorage.setItem('pf.celebrated.' + getDateStr(), '1');
            setTimeout(() => {
                this.toast('You finished all of today\'s key tasks! Outstanding work.', 'success');
                this._confetti();
            }, 600);
        }
    }

    _onPomodoroComplete() {
        const msgs = ['Great focus session!', '25 minutes of deep work. Impressive.', 'Another session in the bank.'];
        this.toast(msgs[Math.floor(Math.random() * msgs.length)]);
    }

    _nudgeCheck() {
        if (Date.now() - this._lastNudge < 2 * 60 * 60 * 1000) return;
        const pom = this.tm.tasks.some(t => t.day === 'Today' && !t.done);
        if (!pom) return;
        const msgs = ['Still working? Maybe try a quick focus sprint.', 'Pick one small task and knock it out.', 'Even 5 minutes of progress counts.'];
        this.toast(msgs[Math.floor(Math.random() * msgs.length)], 'warning');
        this._lastNudge = Date.now();
    }

    toast(message, type = '') {
        const el = document.createElement('div');
        el.className = 'toast' + (type ? ` toast--${type}` : '');
        el.textContent = message;
        this._toastRoot.appendChild(el);
        setTimeout(() => el.remove(), 4000);
        // Max 2
        while (this._toastRoot.children.length > 2) this._toastRoot.firstChild.remove();
    }

    _confetti() {
        const canvas = document.createElement('canvas');
        canvas.className = 'confetti-canvas';
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        document.getElementById('celebrationRoot').appendChild(canvas);
        const ctx = canvas.getContext('2d');
        const colors = ['#FFD700', '#FF6B6B', '#4ECDC4', '#5B5BFF', '#FF9F43', '#A55EEA'];
        const particles = Array.from({ length: 120 }, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height * -1,
            w: Math.random() * 8 + 4,
            h: Math.random() * 6 + 3,
            vx: (Math.random() - 0.5) * 4,
            vy: Math.random() * 4 + 2,
            rot: Math.random() * 360,
            rotSpeed: (Math.random() - 0.5) * 10,
            color: colors[Math.floor(Math.random() * colors.length)],
        }));
        let frame = 0;
        const animate = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1;
                p.rot += p.rotSpeed;
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot * Math.PI / 180);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                ctx.restore();
            });
            frame++;
            if (frame < 180) requestAnimationFrame(animate);
            else canvas.remove();
        };
        animate();
    }
}

// --- Ranked View ---
class RankedViewRenderer {
    constructor(bus, taskManager, modalManager, pomodoroManager) {
        this.bus = bus;
        this.tm = taskManager;
        this.modals = modalManager;
        this.pomo = pomodoroManager;
        this.container = document.getElementById('rankedList');
        this._draggedId = null;
    }

    render(filter, query) {
        const tasks = this.tm.getFiltered(filter, query);
        if (tasks.length === 0) {
            this.container.innerHTML = `<div class="empty-state"><div class="empty-state__icon">&#128203;</div><div class="empty-state__text">${filter === 'done' ? 'No completed tasks yet' : 'No tasks here. Add one!'}</div></div>`;
            return;
        }
        this.container.innerHTML = tasks.map(t => this._cardHTML(t)).join('');
        this._attachEvents();
    }

    _cardHTML(t) {
        const score = this.tm.score(t);
        const subtaskDone = t.subtasks ? t.subtasks.filter(s => s.done).length : 0;
        const subtaskTotal = t.subtasks ? t.subtasks.length : 0;
        const subtaskPct = subtaskTotal ? Math.round(subtaskDone / subtaskTotal * 100) : 0;
        return `<div class="task-card${t.done ? ' done' : ''}" data-id="${t.id}" draggable="${!t.done}">
            <div class="task-card__check${t.done ? ' done' : ''}" data-action="toggle" data-id="${t.id}">${t.done ? '&#10003;' : ''}</div>
            <div class="task-card__body">
                <div class="task-card__title${t.done ? ' done' : ''}">${esc(t.title)}</div>
                ${t.notes ? `<div class="task-card__notes">${esc(t.notes)}</div>` : ''}
                <div class="task-card__meta">
                    <span class="badge badge--score">${score} pts</span>
                    ${t.category ? `<span class="badge badge--category">${esc(t.category)}</span>` : ''}
                    ${t.duration ? `<span class="badge badge--duration">${t.duration}m</span>` : ''}
                    ${t.day ? `<span class="badge badge--day">${t.day}</span>` : ''}
                    ${t.recurrence ? `<span class="badge badge--recurrence">&#8635; ${t.recurrence.type}</span>` : ''}
                    ${t.streak && t.streak.current > 0 ? `<span class="badge badge--streak">&#128293; ${t.streak.current}d</span>` : ''}
                    ${t.pomodoros ? `<span class="badge badge--duration">&#127813; ${t.pomodoros}</span>` : ''}
                </div>
                ${subtaskTotal ? `<div class="subtask-bar"><div class="subtask-bar__fill" style="width:${subtaskPct}%"></div></div>` : ''}
            </div>
            <div class="task-card__actions">
                <button class="btn btn--ghost btn--sm" data-action="focus" data-id="${t.id}" title="Focus">&#127813;</button>
                <button class="btn btn--ghost btn--sm" data-action="skip" data-id="${t.id}" title="Skip">&#9193;</button>
                <button class="btn btn--ghost btn--sm" data-action="edit" data-id="${t.id}" title="Edit">&#9998;</button>
                <button class="btn btn--ghost btn--sm" data-action="delete" data-id="${t.id}" title="Delete">&#128465;</button>
            </div>
        </div>`;
    }

    _attachEvents() {
        this.container.querySelectorAll('[data-action]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = Number(btn.dataset.id);
                const action = btn.dataset.action;
                if (action === 'toggle') this.tm.toggle(id);
                else if (action === 'edit') this.bus.emit('ui:editTask', id);
                else if (action === 'delete') { if (confirm('Delete this task?')) this.tm.delete(id); }
                else if (action === 'skip') this.tm.skip(id);
                else if (action === 'focus') this.bus.emit('ui:startPomodoro', id);
            });
        });
        // Drag and drop
        this.container.querySelectorAll('.task-card[draggable="true"]').forEach(card => {
            card.addEventListener('dragstart', (e) => {
                this._draggedId = Number(card.dataset.id);
                card.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
            });
            card.addEventListener('dragend', () => { card.classList.remove('dragging'); this._draggedId = null; });
            card.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
            card.addEventListener('drop', (e) => {
                e.preventDefault();
                const targetId = Number(card.dataset.id);
                if (this._draggedId === null || this._draggedId === targetId) return;
                const dragged = this.tm.getById(this._draggedId);
                const target = this.tm.getById(targetId);
                if (!dragged || !target || dragged.done || target.done) return;
                // Swap manual ranks
                const cards = [...this.container.querySelectorAll('.task-card')];
                const dragIdx = cards.findIndex(c => Number(c.dataset.id) === this._draggedId);
                const targetIdx = cards.findIndex(c => Number(c.dataset.id) === targetId);
                dragged.manualRank = targetIdx;
                target.manualRank = dragIdx;
                this.tm.save();
            });
        });
    }
}

// --- Eisenhower View ---
class EisenhowerViewRenderer {
    constructor(bus, taskManager) {
        this.bus = bus;
        this.tm = taskManager;
        this.container = document.getElementById('eisenhowerView');
    }

    render(filter, query) {
        const tasks = this.tm.getFiltered(filter, query);
        const groups = { do: [], schedule: [], delegate: [], eliminate: [] };
        tasks.forEach(t => { const q = this.tm.quadrant(t); groups[q].push(t); });

        this.container.innerHTML = `<div class="eisenhower-grid">
            ${this._quadrantHTML('do', 'Do First', groups.do)}
            ${this._quadrantHTML('schedule', 'Schedule', groups.schedule)}
            ${this._quadrantHTML('delegate', 'Delegate', groups.delegate)}
            ${this._quadrantHTML('eliminate', 'Eliminate', groups.eliminate)}
        </div>`;
        this._attachDragDrop();
    }

    _quadrantHTML(key, label, tasks) {
        return `<div class="quadrant quadrant--${key}" data-quadrant="${key}">
            <div class="quadrant__header"><span class="quadrant__dot"></span>${label} (${tasks.length})</div>
            <div class="quadrant__tasks">${tasks.map(t => `<div class="task-card" data-id="${t.id}" draggable="true" style="padding:0.5rem 0.7rem">
                <div class="task-card__check${t.done ? ' done' : ''}" data-action="toggle" data-id="${t.id}">${t.done ? '&#10003;' : ''}</div>
                <div class="task-card__body"><div class="task-card__title${t.done ? ' done' : ''}" style="font-size:0.85rem">${esc(t.title)}</div></div>
            </div>`).join('')}</div>
        </div>`;
    }

    _attachDragDrop() {
        let dragId = null;
        this.container.querySelectorAll('.task-card[draggable]').forEach(card => {
            card.addEventListener('dragstart', () => { dragId = Number(card.dataset.id); card.classList.add('dragging'); });
            card.addEventListener('dragend', () => card.classList.remove('dragging'));
        });
        this.container.querySelectorAll('[data-action="toggle"]').forEach(btn => {
            btn.addEventListener('click', (e) => { e.stopPropagation(); this.tm.toggle(Number(btn.dataset.id)); });
        });
        this.container.querySelectorAll('.quadrant').forEach(quad => {
            quad.addEventListener('dragover', (e) => { e.preventDefault(); quad.classList.add('drag-over'); });
            quad.addEventListener('dragleave', () => quad.classList.remove('drag-over'));
            quad.addEventListener('drop', (e) => {
                e.preventDefault();
                quad.classList.remove('drag-over');
                if (dragId === null) return;
                const task = this.tm.getById(dragId);
                if (!task) return;
                const q = quad.dataset.quadrant;
                if (q === 'do') { task.urgency = 3; task.impact = 3; }
                else if (q === 'schedule') { task.urgency = 1; task.impact = 3; }
                else if (q === 'delegate') { task.urgency = 3; task.impact = 1; }
                else { task.urgency = 1; task.impact = 1; }
                this.tm.save();
                dragId = null;
            });
        });
    }
}

// --- Planner View ---
class PlannerViewRenderer {
    constructor(bus, taskManager) {
        this.bus = bus;
        this.tm = taskManager;
        this.container = document.getElementById('plannerView');
    }

    render() {
        const todayTasks = this.tm.sorted(this.tm.tasks.filter(t => t.day === 'Today' && !t.done));
        const slots = [];
        for (let h = 6; h <= 22; h++) {
            for (let m = 0; m < 60; m += 30) {
                slots.push({ time: `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`, task: null });
            }
        }
        // Auto-assign tasks to slots
        let slotIdx = 0;
        todayTasks.forEach(task => {
            const slotsNeeded = Math.max(1, Math.ceil((task.duration || 30) / 30));
            if (slotIdx < slots.length) {
                slots[slotIdx].task = task;
                slotIdx += slotsNeeded;
            }
        });

        this.container.innerHTML = `<div class="planner-grid">${slots.map(s =>
            `<div class="planner-slot">
                <div class="planner-slot__time">${s.time}</div>
                <div class="planner-slot__task ${s.task ? 'has-task' : 'empty'}" ${s.task ? `data-id="${s.task.id}"` : ''}>
                    ${s.task ? esc(s.task.title) : ''}
                </div>
            </div>`
        ).join('')}</div>`;

        this.container.querySelectorAll('.planner-slot__task[data-id]').forEach(el => {
            el.addEventListener('click', () => this.bus.emit('ui:editTask', Number(el.dataset.id)));
        });
    }
}

class OverviewViewRenderer {

        this.bus = bus;
        this.tm = taskManager;
        this.rm = reviewManager;

    }

    render() {
        const stats = this.tm.todayStats();
        const pct = stats.total ? Math.round(stats.done / stats.total * 100) : 0;
        const totalTasks = this.tm.tasks.length;
        const totalDone = this.tm.tasks.filter(t => t.done).length;
        const totalFocus = this.tm.tasks.reduce((s, t) => s + (t.focusMinutes || 0), 0);
        const avgScore = totalTasks ? Math.round(this.tm.tasks.reduce((s, t) => s + this.tm.score(t), 0) / totalTasks) : 0;

        this.bus.on('tasks:changed', () => { this._renderAll(); this.sync.syncDebounced(); });

        this.bus.on('sync:status', (s) => this._updateSyncUI(s));

    _renderAll() {
        this._renderCurrentView();
        this._renderKeyTasks();
        this._renderHabits();
        this._renderReviewDots();
        this._updateIntention();
    }

    _renderCurrentView() {
        if (this.currentView === 'ranked') this.rankedView.render(this.currentFilter, this.searchQuery);
        else if (this.currentView === 'eisenhower') this.eisenhowerView.render(this.currentFilter, this.searchQuery);
        else if (this.currentView === 'planner') this.plannerView.render();
        else if (this.currentView === 'overview') this.overviewView.render();
    }

    _renderKeyTasks() {
        const tasks = this.tm.getTodayTasks();
        const el = document.getElementById('keyTasks');
        if (tasks.length === 0) {
            el.innerHTML = '<div style="font-size:0.8rem;color:var(--c-text-muted);padding:0.25rem">No tasks for today</div>';
            return;
        }
        el.innerHTML = tasks.map(t => `<div class="key-task" data-id="${t.id}">
            <div class="key-task__check${t.done ? ' done' : ''}" data-action="toggle">${t.done ? '&#10003;' : ''}</div>
            <div class="key-task__title${t.done ? ' done' : ''}">${esc(t.title)}</div>
            <div class="key-task__score">${this.tm.score(t)}</div>
        </div>`).join('');
        el.querySelectorAll('.key-task').forEach(kt => {
            kt.querySelector('[data-action="toggle"]').addEventListener('click', (e) => {
                e.stopPropagation();
                this.tm.toggle(Number(kt.dataset.id));
            });
            kt.addEventListener('click', () => this.bus.emit('ui:editTask', Number(kt.dataset.id)));
        });
    }

    _renderHabits() {
        const habits = this.tm.getHabits();
        const el = document.getElementById('habitList');
        if (habits.length === 0) {
            el.innerHTML = '<div style="font-size:0.8rem;color:var(--c-text-muted);padding:0.25rem">No recurring habits yet</div>';
            return;
        }
        // Deduplicate by recurrenceId, show the latest
        const seen = new Set();
        const unique = [];
        habits.forEach(h => {
            const rId = h.recurrence?.recurrenceId || h.id;
            if (!seen.has(rId)) { seen.add(rId); unique.push(h); }
        });
        el.innerHTML = unique.slice(0, 5).map(h => `<div class="habit-item">
            <span>${esc(h.title)}</span>
            <span class="habit-item__streak">&#128293; ${h.streak?.current || 0}d</span>
        </div>`).join('');
    }

    _renderReviewDots() {
        const week = this.reviews.getWeek();
        const el = document.getElementById('reviewDots');
        el.innerHTML = week.map(d =>
            `<div class="review-dot${d.hasReview ? ' done' : ''}${d.isToday ? ' today' : ''}">${d.day.charAt(0)}</div>`
        ).join('');
    }

    _updateIntention() {
        const data = this.morning.getToday();
        const banner = document.getElementById('intentionBanner');
        if (data && data.intention) {
            document.getElementById('intentionText').textContent = data.intention;
            banner.hidden = false;
        } else {
            banner.hidden = true;
        }
    }

    _updateUserUI() {
        const name = this.store.get('pf.github.username', '');
        const avatar = this.store.get('pf.github.avatar', '');
        document.getElementById('userName').textContent = name || 'PriorityFlow';
        const avatarEl = document.getElementById('userAvatar');
        if (avatar) {
            avatarEl.innerHTML = `<img src="${esc(avatar)}" alt="">`;
        } else {
            avatarEl.textContent = name ? name.charAt(0).toUpperCase() : '?';
        }

    _updateSyncUI({ state, text }) {
        const dot = document.getElementById('syncDot');
        const label = document.getElementById('syncLabel');
        dot.className = 'sync-dot' + (state ? ` ${state}` : '');
        label.textContent = text || 'Not connected';
        if (state === 'connected' || state === 'error') {
            setTimeout(() => {
                if (state === 'connected') { dot.className = 'sync-dot connected'; label.textContent = 'Connected'; }
                else { dot.className = 'sync-dot'; label.textContent = 'Not connected'; }
            }, 3000);
        }

    // ============= MORNING FLOW =============
    _checkMorning() {
        if (!this.morning.needsCheckin()) return;
        const overlay = document.createElement('div');
        overlay.className = 'morning-overlay';
        const username = this.store.get('pf.github.username', 'there');
        const hour = new Date().getHours();
        const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
        let selectedMood = null;
        let energy = 3;

        overlay.innerHTML = `<div class="morning">
            <div class="morning__greeting">${greeting}, ${esc(username)}!</div>
            <div class="morning__subtitle">Let's set up your day.</div>
            <div class="sidebar__label" style="text-align:center">How are you feeling?</div>
            <div class="morning__moods">

                <button class="mood-btn" data-mood="2">&#128533;</button>
                <button class="mood-btn" data-mood="3">&#128528;</button>
                <button class="mood-btn" data-mood="4">&#128522;</button>
                <button class="mood-btn" data-mood="5">&#128293;</button>
            </div>
            <div class="morning__energy-label">Energy level</div>
            <div class="morning__energy-row">
                <span style="font-size:0.8rem">Low</span>
                <input type="range" min="1" max="5" value="3" class="form-range" id="morningEnergy" style="width:180px">
                <span style="font-size:0.8rem">High</span>
                <span class="morning__energy-val" id="energyVal">3</span>
            </div>
            <input type="text" class="morning__intention" id="morningIntention" placeholder="What's your main focus today?" maxlength="120">
            <div class="morning__actions">
                <button class="btn btn--primary" id="morningStart">Start My Day</button>
                <button class="btn btn--ghost" id="morningSkip">Skip</button>
            </div>
        </div>`;

        document.body.appendChild(overlay);

        overlay.querySelectorAll('.mood-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                overlay.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedMood = Number(btn.dataset.mood);
            });
        });
        const energyInput = overlay.querySelector('#morningEnergy');
        const energyVal = overlay.querySelector('#energyVal');
        energyInput.addEventListener('input', () => { energy = Number(energyInput.value); energyVal.textContent = energy; });

        const finish = (skip) => {
            if (!skip) {
                this.morning.save(selectedMood || 3, energy, overlay.querySelector('#morningIntention').value.trim());
            } else {
                this.morning.save(3, 3, '');
            }
            overlay.style.animation = 'fadeIn 0.3s ease reverse forwards';
            setTimeout(() => overlay.remove(), 300);
        };

        overlay.querySelector('#morningStart').addEventListener('click', () => finish(false));
        overlay.querySelector('#morningSkip').addEventListener('click', () => finish(true));
    }

    _onMorningComplete({ energy }) {
        // Adjust task ordering based on energy
        this.tm.tasks.forEach(t => {
            if (t.done) return;
            t.manualRank = null; // Reset manual ranks so scoring takes over
        });
        if (energy <= 2) {
            // Boost low-energy tasks
            this.tm.tasks.filter(t => !t.done && t.energy === 1 && t.day === 'Today').forEach((t, i) => { t.manualRank = i; });
        } else if (energy >= 4) {
            // Boost high-energy tasks
            this.tm.tasks.filter(t => !t.done && t.energy === 3 && t.day === 'Today').forEach((t, i) => { t.manualRank = i; });
        }
        this.tm.save();
    }

            });
            subtaskList.querySelectorAll('.remove-subtask').forEach(btn => {

            });

            modal.querySelector('.modal-close').addEventListener('click', () => this.modals.closeCurrent());

                        if (isEdit && task.subtasks[i]) return { ...task.subtasks[i], text };
                        return { id: IdGenerator.next(), text, done: false };
                    }),
                };
                if (!data.title.trim()) { modal.querySelector('#taskTitle').focus(); return; }
                if (isEdit) {
                    if (!recType) data.streak = null;
                    else if (!task.streak) data.streak = { current: 0, best: 0, lastCompleted: null };
                    this.tm.update(editId, data);
                } else {
                    this.tm.create(data);
                }
                this.modals.closeCurrent();
            });

            // Focus title on open
            setTimeout(() => modal.querySelector('#taskTitle').focus(), 100);

            return null; // no cleanup needed
        });
    }

    _showPomodoroTimer() {
        let intervalCleanup = null;
        this.modals.open((overlay) => {
            const circumference = 2 * Math.PI * 80;
            overlay.innerHTML = `<div class="modal" style="max-width:360px">
                <div class="pomodoro-modal">
                    <div class="pomodoro-task-title" id="pomoTitle"></div>
                    <div class="pomodoro-circle">
                        <svg width="180" height="180" viewBox="0 0 180 180">
                            <circle class="pomodoro-circle__track" cx="90" cy="90" r="80"/>
                            <circle class="pomodoro-circle__progress" id="pomoProgress" cx="90" cy="90" r="80" stroke-dasharray="${circumference}" stroke-dashoffset="0"/>
                        </svg>
                        <div class="pomodoro-time">
                            <div class="pomodoro-time__value" id="pomoTime">--:--</div>
                            <div class="pomodoro-time__label" id="pomoPhase"></div>
                        </div>
                    </div>
                    <div class="pomodoro-stats" id="pomoStats"></div>
                    <div style="display:flex;gap:0.5rem;justify-content:center">
                        <button class="btn btn--secondary" id="pomoPause">Pause</button>
                        <button class="btn btn--danger" id="pomoStop">Stop</button>
                    </div>
                </div>
            </div>`;

            const updateUI = (s) => {
                if (!s) { this.modals.closeCurrent(); return; }
                const min = Math.floor(s.remaining / 60);
                const sec = s.remaining % 60;
                overlay.querySelector('#pomoTitle').textContent = s.taskTitle;
                overlay.querySelector('#pomoTime').textContent = `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
                overlay.querySelector('#pomoPhase').textContent = s.phase === 'focus' ? 'Focus' : 'Break';
                overlay.querySelector('#pomoStats').textContent = `Session ${s.sessions + 1} \u00b7 ${Math.round(s.totalFocusSec / 60)}m focused`;
                const total = s.phase === 'focus' ? s.durationSec : (s.sessions % 4 === 0 && s.phase === 'break' ? 600 : 300);
                const pct = total > 0 ? (total - s.remaining) / total : 0;
                overlay.querySelector('#pomoProgress').style.strokeDashoffset = circumference * (1 - pct);
            };

            const tickHandler = (s) => updateUI(s);
            const stopHandler = () => this.modals.closeCurrent();
            this.bus.on('pomodoro:tick', tickHandler);
            this.bus.on('pomodoro:stopped', stopHandler);

            // Initial render
            if (this.pomo.state) updateUI(this.pomo.state);

            overlay.querySelector('#pomoPause').addEventListener('click', () => {
                if (this.pomo.state?.isPaused) { this.pomo.resume(); overlay.querySelector('#pomoPause').textContent = 'Pause'; }
                else { this.pomo.pause(); overlay.querySelector('#pomoPause').textContent = 'Resume'; }
            });
            overlay.querySelector('#pomoStop').addEventListener('click', () => { this.pomo.stop(); });

            return () => {
                this.bus.off('pomodoro:tick', tickHandler);
                this.bus.off('pomodoro:stopped', stopHandler);
            };
        });
    }

        this.modals.open((overlay) => {
            overlay.innerHTML = `<div class="modal">
                <div class="modal__header">
                    <div class="modal__title">Settings</div>
                    <button class="btn--icon modal-close">&times;</button>
                </div>
                <div class="modal__body">
                    <div class="sidebar__label" style="margin-bottom:0.75rem">GitHub Sync</div>
                    <div class="form-group">
                        <label class="form-label">Personal Access Token</label>
                        <input class="form-input" type="password" id="settingsToken" value="${token ? '\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022' : ''}" placeholder="ghp_...">
                        <div class="form-hint">Create at github.com/settings/tokens with <strong>gist</strong> scope only.</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Gist ID (optional)</label>
                        <input class="form-input" id="settingsGistId" value="${esc(gistId)}" placeholder="Auto-created if blank">
                    </div>
                    <div style="display:flex;gap:0.5rem;margin-bottom:1.5rem">
                        <button class="btn btn--primary btn--sm" id="settingsConnect">Connect</button>
                        ${token ? '<button class="btn btn--danger btn--sm" id="settingsDisconnect">Disconnect</button>' : ''}
                    </div>
                    <div class="sidebar__label" style="margin-bottom:0.75rem">Categories</div>
                    <div class="form-group">
                        <input class="form-input" id="settingsCategories" value="${categories.join(', ')}" placeholder="Comma-separated">
                        <div class="form-hint">Comma-separated list of task categories.</div>
                    </div>
                </div>
                <div class="modal__footer">
                    <button class="btn btn--secondary" id="settingsClose">Close</button>
                    <button class="btn btn--primary" id="settingsSave">Save</button>
                </div>
            </div>`;

            const modal = overlay.querySelector('.modal');
            modal.querySelector('.modal-close').addEventListener('click', () => this.modals.closeCurrent());
            modal.querySelector('#settingsClose').addEventListener('click', () => this.modals.closeCurrent());

            modal.querySelector('#settingsConnect').addEventListener('click', async () => {
                const tokenVal = modal.querySelector('#settingsToken').value;
                if (tokenVal && !tokenVal.startsWith('\u2022')) {
                    const btn = modal.querySelector('#settingsConnect');
                    btn.textContent = 'Connecting...';
                    btn.disabled = true;
                    try {
                        await this.sync.connect(tokenVal, modal.querySelector('#settingsGistId').value.trim());
                        btn.textContent = 'Connected!';
                    } catch (err) {
                        btn.textContent = 'Failed';
                        setTimeout(() => { btn.textContent = 'Connect'; btn.disabled = false; }, 2000);
                    }
                }
            });

            if (token) {
                modal.querySelector('#settingsDisconnect').addEventListener('click', () => {
                    this.sync.disconnect();
                    this.modals.closeCurrent();
                });
            }

            modal.querySelector('#settingsSave').addEventListener('click', () => {
                const cats = modal.querySelector('#settingsCategories').value.split(',').map(c => c.trim()).filter(Boolean);
                if (cats.length) this.store.set('pf.categories', cats);
                this.modals.closeCurrent();
            });

            return null;
        });
    }
}

// ============= INITIALIZE =============
document.addEventListener('DOMContentLoaded', () => { new PriorityFlowApp(); });
    </script>
</body>
</html>
