<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriorityFlow v5 - Task Scheduler</title>
    <link href="https://api.fontshare.com/css?f[]=satoshi@400,500,600,700&f[]=cabinet-grotesk@500,600,700" rel="stylesheet">
    <style>
        /* ============= ROOT & VARIABLES ============= */
        :root {
            --color-primary: #5B5BFF;
            --color-primary-light: #7B7BFF;
            --color-primary-dark: #4A4AE6;
            --color-success: #10B981;
            --color-warning: #F59E0B;
            --color-danger: #EF4444;
            --color-text: #1F2937;
            --color-text-light: #6B7280;
            --color-border: #E5E7EB;
            --color-bg: #FFFFFF;
            --color-surface: #F9FAFB;
            --color-shadow: rgba(0, 0, 0, 0.1);
            --spacing-unit: 0.5rem;
            --border-radius: 0.75rem;
            --transition: all 0.2s ease;
        }

        [data-theme="dark"] {
            --color-text: #F3F4F6;
            --color-text-light: #D1D5DB;
            --color-border: #374151;
            --color-bg: #0F0F1E;
            --color-surface: #1A1A2E;
            --color-shadow: rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: 'Satoshi', sans-serif;
            color: var(--color-text);
            background-color: var(--color-bg);
            transition: var(--transition);
        }

        /* ============= LAYOUT ============= */
        .app-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background-color: var(--color-surface);
            border-right: 1px solid var(--color-border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 1.5rem 1rem;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            background-color: var(--color-bg);
            border-bottom: 1px solid var(--color-border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
        }

        /* ============= TOPBAR ============= */
        .topbar-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .app-title {
            font-family: 'Cabinet Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-primary);
        }

        .topbar-center {
            display: flex;
            gap: 0.5rem;
            flex: 1;
        }

        #viewTabs {
            display: flex;
            gap: 0.5rem;
        }

        #viewTabs .tab-btn {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid transparent;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-family: 'Cabinet Grotesk', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--color-text-light);
            transition: var(--transition);
        }

        #viewTabs .tab-btn.active {
            background-color: var(--color-primary);
            color: white;
        }

        #viewTabs .tab-btn:hover {
            background-color: var(--color-surface);
        }

        .topbar-right {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .search-box {
            padding: 0.5rem 1rem;
            border: 1px solid var(--color-border);
            border-radius: var(--border-radius);
            background-color: var(--color-bg);
            color: var(--color-text);
            min-width: 200px;
            transition: var(--transition);
        }

        .search-box::placeholder {
            color: var(--color-text-light);
        }

        .search-box:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(91, 91, 255, 0.1);
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background-color: var(--color-surface);
            color: var(--color-text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: var(--transition);
        }

        .icon-btn:hover {
            background-color: var(--color-primary);
            color: white;
        }

        /* ============= SIDEBAR ============= */
        .sidebar-section {
            margin-bottom: 2rem;
        }

        .sidebar-title {
            font-family: 'Cabinet Grotesk', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--color-text-light);
            margin-bottom: 0.75rem;
        }

        .sync-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem;
            border-radius: var(--border-radius);
            background-color: var(--color-bg);
            cursor: pointer;
            transition: var(--transition);
        }

        .sync-status:hover {
            background-color: var(--color-border);
        }

        .sync-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #D1D5DB;
        }

        .sync-dot.connected {
            background-color: var(--color-success);
        }

        .sync-dot.syncing {
            background-color: var(--color-warning);
            animation: pulse 1.5s ease-in-out infinite;
        }

        .sync-dot.error {
            background-color: var(--color-danger);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem;
            border-radius: var(--border-radius);
            background-color: var(--color-bg);
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--color-text);
        }

        .review-dots {
            display: flex;
            gap: 0.25rem;
            margin-top: 0.5rem;
        }

        .review-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #D1D5DB;
            cursor: pointer;
            transition: var(--transition);
        }

        .review-dot.completed {
            background-color: var(--color-success);
        }

        .review-dot:hover {
            transform: scale(1.3);
        }

        .habits-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .habit-item {
            padding: 0.75rem;
            border-radius: var(--border-radius);
            background-color: var(--color-bg);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.85rem;
        }

        .habit-item:hover {
            background-color: var(--color-border);
        }

        .habit-title {
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: 0.25rem;
        }

        .habit-streak {
            color: var(--color-text-light);
            font-size: 0.75rem;
        }

        /* ============= FILTERS ============= */
        #filterTabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        #filterTabs .filter-btn {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid var(--color-border);
            border-radius: var(--border-radius);
            cursor: pointer;
            font-family: 'Cabinet Grotesk', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--color-text-light);
            transition: var(--transition);
        }

        #filterTabs .filter-btn.active {
            background-color: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }

        #filterTabs .filter-btn:hover {
            border-color: var(--color-primary);
        }

        /* ============= TASK CARDS ============= */
        .tasks-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .task-card {
            background-color: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--border-radius);
            padding: 1rem;
            transition: var(--transition);
            cursor: grab;
        }

        .task-card:active {
            cursor: grabbing;
        }

        .task-card.done {
            opacity: 0.6;
            background-color: var(--color-surface);
        }

        .task-card:hover {
            box-shadow: 0 4px 12px var(--color-shadow);
            border-color: var(--color-primary);
        }

        .task-header {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .task-checkbox {
            width: 24px;
            height: 24px;
            margin-top: 0.25rem;
            cursor: pointer;
            accent-color: var(--color-primary);
        }

        .task-info {
            flex: 1;
        }

        .task-title {
            font-family: 'Cabinet Grotesk', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            color: var(--color-text);
            margin-bottom: 0.25rem;
            text-decoration: none;
        }

        .task-card.done .task-title {
            text-decoration: line-through;
            color: var(--color-text-light);
        }

        .task-notes {
            font-size: 0.85rem;
            color: var(--color-text-light);
            margin-bottom: 0.5rem;
        }

        .task-meta {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
            align-items: center;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.5rem;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge.score {
            background-color: rgba(91, 91, 255, 0.2);
            color: var(--color-primary);
        }

        .badge.category {
            background-color: var(--color-surface);
            color: var(--color-text);
        }

        .badge.duration {
            background-color: rgba(241, 158, 11, 0.2);
            color: var(--color-text);
        }

        .badge.streak {
            background-color: rgba(16, 185, 129, 0.2);
            color: var(--color-success);
        }

        .badge.pomodoro {
            background-color: rgba(239, 68, 68, 0.2);
            color: var(--color-danger);
        }

        .task-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .action-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--color-border);
            border-radius: var(--border-radius);
            background-color: transparent;
            color: var(--color-text);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: var(--transition);
        }

        .action-btn:hover {
            background-color: var(--color-surface);
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .action-btn.primary {
            background-color: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }

        .action-btn.primary:hover {
            background-color: var(--color-primary-dark);
        }

        .action-btn.danger {
            color: var(--color-danger);
            border-color: rgba(239, 68, 68, 0.3);
        }

        .action-btn.danger:hover {
            background-color: rgba(239, 68, 68, 0.1);
        }

        /* ============= PROGRESS BAR ============= */
        .progress-container {
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .progress-bar {
            flex: 1;
            height: 4px;
            background-color: var(--color-border);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--color-success);
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 0.75rem;
            color: var(--color-text-light);
            min-width: 40px;
        }

        /* ============= SUBTASKS ============= */
        .subtasks-section {
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--color-border);
        }

        .subtasks-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .subtask-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            padding: 0.25rem;
        }

        .subtask-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--color-primary);
        }

        .subtask-text {
            flex: 1;
            color: var(--color-text);
        }

        .subtask-item input:checked ~ .subtask-text {
            text-decoration: line-through;
            color: var(--color-text-light);
        }

        /* ============= EISENHOWER MATRIX ============= */
        .eisenhower-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            height: calc(100vh - 200px);
        }

        .quadrant {
            display: flex;
            flex-direction: column;
            border: 2px solid var(--color-border);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            background-color: var(--color-bg);
        }

        .quadrant-title {
            font-family: 'Cabinet Grotesk', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 1rem;
            color: var(--color-text);
        }

        .quadrant-tasks {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .quadrant-task {
            padding: 0.75rem;
            background-color: var(--color-surface);
            border-radius: var(--border-radius);
            cursor: grab;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .quadrant-task:hover {
            border-color: var(--color-primary);
        }

        .quadrant-task.drag-over {
            opacity: 0.5;
            border-color: var(--color-primary);
        }

        /* ============= PLANNER ============= */
        .planner-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            height: calc(100vh - 200px);
            overflow-y: auto;
        }

        .time-slot {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            background-color: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--border-radius);
            transition: var(--transition);
        }

        .time-slot:hover {
            border-color: var(--color-primary);
            background-color: var(--color-surface);
        }

        .time-label {
            font-family: 'Cabinet Grotesk', sans-serif;
            font-weight: 600;
            color: var(--color-primary);
            min-width: 80px;
            text-align: center;
        }

        .slot-content {
            flex: 1;
        }

        .slot-title {
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: 0.25rem;
        }

        .slot-notes {
            font-size: 0.85rem;
            color: var(--color-text-light);
            margin-bottom: 0.5rem;
        }

        /* ============= OVERVIEW ============= */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .metric-card {
            background-color: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--border-radius);
            padding: 1.5rem;
        }

        .metric-title {
            font-family: 'Cabinet Grotesk', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--color-text-light);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        .metric-value {
            font-family: 'Cabinet Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-primary);
            margin-bottom: 0.5rem;
        }

        .metric-unit {
            font-size: 0.85rem;
            color: var(--color-text-light);
        }

        .mix-bar {
            display: flex;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            gap: 2px;
            margin-top: 1rem;
        }

        .mix-segment {
            flex: 1;
            border-radius: 2px;
        }

        .mix-segment.do {
            background-color: rgba(91, 91, 255, 0.8);
        }

        .mix-segment.schedule {
            background-color: rgba(241, 158, 11, 0.8);
        }

        .mix-segment.delegate {
            background-color: rgba(59, 130, 246, 0.8);
        }

        .mix-segment.eliminate {
            background-color: rgba(239, 68, 68, 0.8);
        }

        /* ============= MODALS ============= */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal {
            background-color: var(--color-bg);
            border-radius: var(--border-radius);
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-family: 'Cabinet Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-text);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--color-text-light);
            transition: var(--transition);
        }

        .modal-close:hover {
            color: var(--color-text);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--color-text);
        }

        .form-input,
        .form-textarea,
        .form-select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--color-border);
            border-radius: var(--border-radius);
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: 'Satoshi', sans-serif;
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(91, 91, 255, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .radio-group,
        .checkbox-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .radio-item,
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .radio-item input,
        .checkbox-item input {
            accent-color: var(--color-primary);
            cursor: pointer;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: var(--border-radius);
            font-family: 'Cabinet Grotesk', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-primary {
            background-color: var(--color-primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--color-primary-dark);
        }

        .btn-secondary {
            background-color: var(--color-surface);
            color: var(--color-text);
            border: 1px solid var(--color-border);
        }

        .btn-secondary:hover {
            background-color: var(--color-border);
        }

        .btn-danger {
            background-color: var(--color-danger);
            color: white;
        }

        .btn-danger:hover {
            background-color: #DC2626;
        }

        /* ============= POMODORO TIMER ============= */
        .pomodoro-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        .pomodoro-setup {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
        }

        .duration-options {
            display: flex;
            gap: 1rem;
        }

        .duration-btn {
            padding: 1rem 2rem;
            border: 2px solid var(--color-border);
            background-color: transparent;
            border-radius: var(--border-radius);
            font-family: 'Cabinet Grotesk', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .duration-btn:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .duration-btn.selected {
            background-color: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }

        .pomodoro-timer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .timer-ring {
            width: 300px;
            height: 300px;
            position: relative;
        }

        .timer-svg {
            width: 100%;
            height: 100%;
        }

        .timer-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .timer-time {
            font-family: 'Cabinet Grotesk', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            color: var(--color-primary);
        }

        .timer-state {
            font-size: 0.9rem;
            color: var(--color-text-light);
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .timer-controls {
            display: flex;
            gap: 1rem;
        }

        .timer-btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: var(--border-radius);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .timer-btn.primary {
            background-color: var(--color-primary);
            color: white;
        }

        .timer-btn.primary:hover {
            background-color: var(--color-primary-dark);
        }

        .timer-btn.secondary {
            background-color: var(--color-surface);
            color: var(--color-text);
            border: 1px solid var(--color-border);
        }

        .timer-btn.secondary:hover {
            background-color: var(--color-border);
        }

        .timer-stats {
            display: flex;
            gap: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--color-border);
            width: 100%;
            justify-content: center;
            font-size: 0.9rem;
        }

        .timer-stat {
            text-align: center;
        }

        .timer-stat-label {
            color: var(--color-text-light);
            font-size: 0.8rem;
        }

        .timer-stat-value {
            font-weight: 600;
            color: var(--color-primary);
        }

        /* ============= MORNING MODAL ============= */
        .morning-modal {
            background-color: var(--color-bg);
            border-radius: var(--border-radius);
            padding: 3rem 2rem;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .morning-greeting {
            text-align: center;
            margin-bottom: 2rem;
        }

        .morning-title {
            font-family: 'Cabinet Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: 0.5rem;
        }

        .morning-subtitle {
            color: var(--color-text-light);
            font-size: 0.95rem;
        }

        .mood-selector {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .mood-btn {
            width: 60px;
            height: 60px;
            border: 2px solid var(--color-border);
            background-color: transparent;
            border-radius: 50%;
            font-size: 2rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .mood-btn:hover,
        .mood-btn.selected {
            border-color: var(--color-primary);
            background-color: rgba(91, 91, 255, 0.1);
            transform: scale(1.1);
        }

        .energy-slider {
            margin-bottom: 2rem;
        }

        .energy-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--color-text-light);
            margin-bottom: 0.5rem;
        }

        .energy-input {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: linear-gradient(to right, #EF4444, #F59E0B, #10B981);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        .energy-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: var(--color-primary);
            cursor: pointer;
        }

        .energy-input::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: var(--color-primary);
            cursor: pointer;
            border: none;
        }

        .intention-input {
            width: 100%;
            padding: 1rem;
            border: 2px solid var(--color-border);
            border-radius: var(--border-radius);
            background-color: var(--color-surface);
            color: var(--color-text);
            font-family: 'Satoshi', sans-serif;
            font-size: 1rem;
            margin-bottom: 2rem;
            transition: var(--transition);
        }

        .intention-input:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        .morning-buttons {
            display: flex;
            gap: 1rem;
            flex-direction: column;
        }

        .morning-start-btn {
            padding: 1rem;
            background-color: var(--color-primary);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-family: 'Cabinet Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .morning-start-btn:hover {
            background-color: var(--color-primary-dark);
        }

        .morning-skip-btn {
            padding: 0.75rem;
            background-color: transparent;
            color: var(--color-text-light);
            border: none;
            border-radius: var(--border-radius);
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .morning-skip-btn:hover {
            color: var(--color-text);
        }

        /* ============= INTENTION BANNER ============= */
        .intention-banner {
            background-color: rgba(91, 91, 255, 0.1);
            border-left: 4px solid var(--color-primary);
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-radius: var(--border-radius);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .intention-banner-content {
            flex: 1;
        }

        .intention-banner-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--color-primary);
            margin-bottom: 0.25rem;
        }

        .intention-banner-text {
            font-weight: 600;
            color: var(--color-text);
        }

        .intention-banner-close {
            background: none;
            border: none;
            color: var(--color-text-light);
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
        }

        .intention-banner-close:hover {
            color: var(--color-text);
        }

        /* ============= RESPONSIVE ============= */
        @media (max-width: 1100px) {
            .sidebar {
                width: 240px;
                padding: 1rem 0.75rem;
            }

            .topbar {
                padding: 0.75rem 1.5rem;
                gap: 0.75rem;
            }

            .content-area {
                padding: 1.5rem;
            }

            .search-box {
                min-width: 150px;
            }
        }

        @media (max-width: 760px) {
            .app-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                max-height: 150px;
                overflow-x: auto;
                overflow-y: hidden;
                padding: 0.75rem;
                border-right: none;
                border-bottom: 1px solid var(--color-border);
                flex-direction: row;
                gap: 1.5rem;
            }

            .sidebar-section {
                display: flex;
                gap: 0.5rem;
                margin-bottom: 0;
                flex-shrink: 0;
            }

            .main-content {
                flex: 1;
            }

            .topbar {
                flex-direction: column;
                gap: 0.5rem;
                padding: 1rem;
            }

            .topbar-left,
            .topbar-right,
            .topbar-center {
                width: 100%;
                justify-content: space-between;
            }

            #viewTabs,
            #filterTabs {
                flex-wrap: wrap;
            }

            .content-area {
                padding: 1rem;
            }

            .search-box {
                min-width: 100%;
            }

            .eisenhower-grid {
                grid-template-columns: 1fr;
                height: auto;
                max-height: calc(100vh - 300px);
            }

            .quadrant {
                min-height: 300px;
            }

            .modal {
                max-width: 95vw;
                padding: 1.5rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }

        /* ============= UTILITY CLASSES ============= */
        .hidden {
            display: none !important;
        }

        .dragging {
            opacity: 0.5;
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        /* ============= SCROLLBAR ============= */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background-color: var(--color-border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background-color: var(--color-primary);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-section">
                <div class="sync-status" id="syncStatus">
                    <div class="sync-dot"></div>
                    <span style="font-size: 0.85rem;">Sync</span>
                </div>
                <div class="user-info" id="userInfo"></div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-title">This Week</div>
                <div class="review-dots" id="reviewDots"></div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-title">Habits</div>
                <div class="habits-list" id="habitsList"></div>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <!-- TOPBAR -->
            <div class="topbar">
                <div class="topbar-left">
                    <div class="app-title">PriorityFlow</div>
                </div>

                <div class="topbar-center">
                    <div id="viewTabs">
                        <button class="tab-btn active" data-view="ranked">Ranked</button>
                        <button class="tab-btn" data-view="eisenhower">Matrix</button>
                        <button class="tab-btn" data-view="planner">Planner</button>
                        <button class="tab-btn" data-view="overview">Overview</button>
                    </div>
                </div>

                <div class="topbar-right">
                    <input type="text" class="search-box" id="searchBox" placeholder="Search tasks...">
                    <button class="icon-btn" id="reviewBtn" title="Daily Review">📋</button>
                    <button class="icon-btn" id="addTaskBtn" title="Add Task">➕</button>
                    <button class="icon-btn" id="settingsBtn" title="Settings">⚙️</button>
                    <button class="icon-btn" id="themeBtn" title="Toggle Theme">🌙</button>
                </div>
            </div>

            <!-- CONTENT AREA -->
            <div class="content-area">
                <!-- INTENTION BANNER -->
                <div id="intentionBanner" class="intention-banner hidden">
                    <div class="intention-banner-content">
                        <div class="intention-banner-label">Today's Intention</div>
                        <div class="intention-banner-text" id="intentionText"></div>
                    </div>
                    <button class="intention-banner-close" id="intentionBannerClose">✕</button>
                </div>

                <!-- FILTERS -->
                <div id="filterTabs">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="high">High</button>
                    <button class="filter-btn" data-filter="today">Today</button>
                    <button class="filter-btn" data-filter="done">Done</button>
                </div>

                <!-- RANKED VIEW -->
                <div id="rankedView" class="view active">
                    <div class="tasks-container" id="tasksList"></div>
                </div>

                <!-- EISENHOWER VIEW -->
                <div id="eisenhowerView" class="view">
                    <div class="eisenhower-grid">
                        <div class="quadrant">
                            <div class="quadrant-title">Do First (Urgent & Important)</div>
                            <div class="quadrant-tasks" data-quadrant="do"></div>
                        </div>
                        <div class="quadrant">
                            <div class="quadrant-title">Schedule (Not Urgent & Important)</div>
                            <div class="quadrant-tasks" data-quadrant="schedule"></div>
                        </div>
                        <div class="quadrant">
                            <div class="quadrant-title">Delegate (Urgent & Not Important)</div>
                            <div class="quadrant-tasks" data-quadrant="delegate"></div>
                        </div>
                        <div class="quadrant">
                            <div class="quadrant-title">Eliminate (Not Urgent & Not Important)</div>
                            <div class="quadrant-tasks" data-quadrant="eliminate"></div>
                        </div>
                    </div>
                </div>

                <!-- PLANNER VIEW -->
                <div id="plannerView" class="view">
                    <div class="planner-container" id="plannerSlots"></div>
                </div>

                <!-- OVERVIEW VIEW -->
                <div id="overviewView" class="view">
                    <div class="metrics-grid" id="metricsGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODALS -->
    <div id="modals"></div>

    <script>
        // ============= PRIORITY FLOW APP CLASS =============
        class PriorityFlowApp {
            constructor() {
                this.tasks = [];
                this.currentFilter = 'all';
                this.currentView = 'ranked';
                this.draggedTask = null;
                this.draggedFromQuadrant = null;
                this.pomodoroState = null;
                this.userGitHub = null;
                this.morning = null;
                this.searchQuery = '';

                this.init();
            }

            // ============= INITIALIZATION =============
            init() {
                this.loadTasks();
                this.loadTheme();
                this.setupEventListeners();
                this.checkMorningFlow();
                this.loadReviews();
                this.loadGitHubUser();
                this.renderAll();
                this.syncWithGist();
            }

            loadTasks() {
                const stored = localStorage.getItem('priorityflow.tasks.v5');
                if (stored) {
                    this.tasks = JSON.parse(stored);
                } else {
                    this.tasks = this.getInitialTasks();
                    this.saveTasks();
                }
            }

            loadTheme() {
                const theme = localStorage.getItem('priorityflow.theme') || 'light';
                document.documentElement.setAttribute('data-theme', theme);
            }

            loadReviews() {
                const stored = localStorage.getItem('priorityflow.reviews.v5');
                this.reviews = stored ? JSON.parse(stored) : {};
            }

            loadGitHubUser() {
                const token = localStorage.getItem('priorityflow.gist.token');
                if (token) {
                    this.fetchGitHubUser(token);
                }
            }

            checkMorningFlow() {
                const today = this.getDateString(new Date());
                const completed = localStorage.getItem('priorityflow.morning.v5');
                if (!completed || !completed.includes(today)) {
                    this.showMorningModal();
                }
            }

            setupEventListeners() {
                // View tabs (scoped to #viewTabs)
                document.querySelectorAll('#viewTabs .tab-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('#viewTabs .tab-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.currentView = e.target.dataset.view;
                        this.renderAllViews();
                    });
                });

                // Filter buttons (scoped to #filterTabs)
                document.querySelectorAll('#filterTabs .filter-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('#filterTabs .filter-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.currentFilter = e.target.dataset.filter;
                        this.renderAllViews();
                    });
                });

                // Search
                document.getElementById('searchBox').addEventListener('input', (e) => {
                    this.searchQuery = e.target.value.toLowerCase();
                    this.renderAllViews();
                });

                // Buttons
                document.getElementById('addTaskBtn').addEventListener('click', () => this.showTaskModal());
                document.getElementById('reviewBtn').addEventListener('click', () => this.showReviewModal());
                document.getElementById('settingsBtn').addEventListener('click', () => this.showSettingsModal());
                document.getElementById('themeBtn').addEventListener('click', () => this.toggleTheme());

                // Sync status
                document.getElementById('syncStatus').addEventListener('click', () => this.syncWithGist());

                // Intention banner close
                const bannerClose = document.getElementById('intentionBannerClose');
                if (bannerClose) {
                    bannerClose.addEventListener('click', () => {
                        document.getElementById('intentionBanner').classList.add('hidden');
                    });
                }
            }

            // ============= DATA & PERSISTENCE =============
            getInitialTasks() {
                const seed = [
                    {title:'Run whole pipeline for two samples - resequenced', notes:'Project Oder-SO', category:'Oder-SO', urgency:3, impact:3, energy:3, interest:2, day:'Today', duration:120},
                    {title:'Analyse functional eggNOG output', notes:'Project Oder-SO', category:'Oder-SO', urgency:2, impact:3, energy:3, interest:2, day:'Today', duration:90},
                    {title:'Dashboard update with counting data and better publication-ready plots', notes:'Refine visual outputs', category:'Research', urgency:2, impact:2, energy:2, interest:3, day:'This week', duration:90},
                    {title:'Make clear plan for Manuscript Oder-SO', notes:'Outline sections and next steps', category:'Oder-SO', urgency:3, impact:3, energy:2, interest:2, day:'Today', duration:60},
                    {title:'Check whole analysis done so far, clean the outputs, and plan what needs to be finished', notes:'Review all completed work', category:'Oder-SO', urgency:2, impact:2, energy:2, interest:2, day:'This week', duration:60},
                    {title:'Potsdam student check', notes:'Admin', category:'Admin', urgency:2, impact:1, energy:1, interest:1, day:'This week', duration:30},
                    {title:'Canada visa check', notes:'Admin follow-up', category:'Admin', urgency:3, impact:2, energy:1, interest:1, day:'Today', duration:30},
                    {title:'Read mapping to bins', notes:'Oder-SO', category:'Oder-SO', urgency:2, impact:2, energy:3, interest:2, day:'This week', duration:60},
                    {title:'House clean', notes:'Weekly clean', category:'Personal', recurrence:{type:'weekly'}, urgency:1, impact:1, energy:2, interest:1, day:'This week', duration:60},
                    {title:'Credit card check', notes:'Personal finance', category:'Personal', urgency:2, impact:2, energy:1, interest:1, day:'Tomorrow', duration:30},
                    {title:'Exercise', notes:'Daily workout', category:'Health', recurrence:{type:'daily'}, urgency:2, impact:3, energy:3, interest:2, day:'Today', duration:60},
                    {title:'TML', notes:'Start-up tasks', category:'Start-up', urgency:2, impact:2, energy:2, interest:3, day:'This week', duration:60}
                ];
                return seed.map(t => ({
                    id: Date.now() + Math.random(),
                    title: t.title,
                    notes: t.notes || '',
                    category: t.category || 'Personal',
                    urgency: t.urgency || 2,
                    impact: t.impact || 2,
                    energy: t.energy || 2,
                    interest: t.interest || 2,
                    day: t.day || 'This week',
                    duration: t.duration || 60,
                    calendarDate: null,
                    done: false,
                    subtasks: [],
                    pomodoros: 0,
                    focusMinutes: 0,
                    recurrence: t.recurrence || null,
                    streak: t.recurrence ? {current: 0, best: 0, lastCompleted: null} : null,
                    manualRank: null
                }));
            }

            saveTasks() {
                localStorage.setItem('priorityflow.tasks.v5', JSON.stringify(this.tasks));
                this.syncWithGistDebounced();
            }

            // ============= SCORING =============
            calculateScore(task) {
                const urgency = task.urgency || 2;
                const impact = task.impact || 2;
                const energy = task.energy || 2;
                const interest = task.interest || 2;

                let dueBoost = 0;
                if (task.day === 'Today') dueBoost = 2;
                else if (task.day === 'Tomorrow') dueBoost = 1;

                return urgency + impact + energy + interest + dueBoost;
            }

            assignEisenhowerQuadrant(task) {
                const isUrgent = (task.urgency || 2) >= 2;
                const isImportant = (task.impact || 2) >= 2;

                if (isUrgent && isImportant) return 'do';
                if (!isUrgent && isImportant) return 'schedule';
                if (isUrgent && !isImportant) return 'delegate';
                return 'eliminate';
            }

            // ============= FILTERING =============
            getFilteredAndSearchedTasks() {
                let filtered = [...this.tasks];

                // Filter by status/filter
                if (this.currentFilter === 'high') {
                    filtered = filtered.filter(t => !t.done && (t.urgency || 2) >= 2 && (t.impact || 2) >= 2);
                } else if (this.currentFilter === 'today') {
                    filtered = filtered.filter(t => !t.done && t.day === 'Today');
                } else if (this.currentFilter === 'done') {
                    filtered = filtered.filter(t => t.done);
                } else {
                    // 'all' - no filter
                }

                // Search
                if (this.searchQuery) {
                    filtered = filtered.filter(t =>
                        t.title.toLowerCase().includes(this.searchQuery) ||
                        t.notes.toLowerCase().includes(this.searchQuery) ||
                        t.category.toLowerCase().includes(this.searchQuery)
                    );
                }

                return filtered;
            }

            sortTasks(tasks) {
                const sortedTasks = [...tasks];
                const doneTasks = sortedTasks.filter(t => t.done);
                const activeTasks = sortedTasks.filter(t => !t.done);

                activeTasks.sort((a, b) => {
                    if (a.manualRank !== null && b.manualRank !== null) {
                        return a.manualRank - b.manualRank;
                    }
                    return this.calculateScore(b) - this.calculateScore(a);
                });

                return [...activeTasks, ...doneTasks];
            }

            // ============= RENDERING =============
            renderAll() {
                this.renderHabits();
                this.renderReviewDots();
            }

            renderAllViews() {
                if (this.currentView === 'ranked') this.renderRankedView();
                else if (this.currentView === 'eisenhower') this.renderEisenhowerView();
                else if (this.currentView === 'planner') this.renderPlannerView();
                else if (this.currentView === 'overview') this.renderOverviewView();

                this.renderHabits();
                this.renderReviewDots();
            }

            renderRankedView() {
                // Show/hide views
                document.getElementById('rankedView').classList.add('active');
                document.getElementById('eisenhowerView').classList.remove('active');
                document.getElementById('plannerView').classList.remove('active');
                document.getElementById('overviewView').classList.remove('active');

                const filtered = this.getFilteredAndSearchedTasks();
                const sorted = this.sortTasks(filtered);
                const container = document.getElementById('tasksList');
                container.innerHTML = '';

                sorted.forEach((task, index) => {
                    const card = this.createTaskCard(task, index);
                    container.appendChild(card);
                });

                this.setupDragAndDrop();
            }

            createTaskCard(task, index) {
                const card = document.createElement('div');
                card.className = `task-card ${task.done ? 'done' : ''}`;
                card.draggable = !task.done;
                card.dataset.taskId = task.id;
                card.dataset.index = index;

                const score = this.calculateScore(task);
                const completedSubtasks = task.subtasks.filter(s => s.done).length;
                const totalSubtasks = task.subtasks.length;

                let html = `
                    <div class="task-header">
                        <input type="checkbox" class="task-checkbox" ${task.done ? 'checked' : ''}>
                        <div class="task-info">
                            <div class="task-title">${this.escapeHtml(task.title)}</div>
                            ${task.notes ? `<div class="task-notes">${this.escapeHtml(task.notes)}</div>` : ''}
                            <div class="task-meta">
                                <span class="badge score">${score}</span>
                                <span class="badge category">${task.category}</span>
                                <span class="badge duration">⏱️ ${task.duration}m</span>
                                ${task.recurrence ? `<span class="badge">↻ ${task.recurrence.type}</span>` : ''}
                                ${task.streak && task.streak.current > 0 ? `<span class="badge streak">🔥 ${task.streak.current}d</span>` : ''}
                                ${task.pomodoros > 0 ? `<span class="badge pomodoro">🍅 ×${task.pomodoros}</span>` : ''}
                                ${task.focusMinutes > 0 ? `<span class="badge">${Math.floor(task.focusMinutes / 60)}h ${task.focusMinutes % 60}m</span>` : ''}
                            </div>
                `;

                if (totalSubtasks > 0) {
                    html += `
                        <div class="progress-container">
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${(completedSubtasks / totalSubtasks) * 100}%"></div>
                            </div>
                            <div class="progress-text">${completedSubtasks}/${totalSubtasks}</div>
                        </div>
                    `;
                }

                html += `</div></div>`;

                if (task.subtasks.length > 0) {
                    html += `
                        <div class="subtasks-section">
                            <div class="subtasks-list">
                    `;
                    task.subtasks.forEach((subtask, i) => {
                        html += `
                            <label class="subtask-item">
                                <input type="checkbox" class="subtask-checkbox" data-task-id="${task.id}" data-subtask-index="${i}" ${subtask.done ? 'checked' : ''}>
                                <span class="subtask-text">${this.escapeHtml(subtask.text)}</span>
                            </label>
                        `;
                    });
                    html += `</div></div>`;
                }

                html += `
                    <div class="task-actions">
                        <button class="action-btn">✏️ Edit</button>
                        <button class="action-btn primary">🎯 Focus</button>
                        <button class="action-btn">⏭️ Skip</button>
                        <button class="action-btn danger">🗑️ Delete</button>
                    </div>
                `;

                card.innerHTML = html;

                // Event listeners
                const checkbox = card.querySelector('.task-checkbox');
                checkbox.addEventListener('change', () => {
                    this.toggleTask(task.id);
                });

                card.querySelectorAll('.subtask-checkbox').forEach(checkbox => {
                    checkbox.addEventListener('change', (e) => {
                        const taskId = parseInt(e.target.dataset.taskId);
                        const subtaskIndex = parseInt(e.target.dataset.subtaskIndex);
                        this.toggleSubtask(taskId, subtaskIndex);
                    });
                });

                const [editBtn, focusBtn, skipBtn, deleteBtn] = card.querySelectorAll('.action-btn');
                editBtn.addEventListener('click', () => this.showTaskModal(task));
                focusBtn.addEventListener('click', () => this.showPomodoroSetup(task));
                skipBtn.addEventListener('click', () => this.skipTask(task));
                deleteBtn.addEventListener('click', () => this.confirmDelete(task));

                return card;
            }

            renderEisenhowerView() {
                // Show/hide views
                document.getElementById('rankedView').classList.remove('active');
                document.getElementById('eisenhowerView').classList.add('active');
                document.getElementById('plannerView').classList.remove('active');
                document.getElementById('overviewView').classList.remove('active');

                // Clear all quadrants
                document.querySelectorAll('.quadrant-tasks').forEach(q => q.innerHTML = '');

                const filtered = this.getFilteredAndSearchedTasks();
                const notDone = filtered.filter(t => !t.done);

                notDone.forEach(task => {
                    const quadrant = this.assignEisenhowerQuadrant(task);
                    const quadrantEl = document.querySelector(`.quadrant-tasks[data-quadrant="${quadrant}"]`);
                    if (quadrantEl) {
                        const taskEl = document.createElement('div');
                        taskEl.className = 'quadrant-task';
                        taskEl.draggable = true;
                        taskEl.dataset.taskId = task.id;
                        taskEl.innerHTML = `
                            <div style="font-weight: 600; margin-bottom: 0.25rem;">${this.escapeHtml(task.title)}</div>
                            <div style="font-size: 0.85rem; color: var(--color-text-light);">${this.escapeHtml(task.notes)}</div>
                        `;
                        quadrantEl.appendChild(taskEl);
                    }
                });

                this.setupQuadrantDragDrop();
            }

            renderPlannerView() {
                // Show/hide views
                document.getElementById('rankedView').classList.remove('active');
                document.getElementById('eisenhowerView').classList.remove('active');
                document.getElementById('plannerView').classList.add('active');
                document.getElementById('overviewView').classList.remove('active');

                const filtered = this.getFilteredAndSearchedTasks();
                const notDone = filtered.filter(t => !t.done);
                const sorted = this.sortTasks(notDone);

                const container = document.getElementById('plannerSlots');
                container.innerHTML = '';

                let currentTime = new Date();
                currentTime.setMinutes(Math.round(currentTime.getMinutes() / 15) * 15);
                currentTime.setSeconds(0);

                sorted.forEach(task => {
                    const startTime = new Date(currentTime);
                    const durationMs = (task.duration || 60) * 60 * 1000;
                    const endTime = new Date(startTime.getTime() + durationMs);

                    const startHours = String(startTime.getHours()).padStart(2, '0');
                    const startMins = String(startTime.getMinutes()).padStart(2, '0');
                    const endHours = String(endTime.getHours()).padStart(2, '0');
                    const endMins = String(endTime.getMinutes()).padStart(2, '0');

                    const slot = document.createElement('div');
                    slot.className = 'time-slot';
                    slot.innerHTML = `
                        <div class="time-label">${startHours}:${startMins} - ${endHours}:${endMins}</div>
                        <div class="slot-content">
                            <div class="slot-title">${this.escapeHtml(task.title)}</div>
                            ${task.notes ? `<div class="slot-notes">${this.escapeHtml(task.notes)}</div>` : ''}
                            <button class="action-btn primary" style="font-size: 0.8rem; margin-top: 0.5rem;">▶️ Start Focus</button>
                        </div>
                    `;

                    const startBtn = slot.querySelector('button');
                    startBtn.addEventListener('click', () => this.showPomodoroSetup(task));

                    container.appendChild(slot);
                    currentTime = endTime;
                });
            }

            renderOverviewView() {
                // Show/hide views
                document.getElementById('rankedView').classList.remove('active');
                document.getElementById('eisenhowerView').classList.remove('active');
                document.getElementById('plannerView').classList.remove('active');
                document.getElementById('overviewView').classList.add('active');

                const tasks = this.tasks;
                const doneTasks = tasks.filter(t => t.done);
                const activeTasks = tasks.filter(t => !t.done);

                const totalFocusMinutes = tasks.reduce((sum, t) => sum + (t.focusMinutes || 0), 0);
                const totalPomodoros = tasks.reduce((sum, t) => sum + (t.pomodoros || 0), 0);
                const completionRate = tasks.length > 0 ? Math.round((doneTasks.length / tasks.length) * 100) : 0;

                const quadrants = {
                    do: 0,
                    schedule: 0,
                    delegate: 0,
                    eliminate: 0
                };

                activeTasks.forEach(t => {
                    const q = this.assignEisenhowerQuadrant(t);
                    quadrants[q]++;
                });

                const container = document.getElementById('metricsGrid');
                container.innerHTML = `
                    <div class="metric-card">
                        <div class="metric-title">Priority Load</div>
                        <div class="metric-value">${activeTasks.length}</div>
                        <div class="metric-unit">Active tasks</div>
                        <div class="mix-bar">
                            ${quadrants.do > 0 ? `<div class="mix-segment do" style="flex: ${quadrants.do}"></div>` : ''}
                            ${quadrants.schedule > 0 ? `<div class="mix-segment schedule" style="flex: ${quadrants.schedule}"></div>` : ''}
                            ${quadrants.delegate > 0 ? `<div class="mix-segment delegate" style="flex: ${quadrants.delegate}"></div>` : ''}
                            ${quadrants.eliminate > 0 ? `<div class="mix-segment eliminate" style="flex: ${quadrants.eliminate}"></div>` : ''}
                        </div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-title">Deep Work Hours</div>
                        <div class="metric-value">${Math.floor(totalFocusMinutes / 60)}</div>
                        <div class="metric-unit">hours focused</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-title">Completion Rate</div>
                        <div class="metric-value">${completionRate}%</div>
                        <div class="metric-unit">${doneTasks.length} of ${tasks.length} done</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-title">Focus Sessions</div>
                        <div class="metric-value">${totalPomodoros}</div>
                        <div class="metric-unit">pomodoros completed</div>
                    </div>
                `;
            }

            renderHabits() {
                const habits = this.tasks.filter(t => t.recurrence && !t.done);
                const container = document.getElementById('habitsList');
                container.innerHTML = '';

                habits.forEach(habit => {
                    const item = document.createElement('div');
                    item.className = 'habit-item';
                    item.innerHTML = `
                        <div class="habit-title">${this.escapeHtml(habit.title)}</div>
                        <div class="habit-streak">${habit.streak ? `🔥 ${habit.streak.current}d (best: ${habit.streak.best}d)` : 'No streak'}</div>
                    `;
                    container.appendChild(item);
                });
            }

            renderReviewDots() {
                const container = document.getElementById('reviewDots');
                container.innerHTML = '';

                const today = new Date();
                for (let i = 6; i >= 0; i--) {
                    const date = new Date(today);
                    date.setDate(date.getDate() - i);
                    const dateStr = this.getDateString(date);

                    const dot = document.createElement('div');
                    dot.className = `review-dot ${this.reviews[dateStr] ? 'completed' : ''}`;
                    dot.title = dateStr;
                    container.appendChild(dot);
                }
            }

            // ============= DRAG AND DROP =============
            setupDragAndDrop() {
                const tasks = document.querySelectorAll('.task-card');
                tasks.forEach(taskEl => {
                    taskEl.addEventListener('dragstart', (e) => {
                        if (!taskEl.querySelector('.task-checkbox').checked) {
                            this.draggedTask = taskEl.dataset.taskId;
                            taskEl.classList.add('dragging');
                        } else {
                            e.preventDefault();
                        }
                    });

                    taskEl.addEventListener('dragend', () => {
                        taskEl.classList.remove('dragging');
                    });

                    taskEl.addEventListener('dragover', (e) => {
                        e.preventDefault();
                        if (this.draggedTask && this.draggedTask !== taskEl.dataset.taskId) {
                            const allCards = document.querySelectorAll('.task-card');
                            const draggedIndex = Array.from(allCards).findIndex(c => c.dataset.taskId === this.draggedTask);
                            const targetIndex = parseInt(taskEl.dataset.index);

                            if (draggedIndex !== targetIndex) {
                                const dragged = this.tasks.find(t => t.id == this.draggedTask);
                                const target = this.tasks.find(t => t.id == taskEl.dataset.taskId);

                                if (dragged && target && !dragged.done && !target.done) {
                                    dragged.manualRank = dragged.manualRank !== null ? dragged.manualRank : draggedIndex;
                                    target.manualRank = target.manualRank !== null ? target.manualRank : targetIndex;

                                    [dragged.manualRank, target.manualRank] = [target.manualRank, dragged.manualRank];

                                    this.saveTasks();
                                    this.renderRankedView();
                                }
                            }
                        }
                    });
                });
            }

            setupQuadrantDragDrop() {
                const tasks = document.querySelectorAll('.quadrant-task');
                const quadrants = document.querySelectorAll('.quadrant-tasks');

                tasks.forEach(taskEl => {
                    taskEl.addEventListener('dragstart', (e) => {
                        this.draggedTask = taskEl.dataset.taskId;
                        this.draggedFromQuadrant = taskEl.closest('.quadrant-tasks').dataset.quadrant;
                    });

                    taskEl.addEventListener('dragend', () => {
                        this.draggedTask = null;
                        this.draggedFromQuadrant = null;
                    });
                });

                quadrants.forEach(quad => {
                    quad.addEventListener('dragover', (e) => {
                        e.preventDefault();
                        quad.classList.add('drag-over');
                    });

                    quad.addEventListener('dragleave', () => {
                        quad.classList.remove('drag-over');
                    });

                    quad.addEventListener('drop', (e) => {
                        e.preventDefault();
                        quad.classList.remove('drag-over');

                        if (this.draggedTask) {
                            const task = this.tasks.find(t => t.id == this.draggedTask);
                            if (task) {
                                const newQuadrant = quad.dataset.quadrant;
                                if (newQuadrant === 'do') {
                                    task.urgency = 3;
                                    task.impact = 3;
                                } else if (newQuadrant === 'schedule') {
                                    task.urgency = 1;
                                    task.impact = 3;
                                } else if (newQuadrant === 'delegate') {
                                    task.urgency = 3;
                                    task.impact = 1;
                                } else {
                                    task.urgency = 1;
                                    task.impact = 1;
                                }
                                this.saveTasks();
                                this.renderEisenhowerView();
                            }
                        }
                    });
                });
            }

            // ============= TASK OPERATIONS =============
            toggleTask(taskId) {
                const task = this.tasks.find(t => t.id == taskId);
                if (task) {
                    task.done = !task.done;
                    if (task.done && task.recurrence) {
                        this.createNextOccurrence(task);
                    }
                    this.saveTasks();
                    this.renderAllViews();
                }
            }

            createNextOccurrence(task) {
                const taskTitle = task.title;
                const existingPending = this.tasks.find(t =>
                    t.title === taskTitle &&
                    t.recurrence &&
                    !t.done &&
                    t.id !== task.id
                );

                if (existingPending) {
                    return;
                }

                const nextTask = JSON.parse(JSON.stringify(task));
                nextTask.id = Date.now() + Math.random();
                nextTask.done = false;
                nextTask.pomodoros = 0;
                nextTask.focusMinutes = 0;
                nextTask.subtasks = nextTask.subtasks.map(s => ({...s, done: false}));

                if (task.streak) {
                    nextTask.streak = {
                        current: task.streak.current + 1,
                        best: Math.max(task.streak.current + 1, task.streak.best),
                        lastCompleted: this.getDateString(new Date())
                    };
                }

                const today = new Date();
                if (task.recurrence.type === 'daily') {
                    nextTask.day = 'Tomorrow';
                } else if (task.recurrence.type === 'weekly') {
                    nextTask.day = 'This week';
                } else if (task.recurrence.type === 'weekdays') {
                    const tomorrow = new Date(today);
                    tomorrow.setDate(tomorrow.getDate() + 1);
                    if (tomorrow.getDay() === 0 || tomorrow.getDay() === 6) {
                        const nextWeekday = new Date(tomorrow);
                        nextWeekday.setDate(nextWeekday.getDate() + (tomorrow.getDay() === 0 ? 1 : 2));
                        nextTask.day = 'This week';
                    } else {
                        nextTask.day = 'Tomorrow';
                    }
                }

                this.tasks.push(nextTask);
            }

            toggleSubtask(taskId, subtaskIndex) {
                const task = this.tasks.find(t => t.id == taskId);
                if (task && task.subtasks[subtaskIndex]) {
                    task.subtasks[subtaskIndex].done = !task.subtasks[subtaskIndex].done;
                    this.saveTasks();
                    this.renderRankedView();
                }
            }

            skipTask(task) {
                if (task.day === 'Today') {
                    task.day = 'Tomorrow';
                } else if (task.day === 'Tomorrow') {
                    task.day = 'This week';
                }
                this.saveTasks();
                this.renderAllViews();
            }

                                        <option value="Tomorrow" ${isEdit && task.day === 'Tomorrow' ? 'selected' : ''}>Tomorrow</option>
                                        <option value="This week" ${isEdit && task.day === 'This week' ? 'selected' : ''}>This week</option>

                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label">Duration (min)</label>
                                    <select class="form-select" id="taskDuration">

                                    <select class="form-select" id="taskRecurrence">

                                        <option value="daily" ${isEdit && task.recurrence?.type === 'daily' ? 'selected' : ''}>Daily</option>
                                        <option value="weekly" ${isEdit && task.recurrence?.type === 'weekly' ? 'selected' : ''}>Weekly</option>
                                        <option value="weekdays" ${isEdit && task.recurrence?.type === 'weekdays' ? 'selected' : ''}>Weekdays</option>
                                    </select>
                                </div>
                            </div>

                            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                                <div class="form-group">
                                    <label class="form-label">Urgency (1-3)</label>
                                    <select class="form-select" id="taskUrgency">
                                        <option value="1" ${isEdit && task.urgency === 1 ? 'selected' : ''}>1 - Low</option>
                                        <option value="2" ${isEdit && task.urgency === 2 ? 'selected' : ''}>2 - Med</option>
                                        <option value="3" ${isEdit && task.urgency === 3 ? 'selected' : ''}>3 - High</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Impact (1-3)</label>
                                    <select class="form-select" id="taskImpact">
                                        <option value="1" ${isEdit && task.impact === 1 ? 'selected' : ''}>1 - Low</option>
                                        <option value="2" ${isEdit && task.impact === 2 ? 'selected' : ''}>2 - Med</option>
                                        <option value="3" ${isEdit && task.impact === 3 ? 'selected' : ''}>3 - High</option>

                                    <label class="form-label">Energy (1-3)</label>
                                    <select class="form-select" id="taskEnergy">
                                        <option value="1" ${isEdit && task.energy === 1 ? 'selected' : ''}>1 - Low</option>
                                        <option value="2" ${isEdit && task.energy === 2 ? 'selected' : ''}>2 - Med</option>
                                        <option value="3" ${isEdit && task.energy === 3 ? 'selected' : ''}>3 - High</option>

                                    <label class="form-label">Interest (1-3)</label>
                                    <select class="form-select" id="taskInterest">
                                        <option value="1" ${isEdit && task.interest === 1 ? 'selected' : ''}>1 - Low</option>
                                        <option value="2" ${isEdit && task.interest === 2 ? 'selected' : ''}>2 - Med</option>
                                        <option value="3" ${isEdit && task.interest === 3 ? 'selected' : ''}>3 - High</option>

                                    <button type="button" class="btn btn-secondary" id="addSubtaskBtn">Add</button>
                                </div>
                                <div id="subtasksList" style="display: flex; flex-direction: column; gap: 0.5rem;">
                                    ${isEdit && task.subtasks ? task.subtasks.map((s, i) => `
                                        <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.5rem; background-color: var(--color-surface); border-radius: var(--border-radius);">
                                            <span>${this.escapeHtml(s.text)}</span>
                                            <button type="button" class="btn btn-danger" style="padding: 0.25rem 0.75rem; font-size: 0.8rem;" data-subtask-index="${i}">Remove</button>

                            </div>
