                </div>
            </div>
        </div>`;
    }

    _attachEvents() {
        this.container.querySelectorAll('[data-action]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = Number(btn.dataset.id);
                const action = btn.dataset.action;
                if (action === 'toggle') this.tm.toggle(id);
                else if (action === 'edit') this.bus.emit('ui:editTask', id);
                else if (action === 'delete') { if (confirm('Delete this task?')) this.tm.delete(id); }
                else if (action === 'skip') this.tm.skip(id);
                else if (action === 'focus') this.bus.emit('ui:startPomodoro', id);
                else if (action === 'launch') this.bus.emit('ui:launchTask', id);
                else if (action === 'micro') this.bus.emit('ui:microTimer', id);
            });
        });

        // Swipe-to-delete (horizontal-only — vertical scrolling is never blocked)
        this.container.querySelectorAll('.task-card-wrapper').forEach(wrapper => {
            const card = wrapper.querySelector('.task-card');
            const handle = wrapper.querySelector('.task-card-wrapper__drag');
            const id = Number(wrapper.dataset.id);
            let startX = 0, startY = 0, currentX = 0, swiping = false, directionLocked = false, isHorizontal = false;

            // Don't start swipe from the drag handle (that's for reordering)
            const swipeStartEls = [card];
            swipeStartEls.forEach(el => {
                el.addEventListener('touchstart', (e) => {
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                    currentX = 0;
                    swiping = true;
                    directionLocked = false;
                    isHorizontal = false;
                    card.style.transition = 'none';
                    if (handle) handle.style.transition = 'none';
                }, { passive: true });
            });

            wrapper.addEventListener('touchmove', (e) => {
                if (!swiping) return;
                const dx = e.touches[0].clientX - startX;
                const dy = e.touches[0].clientY - startY;

                // Lock direction after 12px of movement
                if (!directionLocked && (Math.abs(dx) > 12 || Math.abs(dy) > 12)) {
                    directionLocked = true;
                    isHorizontal = Math.abs(dx) > Math.abs(dy) * 1.5; // need clearly horizontal
                }
                if (!directionLocked || !isHorizontal) return; // allow normal scroll

                currentX = dx;
                if (currentX > 0) currentX = 0; // only swipe left
                if (currentX < -100) currentX = -100;
                e.preventDefault(); // block scroll only when swiping horizontally
                card.style.transform = `translateX(${currentX}px)`;
                if (handle) handle.style.transform = `translateX(${currentX}px)`;
            }, { passive: false });

            const setTransform = (val, transition) => {
                card.style.transition = transition;
                card.style.transform = val;
                if (handle) {
                    handle.style.transition = transition;
                    handle.style.transform = val;
                }
            };

            const endSwipe = () => {
                if (!swiping) return;
                swiping = false;
                if (isHorizontal && currentX < -60) {
                    setTransform('translateX(-80px)', 'transform 0.2s ease');
                    if (confirm('Are you sure you want to delete this task?')) {
                        setTransform('translateX(-100%)', 'transform 0.2s ease');
                        setTimeout(() => { this.tm.delete(id); }, 200);
                    } else {
                        setTransform('translateX(0)', 'transform 0.2s ease');
                    }
                } else {
                    setTransform('translateX(0)', 'transform 0.2s ease');
                }
            };
            wrapper.addEventListener('touchend', endSwipe);
            wrapper.addEventListener('touchcancel', endSwipe);

            // Desktop: click delete background
            wrapper.querySelector('.task-card-wrapper__delete').addEventListener('click', () => {
                if (confirm('Delete this task?')) this.tm.delete(id);
            });
        });

        // Drag and drop (desktop) — initiated from handle only
        this.container.querySelectorAll('[data-drag-handle]').forEach(handle => {
            const wrapper = handle.closest('.task-card-wrapper');
            const card = wrapper.querySelector('.task-card');
            handle.addEventListener('dragstart', (e) => {
                this._draggedId = Number(handle.dataset.id);
                wrapper.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
            });
            handle.addEventListener('dragend', () => { wrapper.classList.remove('dragging'); this._draggedId = null; });
        });
        // Drop targets are the wrappers
        this.container.querySelectorAll('.task-card-wrapper').forEach(wrapper => {
            wrapper.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
            wrapper.addEventListener('drop', (e) => {
                e.preventDefault();
                const targetId = Number(wrapper.dataset.id);
                if (this._draggedId === null || this._draggedId === targetId) return;
                const dragged = this.tm.getById(this._draggedId);
                const target = this.tm.getById(targetId);
                if (!dragged || !target || dragged.done || target.done) return;
                const wrappers = [...this.container.querySelectorAll('.task-card-wrapper')];
                const dragIdx = wrappers.findIndex(w => Number(w.dataset.id) === this._draggedId);
                const targetIdx = wrappers.findIndex(w => Number(w.dataset.id) === targetId);
                dragged.manualRank = targetIdx;
                target.manualRank = dragIdx;
                this.tm.save();
            });
        });

        // Touch drag support for mobile — only via the drag handle grip
        TouchDrag.setup(this.container, {
            items: '.task-card-wrapper',
            handles: '[data-drag-handle]',
            onDrop: (draggedId, targetEl) => {
                const targetWrapper = targetEl.closest('.task-card-wrapper');
                const targetCard = targetWrapper ? targetWrapper.querySelector('.task-card') : targetEl;
                const targetId = Number((targetWrapper || targetEl).dataset.id);
                if (!draggedId || draggedId === targetId) return;
                const dragged = this.tm.getById(draggedId);
                const target = this.tm.getById(targetId);
                if (!dragged || !target || dragged.done || target.done) return;
                const wrappers = [...this.container.querySelectorAll('.task-card-wrapper')];
                const dragIdx = wrappers.findIndex(w => Number(w.dataset.id) === draggedId);
                const targetIdx = wrappers.findIndex(w => Number(w.dataset.id) === targetId);
                dragged.manualRank = targetIdx;
                target.manualRank = dragIdx;
                this.tm.save();
            }
        });
    }
}

// --- Eisenhower View ---
class EisenhowerViewRenderer {
    constructor(bus, taskManager) {
        this.bus = bus;
        this.tm = taskManager;
        this.container = document.getElementById('eisenhowerView');
    }

    render(filter, query) {
        const tasks = this.tm.getFiltered(filter, query);
        const groups = { do: [], schedule: [], delegate: [], eliminate: [] };
        tasks.forEach(t => { const q = this.tm.quadrant(t); groups[q].push(t); });

        this.container.innerHTML = `<div class="eisenhower-grid">
            ${this._quadrantHTML('do', 'Do First', groups.do)}
            ${this._quadrantHTML('schedule', 'Schedule', groups.schedule)}
            ${this._quadrantHTML('delegate', 'Delegate', groups.delegate)}
            ${this._quadrantHTML('eliminate', 'Eliminate', groups.eliminate)}
        </div>`;
        this._attachDragDrop();
    }

    _quadrantHTML(key, label, tasks) {
        return `<div class="quadrant quadrant--${key}" data-quadrant="${key}">
            <div class="quadrant__header"><span class="quadrant__dot"></span>${label} (${tasks.length})</div>
            <div class="quadrant__tasks">${tasks.map(t => `<div class="task-card" data-id="${t.id}" draggable="true" style="padding:0.5rem 0.7rem">
                <div class="task-card__check${t.done ? ' done' : ''}" data-action="toggle" data-id="${t.id}">${t.done ? '&#10003;' : ''}</div>
                <div class="task-card__body"><div class="task-card__title${t.done ? ' done' : ''}" style="font-size:0.85rem">${esc(t.title)}</div></div>
            </div>`).join('')}</div>
        </div>`;
    }

    _attachDragDrop() {
        let dragId = null;
        this.container.querySelectorAll('.task-card[draggable]').forEach(card => {
            card.addEventListener('dragstart', () => { dragId = Number(card.dataset.id); card.classList.add('dragging'); });
            card.addEventListener('dragend', () => card.classList.remove('dragging'));
        });
        this.container.querySelectorAll('[data-action="toggle"]').forEach(btn => {
            btn.addEventListener('click', (e) => { e.stopPropagation(); this.tm.toggle(Number(btn.dataset.id)); });
        });
        this.container.querySelectorAll('.quadrant').forEach(quad => {
            quad.addEventListener('dragover', (e) => { e.preventDefault(); quad.classList.add('drag-over'); });
            quad.addEventListener('dragleave', () => quad.classList.remove('drag-over'));
            quad.addEventListener('drop', (e) => {
                e.preventDefault();
                quad.classList.remove('drag-over');
                if (dragId === null) return;
                const task = this.tm.getById(dragId);
                if (!task) return;
                const q = quad.dataset.quadrant;
                if (q === 'do') { task.urgency = 3; task.impact = 3; }
                else if (q === 'schedule') { task.urgency = 1; task.impact = 3; }
                else if (q === 'delegate') { task.urgency = 3; task.impact = 1; }
                else { task.urgency = 1; task.impact = 1; }
                this.tm.save();
                dragId = null;
            });
        });

        // Touch drag support for mobile
        TouchDrag.setup(this.container, {
            items: '.task-card[draggable]',
            dropZones: '.quadrant',
            onDrop: (draggedId, quadEl) => {
                const task = this.tm.getById(draggedId);
                if (!task) return;
                const q = quadEl.dataset.quadrant;
                if (q === 'do') { task.urgency = 3; task.impact = 3; }
                else if (q === 'schedule') { task.urgency = 1; task.impact = 3; }
                else if (q === 'delegate') { task.urgency = 3; task.impact = 1; }
                else { task.urgency = 1; task.impact = 1; }
                this.tm.save();
            }
        });
    }
}

// --- Planner View ---
class PlannerViewRenderer {
    constructor(bus, taskManager) {
        this.bus = bus;
        this.tm = taskManager;
        this.container = document.getElementById('plannerView');
        this._draggedId = null;
    }

    _timeToSlotKey(t) {
        // "HH:MM" -> round down to nearest 30min slot
        const [h, m] = t.split(':').map(Number);
        return `${String(h).padStart(2, '0')}:${m < 30 ? '00' : '30'}`;
    }

    render() {
        const todayTasks = this.tm.sorted(this.tm.tasks.filter(t => t.day === 'Today' && !t.done));
        const now = new Date();
        const currentHour = now.getHours();
        const currentMin = now.getMinutes();
        const currentSlotKey = `${String(currentHour).padStart(2, '0')}:${currentMin < 30 ? '00' : '30'}`;

        // Build all slots 5:00–23:30
        const slots = [];
        for (let h = 5; h <= 23; h++) {
            for (let m = 0; m < 60; m += 30) {
                const time = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
                const isPast = h < currentHour || (h === currentHour && m < currentMin);
                const isCurrent = time === currentSlotKey;
                slots.push({ time, task: null, isPast, isCurrent });
            }
        }

        // Helper: fill slots for a task's full duration
        const fillSlots = (startSlotIdx, task) => {
            const slotsNeeded = Math.max(1, Math.ceil((task.duration || 30) / 30));
            for (let i = 0; i < slotsNeeded && (startSlotIdx + i) < slots.length; i++) {
                const slot = slots[startSlotIdx + i];
                if (i === 0) {
                    slot.task = task;
                    slot.isStart = true;
                    slot.spanCount = slotsNeeded;
                } else if (!slot.task) {
                    slot.task = task;
                    slot.isContinuation = true;
                }
            }
        };

        // First pass: place tasks with a scheduledTime into their pinned slots
        const scheduled = todayTasks.filter(t => t.scheduledTime);
        const unscheduled = todayTasks.filter(t => !t.scheduledTime);

        scheduled.forEach(task => {
            const key = this._timeToSlotKey(task.scheduledTime);
            const idx = slots.findIndex(s => s.time === key);
            if (idx >= 0 && !slots[idx].task) fillSlots(idx, task);
        });

        // Second pass: auto-assign unscheduled tasks into empty slots from now
        const startIdx = Math.max(0, slots.findIndex(s => !s.isPast));
        let slotIdx = startIdx;
        unscheduled.forEach(task => {
            const slotsNeeded = Math.max(1, Math.ceil((task.duration || 30) / 30));
            // Find a gap big enough for this task
            while (slotIdx < slots.length) {
                if (!slots[slotIdx].task) {
                    let fits = true;
                    for (let i = 0; i < slotsNeeded && (slotIdx + i) < slots.length; i++) {
                        if (slots[slotIdx + i].task) { fits = false; break; }
                    }
                    if (fits) break;
                }
                slotIdx++;
            }
            if (slotIdx < slots.length) {
                fillSlots(slotIdx, task);
                slotIdx += slotsNeeded;
            }
        });

        // Calculate end time for tasks
        const taskEndTime = (slotTime, duration) => {
            const [h, m] = slotTime.split(':').map(Number);
            const total = h * 60 + m + (duration || 30);
            return `${String(Math.floor(total / 60) % 24).padStart(2, '0')}:${String(total % 60).padStart(2, '0')}`;
        };

        this.container.innerHTML = `<div class="planner-grid">${slots.map(s => {
            const isStart = s.task && s.isStart;
            const isCont = s.task && s.isContinuation;
            const taskLabel = isStart
                ? `${s.task.type === 'todo' ? '<span style="color:var(--c-primary);font-size:0.7rem;font-weight:700;margin-right:0.3rem">TODO</span>' : ''}${esc(s.task.title)} <span style="opacity:0.6;font-size:0.75rem;margin-left:0.35rem">${s.task.duration}m \u2192 ${taskEndTime(slots[slots.indexOf(s)].time, s.task.duration)}</span>`
                : isCont ? `<span style="opacity:0.4;font-size:0.8rem">\u2502 ${esc(s.task.title)}</span>` : '';
            return `<div class="planner-slot${s.isCurrent ? ' planner-slot--now' : ''}${s.isPast ? ' planner-slot--past' : ''}${isCont ? ' planner-slot--cont' : ''}" data-time="${s.time}" ${s.isCurrent ? 'id="plannerNow"' : ''}>
                <div class="planner-slot__time">${s.time}</div>
                <div class="planner-slot__task ${s.task ? 'has-task' : 'empty'}${isCont ? ' is-continuation' : ''}" ${isStart ? `data-id="${s.task.id}" draggable="true"` : ''}>
                    ${taskLabel || (s.isCurrent ? 'Now' : '')}
                </div>
            </div>`;
        }).join('')}</div>`;

        this._attachEvents();

        // Scroll to current time
        const nowEl = document.getElementById('plannerNow');
        if (nowEl) nowEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    _attachEvents() {
        // Click to edit
        this.container.querySelectorAll('.planner-slot__task[data-id]').forEach(el => {
            el.addEventListener('click', () => this.bus.emit('ui:editTask', Number(el.dataset.id)));
        });

        // Drag tasks between slots
        this.container.querySelectorAll('.planner-slot__task[draggable]').forEach(el => {
            el.addEventListener('dragstart', (e) => {
                this._draggedId = Number(el.dataset.id);
                el.closest('.planner-slot').style.opacity = '0.4';
                e.dataTransfer.effectAllowed = 'move';
            });
            el.addEventListener('dragend', () => {
                this.container.querySelectorAll('.planner-slot').forEach(s => { s.style.opacity = ''; s.classList.remove('drag-over'); });
                this._draggedId = null;
            });
        });

        // Drop zones: all slots
        this.container.querySelectorAll('.planner-slot').forEach(slot => {
            slot.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; slot.classList.add('drag-over'); });
            slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));
            slot.addEventListener('drop', (e) => {
                e.preventDefault();
                slot.classList.remove('drag-over');
                if (this._draggedId === null) return;
                const task = this.tm.getById(this._draggedId);
                if (!task) return;
                const newTime = slot.dataset.time;
                task.scheduledTime = newTime;
                this.tm.save();
            });
        });

        // Touch drag support for mobile
        TouchDrag.setup(this.container, {
            items: '.planner-slot__task[draggable]',
            dropZones: '.planner-slot',
            onDrop: (draggedId, slotEl) => {
                const task = this.tm.getById(draggedId);
                if (!task) return;
                const newTime = slotEl.dataset.time;
                if (newTime) {
                    task.scheduledTime = newTime;
                    this.tm.save();
                }
            }
        });
    }
}

// --- Overview View ---
class OverviewViewRenderer {
    constructor(bus, taskManager, reviewManager) {
        this.bus = bus;
        this.tm = taskManager;
        this.rm = reviewManager;
        this.container = document.getElementById('overviewView');
    }

    render() {
        const stats = this.tm.todayStats();
        const pct = stats.total ? Math.round(stats.done / stats.total * 100) : 0;
        const totalTasks = this.tm.tasks.length;
        const totalDone = this.tm.tasks.filter(t => t.done).length;
        const totalFocus = this.tm.tasks.reduce((s, t) => s + (t.focusMinutes || 0), 0);
        const avgScore = totalTasks ? Math.round(this.tm.tasks.reduce((s, t) => s + this.tm.score(t), 0) / totalTasks) : 0;

        // Weekly data
        const week = this.rm.getWeek();
        const weekData = week.map(d => {
            const dayTasks = this.tm.tasks.filter(t => t.completedAt && t.completedAt.startsWith(d.date));
            return { ...d, completed: dayTasks.length };
        });
        const maxCompleted = Math.max(...weekData.map(d => d.completed), 1);

        this.container.innerHTML = `
            <div class="overview-grid">
                <div class="stat-card">
                    <div class="stat-card__value">${pct}%</div>
                    <div class="stat-card__label">Today's Progress</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card__value">${stats.done}/${stats.total}</div>
                    <div class="stat-card__label">Tasks Done Today</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card__value">${totalFocus}m</div>
                    <div class="stat-card__label">Total Focus Time</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card__value">${avgScore}</div>
                    <div class="stat-card__label">Avg Priority Score</div>
                </div>
            </div>
            <div class="sidebar__label" style="margin-bottom:0.5rem">Weekly Completions</div>
            <div class="weekly-chart">
                ${weekData.map(d => `<div class="weekly-chart__bar${d.isToday ? ' weekly-chart__bar--today' : ''}" style="height:${Math.max(4, d.completed / maxCompleted * 100)}%"><span class="weekly-chart__label">${d.day}</span></div>`).join('')}
            </div>
        `;
    }
}

// ============= APP CONTROLLER =============
class PriorityFlowApp {
    constructor() {
        this.bus = new EventBus();
        this.store = new StorageManager();
        this.theme = new ThemeManager(this.store);
        this.tm = new TaskManager(this.bus, this.store);
        this.modals = new ModalManager();
        this.pomo = new PomodoroManager(this.bus, this.store, this.tm);
        this.morning = new MorningFlowManager(this.bus, this.store);
        this.reviews = new ReviewManager(this.store);
        this.sync = new FirebaseManager(this.bus, this.store, this.tm);
        this.motivational = new MotivationalEngine(this.bus, this.tm);

        this.rankedView = new RankedViewRenderer(this.bus, this.tm, this.modals, this.pomo);
        this.eisenhowerView = new EisenhowerViewRenderer(this.bus, this.tm);
        this.plannerView = new PlannerViewRenderer(this.bus, this.tm);
        this.overviewView = new OverviewViewRenderer(this.bus, this.tm, this.reviews);

        this.currentView = 'ranked';
        this.currentFilter = 'all';
        this.searchQuery = '';

        this.tm.load();
        this._setupListeners();
        this._renderAll();
        this.sync.init();
        this._updateUserUI();
        this._checkOnboarding();
        if (this.store.get('pf.onboarded', false)) this._checkMorning();

        // Debounced sync on task change
        this.bus.on('tasks:changed', () => { this._renderAll(); this.sync.syncDebounced(); });
        this.bus.on('user:updated', () => this._updateUserUI());
        this.bus.on('sync:status', (s) => this._updateSyncUI(s));
        this.bus.on('ui:editTask', (id) => this._showTaskModal(id));
        this.bus.on('ui:startPomodoro', (id) => this._showPomodoroSetup(id));
        this.bus.on('ui:launchTask', (id) => { const t = this.tm.getById(id); if (t) this._launchCountdown(t); });
        this.bus.on('ui:microTimer', (id) => { const t = this.tm.getById(id); if (t) this._startMicroTimer(t); });
        this.bus.on('morning:completed', (data) => this._onMorningComplete(data));
        this.bus.on('pomodoro:started', (state) => { this._showPomodoroTimer(); this._updateActiveTaskBanner(state); });
        this.bus.on('pomodoro:tick', (state) => this._updateActiveTaskBanner(state));
        this.bus.on('pomodoro:sessionComplete', () => { document.getElementById('activeTaskBanner').innerHTML = ''; });
        this.bus.on('task:started', (task) => this._celebrateStart(task));

        // Intention edit + Brain dump mode init
        this._initIntentionEdit();
        this._initBrainDump();

        // Task notification system & auto-launch
        this._startTaskNotifier();
        this._checkAutoLaunch();
    }

    _setupListeners() {
        // View tabs
        document.getElementById('viewTabs').addEventListener('click', (e) => {
            const tab = e.target.closest('[data-view]');
            if (!tab) return;
            this.currentView = tab.dataset.view;
            document.querySelectorAll('.topbar__tab').forEach(t => t.classList.toggle('active', t.dataset.view === this.currentView));
            document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === this.currentView + 'View'));
            this._renderCurrentView();
        });

        // Filter buttons
        document.getElementById('filterBar').addEventListener('click', (e) => {
            const btn = e.target.closest('[data-filter]');
            if (!btn) return;
            this.currentFilter = btn.dataset.filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === this.currentFilter));
            this._renderCurrentView();
        });

        // Search
        document.getElementById('searchInput').addEventListener('input', (e) => {
            this.searchQuery = e.target.value;
            this._renderCurrentView();
        });

        // Buttons
        document.getElementById('addTaskBtn').addEventListener('click', () => this._showTaskModal());
        document.getElementById('brainDumpBtn').addEventListener('click', () => this._toggleBrainDump());
        document.getElementById('focusGameBtn').addEventListener('click', () => this._showFocusGames());
        document.getElementById('focusNudge').addEventListener('click', () => this._showFocusGames());
        document.getElementById('reviewBtn').addEventListener('click', () => this._showReviewModal());
        document.getElementById('settingsBtn').addEventListener('click', () => this._showSettingsModal());
        document.getElementById('themeBtn').addEventListener('click', () => this.theme.toggle());
        document.getElementById('syncStatus').addEventListener('click', () => {
            this._showSettingsModal();
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
            if (e.key === 'n' || e.key === 'N') { e.preventDefault(); this._showTaskModal(); }
        });

        // Quick add todo
        const quickInput = document.getElementById('quickAddInput');
        const quickTime = document.getElementById('quickAddTime');
        const quickSubmit = () => {
            const title = quickInput.value.trim();
            if (!title) return;
            const data = { title, type: 'todo', day: 'Today', duration: 10 };
            if (quickTime.value) data.scheduledTime = quickTime.value;
            const task = this.tm.create(data);
            if (task) {
                quickInput.value = '';
                quickTime.value = '';
                this.motivational.toast('Quick todo added!', 'success');
                // Highlight the new todo briefly
                setTimeout(() => {
                    const card = document.querySelector(`[data-id="${task.id}"] .task-card`);
                    if (card) { card.classList.add('highlight-next'); setTimeout(() => card.classList.remove('highlight-next'), 3000); }
                }, 100);
            }
        };
        document.getElementById('quickAddBtn').addEventListener('click', quickSubmit);
        quickInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); quickSubmit(); } });

        // Launch bubble removed — countdown now triggered from task card actions

        // Mobile: FAB
        document.getElementById('mobileFab').addEventListener('click', () => this._showTaskModal());

        // Mobile: Bottom nav
        document.getElementById('bottomNav').addEventListener('click', (e) => {
            const item = e.target.closest('[data-view]');
            if (!item) return;
            const view = item.dataset.view;
            if (view === 'more') {
                this._showMobileMoreMenu();
                return;
            }
            this.currentView = view;
            document.querySelectorAll('.bottom-nav__item').forEach(i => i.classList.toggle('active', i.dataset.view === view));
            document.querySelectorAll('.topbar__tab').forEach(t => t.classList.toggle('active', t.dataset.view === this.currentView));
            document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === this.currentView + 'View'));
            this._renderCurrentView();
        });
    }

    _showMobileMoreMenu() {
        this.modals.open((overlay) => {
            const stats = this.tm.todayStats();
            const username = this.sync.displayName;
            const photo = this.sync.photoURL;
            overlay.innerHTML = `<div class="modal" style="max-width:100%">
                <div class="modal__header">
                    <div style="display:flex;align-items:center;gap:0.75rem">
                        <div class="sidebar__avatar" style="width:32px;height:32px;font-size:0.8rem">${photo ? `<img src="${esc(photo)}">` : (username ? username.charAt(0).toUpperCase() : '?')}</div>
                        <div>
                            <div style="font-weight:600;font-size:0.9rem">${esc(username) || 'PriorityFlow'}</div>
                            <div style="font-size:0.75rem;color:var(--c-text-muted)">${stats.done}/${stats.total} tasks today</div>
                        </div>
                    </div>
                    <button class="btn--icon modal-close">&times;</button>
                </div>
                <div class="modal__body" style="display:flex;flex-direction:column;gap:0.25rem;padding:0.75rem">
                    <button class="btn btn--secondary" id="moreFocus" style="width:100%;justify-content:flex-start">&#129504; Struggling to Focus?</button>
                    <button class="btn btn--secondary" id="moreReview" style="width:100%;justify-content:flex-start">&#128203; Daily Review</button>
                    <button class="btn btn--secondary" id="moreSettings" style="width:100%;justify-content:flex-start">&#9881; Settings & Sync</button>
                    <button class="btn btn--secondary" id="moreTheme" style="width:100%;justify-content:flex-start">&#9790; Toggle Theme</button>
                </div>
            </div>`;
            overlay.querySelector('.modal-close').addEventListener('click', () => this.modals.closeCurrent());
            overlay.querySelector('#moreFocus').addEventListener('click', () => { this.modals.closeCurrent(); this._showFocusGames(); });
            overlay.querySelector('#moreReview').addEventListener('click', () => { this.modals.closeCurrent(); this._showReviewModal(); });
            overlay.querySelector('#moreSettings').addEventListener('click', () => { this.modals.closeCurrent(); this._showSettingsModal(); });
            overlay.querySelector('#moreTheme').addEventListener('click', () => { this.theme.toggle(); this.modals.closeCurrent(); });
            return null;
        });
    }

    _renderAll() {
        this._renderCurrentView();
        this._renderKeyTasks();
        this._renderHabits();
        this._renderWeeklyStreak();
        this._renderReviewDots();
        this._updateIntention();
        this._renderPickForMe();
        this._renderFocusModeBar();
        this._renderBadDayBanner();
    }

    _renderCurrentView() {
        if (this.currentView === 'ranked') this.rankedView.render(this.currentFilter, this.searchQuery);
        else if (this.currentView === 'eisenhower') this.eisenhowerView.render(this.currentFilter, this.searchQuery);
        else if (this.currentView === 'planner') this.plannerView.render();
        else if (this.currentView === 'overview') this.overviewView.render();
    }

    _renderKeyTasks() {
        const tasks = this.tm.getTodayTasks();
        const el = document.getElementById('keyTasks');
        if (tasks.length === 0) {
            el.innerHTML = '<div style="font-size:0.8rem;color:var(--c-text-muted);padding:0.25rem">No tasks for today</div>';
            return;
        }
        el.innerHTML = tasks.map(t => `<div class="key-task" data-id="${t.id}">
            <div class="key-task__check${t.done ? ' done' : ''}" data-action="toggle">${t.done ? '&#10003;' : ''}</div>
            <div class="key-task__title${t.done ? ' done' : ''}">${esc(t.title)}</div>
            <div class="key-task__score">${this.tm.score(t)}</div>
        </div>`).join('');
        el.querySelectorAll('.key-task').forEach(kt => {
            kt.querySelector('[data-action="toggle"]').addEventListener('click', (e) => {
                e.stopPropagation();
                this.tm.toggle(Number(kt.dataset.id));
            });
            kt.addEventListener('click', () => this.bus.emit('ui:editTask', Number(kt.dataset.id)));
        });
    }

    _renderHabits() {
        const habits = this.tm.getHabits();
        const el = document.getElementById('habitList');
        if (habits.length === 0) {
            el.innerHTML = '<div style="font-size:0.8rem;color:var(--c-text-muted);padding:0.25rem">No recurring habits yet</div>';
            return;
        }
        // Deduplicate by recurrenceId, show the latest
        const seen = new Set();
        const unique = [];
        habits.forEach(h => {
            const rId = h.recurrence?.recurrenceId || h.id;
            if (!seen.has(rId)) { seen.add(rId); unique.push(h); }
        });
        el.innerHTML = unique.slice(0, 5).map(h => {
            const s = h.streak?.current || 0;
            const icon = s === 0 ? '&#127793;' : '&#128293;';
            const label = s === 0 ? 'restart anytime' : `${s}d`;
            return `<div class="habit-item">
                <span>${esc(h.title)}</span>
                <span class="habit-item__streak">${icon} ${label}</span>
            </div>`;
        }).join('');
    }

    _renderWeeklyStreak() {
        // Count consecutive days (going backwards from today) where at least 1 task was completed
        const el = document.getElementById('weeklyStreak');
        let streak = 0;
        const d = new Date();
        for (let i = 0; i < 365; i++) {
            const key = getDateStr(d);
            const completed = this.tm.tasks.some(t => t.completedAt && t.completedAt.startsWith(key) && !t.skipped);
            if (i === 0 && !completed) { /* today is ok to not have completions yet */ }
            else if (!completed) break;
            else streak++;
            d.setDate(d.getDate() - 1);
        }
        // Best streak from storage
        const stored = this.store.get('pf.weeklyStreak', { current: 0, best: 0 });
        if (streak > stored.best) stored.best = streak;
        stored.current = streak;
        this.store.set('pf.weeklyStreak', stored);

        // Compassionate streak messaging (no shame for breaks)
        let streakMsg, streakIcon;
        if (streak === 0) {
            streakIcon = '&#127793;'; // seedling
            streakMsg = 'Fresh start today — every day is a new chance';
        } else if (streak === 1) {
            streakIcon = '&#127793;';
            streakMsg = 'Day 1 — you showed up. That matters.';
        } else if (streak < stored.best && stored.best > 3) {
            streakIcon = '&#128293;';
            streakMsg = `${streak} day${streak !== 1 ? 's' : ''} — building momentum!`;
        } else {
            streakIcon = '&#128293;';
            streakMsg = `${streak} day${streak !== 1 ? 's' : ''} — incredible consistency!`;
        }

        el.innerHTML = `<div class="weekly-streak">
            <span class="weekly-streak__flame">${streakIcon}</span>
            <div>
                <div class="weekly-streak__count">${streakMsg}</div>
                <div class="weekly-streak__label">${stored.best > 0 ? `Personal best: ${stored.best}d` : 'Start your journey'}</div>
            </div>
        </div>`;
    }

    _renderReviewDots() {
        const week = this.reviews.getWeek();
        const el = document.getElementById('reviewDots');
        el.innerHTML = week.map(d =>
            `<div class="review-dot${d.hasReview ? ' done' : ''}${d.isToday ? ' today' : ''}">${d.day.charAt(0)}</div>`
        ).join('');
    }

    _updateIntention() {
        const data = this.morning.getToday();
        const textEl = document.getElementById('intentionText');
        const hintEl = document.getElementById('intentionEditHint');
        if (data && data.intention) {
            textEl.textContent = data.intention;
            hintEl.textContent = '✎';
        } else {
            textEl.textContent = 'Tap to set your focus...';
            textEl.style.opacity = '0.5';
            hintEl.textContent = '+';
        }
    }

    _initIntentionEdit() {
        const banner = document.getElementById('intentionBanner');
        banner.addEventListener('click', () => {
            const textEl = document.getElementById('intentionText');
            const hintEl = document.getElementById('intentionEditHint');
            // Already editing?
            if (banner.querySelector('.intention-banner__input')) return;

            const current = this.morning.getToday();
            const currentText = (current && current.intention) || '';

            textEl.style.display = 'none';
            hintEl.style.display = 'none';

            const input = document.createElement('input');
            input.className = 'intention-banner__input';
            input.value = currentText;
            input.placeholder = "What's your main focus today?";
            input.maxLength = 120;
            banner.appendChild(input);
            input.focus();

            const save = () => {
                const val = input.value.trim();
                input.remove();
                textEl.style.display = '';
                hintEl.style.display = '';

                // Save to morning data
                const data = this.morning.getToday() || {};
                const today = getDateStr();
                const morningData = this.store.get('pf.morning', {});
                morningData[today] = { mood: data.mood || 3, energy: data.energy || 3, intention: val };
                this.store.set('pf.morning', morningData);

                textEl.style.opacity = '';
                if (val) {
                    textEl.textContent = val;
                    hintEl.textContent = '✎';
                } else {
                    textEl.textContent = 'Tap to set your focus...';
                    textEl.style.opacity = '0.5';
                    hintEl.textContent = '+';
                }
            };

            input.addEventListener('blur', save);
            input.addEventListener('keydown', (e) => { if (e.key === 'Enter') input.blur(); });
        });
    }

    // ============= ACTIVE TASK BANNER (during Pomodoro) =============
    _updateActiveTaskBanner(state) {
        if (!state || !state.isRunning) return;
        const banner = document.getElementById('activeTaskBanner');
        const min = Math.floor(state.remaining / 60);
        const sec = String(state.remaining % 60).padStart(2, '0');
        const phase = state.phase === 'focus' ? '&#127813; Focusing' : '&#9749; Break';
        banner.innerHTML = `<div class="active-task-banner">
            <span>${phase}</span>
            <div class="active-task-banner__info">
                <strong>${esc(state.taskTitle)}</strong>
            </div>
            <div class="active-task-banner__time">${min}:${sec}</div>
        </div>`;
    }

    // ============= CELEBRATE STARTING (effort-based celebration) =============
    _celebrateStart(task) {
        const msgs = [
            'You started! That\'s the hardest part.',
            'Starting is a superpower. Go you!',
            'First step taken. You\'re already winning.',
            'The hardest part is over — you began!',
        ];
        this.motivational.toast(msgs[Math.floor(Math.random() * msgs.length)], 'success');
    }

    // ============= PICK FOR ME =============
    _renderPickForMe() {
        const el = document.getElementById('pickForMeArea');
        const undone = this.tm.sorted(this.tm.tasks.filter(t => !t.done));
        if (undone.length === 0) { el.innerHTML = ''; return; }
        el.innerHTML = `<div class="pick-for-me"><button class="btn btn--primary" id="pickForMeBtn">&#127922; Pick</button></div>`;
        el.querySelector('#pickForMeBtn').addEventListener('click', () => {
            const task = undone[0];
            this.motivational.toast(`Let's do: "${task.title}"`, 'success');
            this._launchCountdown(task);
        });
    }

    // ============= FOCUS MODE BAR =============
    _renderFocusModeBar() {
        const el = document.getElementById('focusModeBar');
        if (this.currentFilter !== 'focus') { el.innerHTML = ''; return; }
        const top3 = this.tm.sorted(this.tm.tasks.filter(t => !t.done)).slice(0, 3);
        el.innerHTML = `<div class="focus-mode-bar">
            <span>&#127919;</span> <strong>Focus Mode</strong> — showing your top ${top3.length} task${top3.length !== 1 ? 's' : ''}. Everything else is hidden.
            <button class="btn btn--ghost btn--sm" id="exitFocus">Exit Focus</button>
        </div>`;
        el.querySelector('#exitFocus').addEventListener('click', () => {
            this.currentFilter = 'all';
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === 'all'));
            this._renderAll();
        });
    }

    // ============= BAD DAY BANNER =============
    _renderBadDayBanner() {
        const el = document.getElementById('badDayBanner');
        const data = this.morning.getToday();
        if (!data || data.energy > 2) { el.innerHTML = ''; return; }
        const undone = this.tm.tasks.filter(t => t.day === 'Today' && !t.done).length;
        el.innerHTML = `<div class="bad-day-banner">
            <span>&#128156;</span> Low energy day detected. Showing only easy tasks. ${undone > 3 ? 'Consider moving some to tomorrow.' : 'You got this.'}

        </div>`;

    // ============= BRAIN DUMP MODE =============
    _initBrainDump() {
        const el = document.getElementById('brainDumpArea');
        el.innerHTML = `<div class="brain-dump" id="brainDumpWidget" style="display:none">
            <div class="brain-dump__header">
                <span>&#129504; Brain Dump</span>
                <span class="brain-dump__count" id="bdCount">0 added</span>
                <button class="btn btn--ghost btn--sm" id="bdClose">&times;</button>
            </div>
            <input class="brain-dump__input" id="bdInput" type="text" placeholder="Type a task and hit Enter... keep going!" autocomplete="off">
        </div>`;

        const widget = el.querySelector('#brainDumpWidget');
        const input = el.querySelector('#bdInput');
        let count = 0;

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && input.value.trim()) {
                this.tm.add({ title: input.value.trim(), day: 'Backlog', urgency: 3, impact: 3, energy: 2, interest: 3 });
                input.value = '';
                count++;
                el.querySelector('#bdCount').textContent = `${count} added`;
                this.motivational.toast(`+1 captured!`, 'success');
            }
        });
        el.querySelector('#bdClose').addEventListener('click', () => {
            widget.style.display = 'none';
            if (count > 0) this.motivational.toast(`${count} tasks captured! Now prioritize them.`, 'success');
            count = 0;
        });

    _toggleBrainDump() {
        const widget = document.getElementById('brainDumpWidget');
        if (!widget) return;
        const show = widget.style.display === 'none';
        widget.style.display = show ? 'block' : 'none';
        if (show) document.getElementById('bdInput').focus();
    }

    _updateUserUI() {
        const name = this.sync.displayName;
        const photo = this.sync.photoURL;
        document.getElementById('userName').textContent = name || 'PriorityFlow';
        const avatarEl = document.getElementById('userAvatar');
        if (photo) {
            avatarEl.innerHTML = `<img src="${esc(photo)}" alt="">`;

            avatarEl.textContent = name ? name.charAt(0).toUpperCase() : '?';

    _updateSyncUI({ state, text }) {
        const dot = document.getElementById('syncDot');
        const label = document.getElementById('syncLabel');
        dot.className = 'sync-dot' + (state ? ` ${state}` : '');

    _attachOnboardingEvents(overlay, render, advanceStep) {
        const finish = () => {
            this.store.set('pf.onboarded', true);
            overlay.style.animation = 'fadeIn 0.3s ease reverse forwards';
            setTimeout(() => { overlay.remove(); this._checkMorning(); }, 300);
        };

        const nextBtn = overlay.querySelector('#obNext');
        if (nextBtn) {
            nextBtn.addEventListener('click', () => { advanceStep(); render(); });
        }

        const skipBtn = overlay.querySelector('#obSkip');
        if (skipBtn) {
            skipBtn.addEventListener('click', finish);
        }

        const signInBtn = overlay.querySelector('#obSignIn');
        if (signInBtn) {
            signInBtn.addEventListener('click', async () => {
                signInBtn.textContent = 'Signing in...';
                signInBtn.disabled = true;
                await this.sync.signIn();
                finish();
            });
        }
    }

    // ============= MORNING FLOW =============
    _checkMorning() {
        if (!this.morning.needsCheckin()) return;
        const overlay = document.createElement('div');
        overlay.className = 'morning-overlay';
        const username = this.sync.displayName || 'there';
        const hour = new Date().getHours();
        const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
        let selectedMood = null;
        let energy = 3;

        overlay.innerHTML = `<div class="morning">
            <div class="morning__greeting">${greeting}, ${esc(username)}!</div>
            <div class="morning__subtitle">Let's set up your day.</div>
            <div class="sidebar__label" style="text-align:center">How are you feeling?</div>
            <div class="morning__moods">
                <button class="mood-btn" data-mood="1">&#128553;</button>
                <button class="mood-btn" data-mood="2">&#128533;</button>
                <button class="mood-btn" data-mood="3">&#128528;</button>
                <button class="mood-btn" data-mood="4">&#128522;</button>
                <button class="mood-btn" data-mood="5">&#128293;</button>
            </div>
            <div class="morning__energy-label">Energy level</div>
            <div class="morning__energy-row">
                <span style="font-size:0.8rem">Low</span>
                <input type="range" min="1" max="5" value="3" class="form-range" id="morningEnergy" style="width:180px">
                <span style="font-size:0.8rem">High</span>
                <span class="morning__energy-val" id="energyVal">3</span>
            </div>
            <input type="text" class="morning__intention" id="morningIntention" placeholder="What's your main focus today?" maxlength="120">
            <div class="morning__actions">
                <button class="btn btn--primary" id="morningStart">Start My Day</button>
                <button class="btn btn--ghost" id="morningSkip">Skip</button>
            </div>
        </div>`;

        document.body.appendChild(overlay);

        overlay.querySelectorAll('.mood-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                overlay.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedMood = Number(btn.dataset.mood);
            });
        });
        const energyInput = overlay.querySelector('#morningEnergy');
        const energyVal = overlay.querySelector('#energyVal');
        energyInput.addEventListener('input', () => { energy = Number(energyInput.value); energyVal.textContent = energy; });

        const finish = (skip) => {
            if (!skip) {
                this.morning.save(selectedMood || 3, energy, overlay.querySelector('#morningIntention').value.trim());
            } else {
                this.morning.save(3, 3, '');
            }
            overlay.style.animation = 'fadeIn 0.3s ease reverse forwards';
            setTimeout(() => overlay.remove(), 300);
        };

        overlay.querySelector('#morningStart').addEventListener('click', () => finish(false));
        overlay.querySelector('#morningSkip').addEventListener('click', () => finish(true));
    }

    _onMorningComplete({ energy }) {
        // Adjust task ordering based on energy
        this.tm.tasks.forEach(t => {
            if (t.done) return;
            t.manualRank = null; // Reset manual ranks so scoring takes over
        });
        if (energy <= 2) {
            // Bad day mode: boost low-energy tasks to top, auto-activate focus mode
            this.tm.tasks.filter(t => !t.done && t.energy === 1 && t.day === 'Today').forEach((t, i) => { t.manualRank = i; });
            // Auto-switch to focus filter to reduce overwhelm
            this.currentFilter = 'focus';
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === 'focus'));
            this.motivational.toast("Low energy day — I've reduced your view to just 3 tasks. Be kind to yourself.", 'success');
        } else if (energy >= 4) {
            // Boost high-energy tasks
            this.tm.tasks.filter(t => !t.done && t.energy === 3 && t.day === 'Today').forEach((t, i) => { t.manualRank = i; });
        }
        this.tm.save();
    }

                            </select>

                    </div>
                    <div class="form-row">

                            <label class="form-label">Duration</label>
                            <select class="form-select" id="taskDuration">
                                ${[5, 10, 15, 20, 30, 45, 60, 90, 120, 180, 240].map(d => `<option value="${d}"${isEdit && task.duration === d ? ' selected' : ''}>${d >= 60 ? (d / 60) + 'h' : d + 'm'}</option>`).join('')}

                            <input type="time" class="form-input" id="taskScheduledTime" value="${isEdit && task.scheduledTime ? task.scheduledTime : ''}">
                            <div class="form-hint">Optional — pins task to Planner slot</div>
                        </div>

                            <label class="form-label">Recurrence</label>
                            <select class="form-select" id="taskRecurrence">
                                <option value="">None</option>
                                ${['daily', 'weekly', 'weekdays'].map(r => `<option value="${r}"${isEdit && task.recurrence?.type === r ? ' selected' : ''}>${r}</option>`).join('')}

                        </div>
                    </div>
                    <div class="sidebar__label" style="margin-top:0.75rem;margin-bottom:0.5rem">Priority Scores <span style="font-weight:400;text-transform:none;letter-spacing:0">(1 = lowest, 5 = highest)</span></div>

                            <input type="range" class="form-range" id="taskUrgency" min="1" max="5" value="${isEdit ? task.urgency : 3}" inputmode="none">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Impact: <strong id="impVal">${isEdit ? task.impact : 3}</strong></label>
                            <input type="range" class="form-range" id="taskImpact" min="1" max="5" value="${isEdit ? task.impact : 3}" inputmode="none">

                    <div class="form-group">
                        <label class="form-label">Subtasks</label>
                        <div id="subtaskList">${isEdit && task.subtasks ? task.subtasks.map((s, i) =>
                            `<div class="form-row" style="margin-bottom:0.35rem;grid-template-columns:1fr auto"><input class="form-input subtask-input" value="${esc(s.text)}" data-idx="${i}"><button class="btn btn--ghost btn--sm remove-subtask" data-idx="${i}">&times;</button></div>`
                        ).join('') : ''}</div>
                        <button class="btn btn--ghost btn--sm" id="addSubtask" style="margin-top:0.25rem">+ Add subtask</button>

                <div class="modal__footer">
                    ${isEdit ? '<button class="btn btn--danger" id="deleteTaskBtn">Delete</button>' : ''}

                    <button class="btn btn--primary" id="saveTaskBtn">${isEdit ? 'Save' : 'Create'}</button>
                </div>
            </div>`;

            const modal = overlay.querySelector('.modal');

            // Subtask management
            const subtaskList = modal.querySelector('#subtaskList');
            modal.querySelector('#addSubtask').addEventListener('click', () => {
                const row = document.createElement('div');
                row.className = 'form-row';
                row.style = 'margin-bottom:0.35rem;grid-template-columns:1fr auto';
                row.innerHTML = `<input class="form-input subtask-input" placeholder="Subtask..." maxlength="200"><button class="btn btn--ghost btn--sm remove-subtask">&times;</button>`;

                subtaskList.appendChild(row);
                row.querySelector('input').focus();
            });
            subtaskList.querySelectorAll('.remove-subtask').forEach(btn => {
                btn.addEventListener('click', () => btn.closest('.form-row').remove());
            });

            // Close
            modal.querySelector('.modal-close').addEventListener('click', () => this.modals.closeCurrent());
            modal.querySelector('#cancelTaskBtn').addEventListener('click', () => this.modals.closeCurrent());

            // Delete
            if (isEdit) {
                modal.querySelector('#deleteTaskBtn').addEventListener('click', () => {
                    if (confirm('Delete this task?')) { this.tm.delete(editId); this.modals.closeCurrent(); }
                });
            }

            // Save
            modal.querySelector('#saveTaskBtn').addEventListener('click', () => {
                const subtasks = [...subtaskList.querySelectorAll('.subtask-input')].map(inp => inp.value.trim()).filter(Boolean);
                const recType = modal.querySelector('#taskRecurrence').value;
                const data = {
                    title: modal.querySelector('#taskTitle').value,
                    notes: modal.querySelector('#taskNotes').value,
                    category: modal.querySelector('#taskCategory').value,
                    day: modal.querySelector('#taskDay').value,
                    duration: Number(modal.querySelector('#taskDuration').value),
                    scheduledTime: modal.querySelector('#taskScheduledTime').value || null,
                    dueDate: modal.querySelector('#taskDueDate').value || null,
                    urgency: Number(modal.querySelector('#taskUrgency').value),
                    impact: Number(modal.querySelector('#taskImpact').value),
                    energy: Number(modal.querySelector('#taskEnergy').value),
                    interest: Number(modal.querySelector('#taskInterest').value),
                    recurrence: recType ? { type: recType, recurrenceId: isEdit && task.recurrence?.recurrenceId ? task.recurrence.recurrenceId : `rec_${Date.now()}` } : null,
                    subtasks: subtasks.map((text, i) => {
                        if (isEdit && task.subtasks[i]) return { ...task.subtasks[i], text };
                        return { id: IdGenerator.next(), text, done: false };
                    }),
                };
                if (!data.title.trim()) { modal.querySelector('#taskTitle').focus(); return; }
                if (isEdit) {
                    if (!recType) data.streak = null;
                    else if (!task.streak) data.streak = { current: 0, best: 0, lastCompleted: null };
                    this.tm.update(editId, data);
                } else {
                    this.tm.create(data);
                }
                this.modals.closeCurrent();
            });

            // Focus title on open
            // Live slider values
            ['taskUrgency:urgVal', 'taskImpact:impVal', 'taskEnergy:engVal', 'taskInterest:intVal'].forEach(pair => {
                const [sid, vid] = pair.split(':');
                modal.querySelector('#' + sid).addEventListener('input', (e) => { modal.querySelector('#' + vid).textContent = e.target.value; });
            });

            setTimeout(() => modal.querySelector('#taskTitle').focus(), 100);

            return null; // no cleanup needed
        });
    }

    _showPomodoroTimer() {
        let intervalCleanup = null;
        this.modals.open((overlay) => {
            const circumference = 2 * Math.PI * 80;
            overlay.innerHTML = `<div class="modal" style="max-width:360px">
                <div class="pomodoro-modal">
                    <div class="pomodoro-task-title" id="pomoTitle"></div>
                    <div class="pomodoro-circle">
                        <svg width="180" height="180" viewBox="0 0 180 180">
                            <circle class="pomodoro-circle__track" cx="90" cy="90" r="80"/>
                            <circle class="pomodoro-circle__progress" id="pomoProgress" cx="90" cy="90" r="80" stroke-dasharray="${circumference}" stroke-dashoffset="0"/>
                        </svg>
                        <div class="pomodoro-time">
                            <div class="pomodoro-time__value" id="pomoTime">--:--</div>
                            <div class="pomodoro-time__label" id="pomoPhase"></div>
                        </div>
                    </div>
                    <div class="pomodoro-stats" id="pomoStats"></div>
                    <div style="display:flex;gap:0.5rem;justify-content:center">
                        <button class="btn btn--secondary" id="pomoPause">Pause</button>
                        <button class="btn btn--danger" id="pomoStop">Stop</button>
                    </div>
                </div>
            </div>`;

            const updateUI = (s) => {
                if (!s) { this.modals.closeCurrent(); return; }
                const min = Math.floor(s.remaining / 60);
                const sec = s.remaining % 60;
                overlay.querySelector('#pomoTitle').textContent = s.taskTitle;
                overlay.querySelector('#pomoTime').textContent = `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
                overlay.querySelector('#pomoPhase').textContent = s.phase === 'focus' ? 'Focus' : 'Break';
                overlay.querySelector('#pomoStats').textContent = `Session ${s.sessions + 1} \u00b7 ${Math.round(s.totalFocusSec / 60)}m focused`;
                const total = s.phase === 'focus' ? s.durationSec : (s.sessions % 4 === 0 && s.phase === 'break' ? 600 : 300);
                const pct = total > 0 ? (total - s.remaining) / total : 0;
                overlay.querySelector('#pomoProgress').style.strokeDashoffset = circumference * (1 - pct);
            };

            const tickHandler = (s) => updateUI(s);
            const stopHandler = () => this.modals.closeCurrent();
            this.bus.on('pomodoro:tick', tickHandler);
            this.bus.on('pomodoro:stopped', stopHandler);

            // Initial render
            if (this.pomo.state) updateUI(this.pomo.state);

            overlay.querySelector('#pomoPause').addEventListener('click', () => {
                if (this.pomo.state?.isPaused) { this.pomo.resume(); overlay.querySelector('#pomoPause').textContent = 'Pause'; }
                else { this.pomo.pause(); overlay.querySelector('#pomoPause').textContent = 'Resume'; }
            });
            overlay.querySelector('#pomoStop').addEventListener('click', () => { this.pomo.stop(); });

            return () => {
                this.bus.off('pomodoro:tick', tickHandler);
                this.bus.off('pomodoro:stopped', stopHandler);
            };
        });
    }

        this.store.set(dateKey, plays);

        if (plays >= 3) {
            this.motivational.toast("You've played 3 games today — let's channel that energy into a task!", 'warning');

        const topTask = this.tm.sorted(this.tm.tasks.filter(t => t.day === 'Today' && !t.done))[0]
                     || this.tm.sorted(this.tm.tasks.filter(t => !t.done))[0];
        if (topTask) {
            setTimeout(() => this._showPostGamePrompt(topTask), 400);

    }

    _showPostGamePrompt(task) {

    // --- "Just 5 minutes" micro-timer ---
    _startMicroTimer(task) {
        if (!task) return;
        const banner = document.getElementById('activeTaskBanner');
        let remaining = 5 * 60;
        const fmt = (s) => `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;

        const render = () => {
            banner.innerHTML = `<div class="active-task-banner">
                <span>&#9203;</span>
                <div class="active-task-banner__info">
                    <strong>Just 5 min:</strong> ${esc(task.title)}
                </div>
                <div class="active-task-banner__time" id="microTime">${fmt(remaining)}</div>
                <button class="btn btn--ghost btn--sm" id="microDone">&#10003; Done</button>
                <button class="btn btn--ghost btn--sm" id="microExtend">+5 min</button>
                <button class="btn btn--ghost btn--sm" id="microStop">Stop</button>
            </div>`;
            banner.querySelector('#microDone').addEventListener('click', () => {
                clearInterval(ivl);
                banner.innerHTML = '';
                this.tm.toggle(task.id);
                this.motivational.toast('You started AND finished! Amazing.', 'success');
            });
            banner.querySelector('#microExtend').addEventListener('click', () => {
                remaining += 5 * 60;
                this.motivational.toast('Momentum! 5 more minutes added.', 'success');
            });
            banner.querySelector('#microStop').addEventListener('click', () => {
                clearInterval(ivl);
                banner.innerHTML = '';
                this.motivational.toast('Great start! Even a little progress counts.', 'success');
            });
        };
        render();

        // Celebrate starting the task
        this.bus.emit('task:started', task);

        const ivl = setInterval(() => {
            remaining--;
            const timeEl = document.getElementById('microTime');
            if (timeEl) timeEl.textContent = fmt(remaining);
            if (remaining <= 0) {
                clearInterval(ivl);
                banner.innerHTML = '';
                this.motivational.toast("5 minutes done! You proved you could start. Keep going?", 'success');
                // Offer to continue with Pomodoro
                this._showPomodoroSetup(task.id);
            }
        }, 1000);
    }

    // --- Countdown Launcher ---
    _launchCountdown(task) {
        if (!task) {
            // Pick the top undone Today task
            const todayTasks = this.tm.tasks.filter(t => t.day === 'Today' && !t.done);
            task = this.tm.sorted(todayTasks)[0];
        }
        if (!task) { this.motivational.toast('No tasks to launch! Add one first.', 'warning'); return; }

        const overlay = document.createElement('div');
        overlay.className = 'countdown-overlay';
        document.body.appendChild(overlay);

        const steps = [
            { text: '3', cls: 'countdown-number', delay: 0 },
            { text: '2', cls: 'countdown-number', delay: 900 },
            { text: '1', cls: 'countdown-number', delay: 1800 },
            { text: 'GO!', cls: 'countdown-go', delay: 2700 },
        ];

        steps.forEach(step => {
            setTimeout(() => {
                overlay.innerHTML = `<div class="${step.cls}">${step.text}</div>${step.text === 'GO!' ? `<div class="countdown-task">${esc(task.title)}</div>` : ''}`;
            }, step.delay);
        });

        setTimeout(() => {
            overlay.remove();
            // Highlight the task
            const card = document.querySelector(`.task-card-wrapper[data-id="${task.id}"] .task-card`);
            if (card) {
                card.classList.add('highlight-next');
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                setTimeout(() => card.classList.remove('highlight-next'), 6000);
            }
            this.motivational.toast(`Time to crush "${task.title}"!`, 'success');
        }, 3600);
    }

    // --- Task Start Notification ---
    _startTaskNotifier() {
        this._notifiedTasks = new Set();
        setInterval(() => this._checkUpcomingTasks(), 60 * 1000);
        // Also check immediately
        setTimeout(() => this._checkUpcomingTasks(), 5000);
    }

    _checkUpcomingTasks() {
        const now = new Date();
        const nowMin = now.getHours() * 60 + now.getMinutes();

        const todayTasks = this.tm.tasks.filter(t => t.day === 'Today' && !t.done && t.scheduledTime);
        todayTasks.forEach(task => {
            const [h, m] = task.scheduledTime.split(':').map(Number);
            const taskMin = h * 60 + m;
            const diff = taskMin - nowMin;

            // Notify 5 minutes before (or if within 0-5 min window and not yet notified)
            if (diff >= 0 && diff <= 5 && !this._notifiedTasks.has(task.id)) {
                this._notifiedTasks.add(task.id);
                this._showTaskNotification(task, diff);
            }
        });
    }

    _showTaskNotification(task, minsAway) {
        const root = document.getElementById('taskNotifyRoot');
        const timeText = minsAway <= 0 ? 'Starting now!' : `Starts in ${minsAway} min`;
        root.innerHTML = `<div class="task-notify" id="taskNotify">
            <span class="task-notify__icon">&#9200;</span>
            <div class="task-notify__text">
                <div class="task-notify__title">${esc(task.title)}</div>
                <div class="task-notify__sub">${timeText} \u2022 ${task.duration}m \u2022 ${task.scheduledTime}</div>
            </div>
            <button class="task-notify__action" id="notifyLaunch">Launch</button>
            <button class="task-notify__close" id="notifyClose">&times;</button>
        </div>`;

        document.getElementById('notifyLaunch').addEventListener('click', () => {
            root.innerHTML = '';
            this._launchCountdown(task);
        });
        document.getElementById('notifyClose').addEventListener('click', () => {
            root.innerHTML = '';
        });

        // Auto-dismiss after 30 seconds
        setTimeout(() => { if (document.getElementById('taskNotify')) root.innerHTML = ''; }, 30000);
    }

    // --- Game 1: Dot Blitz ---
    _gameDots() {

        this.modals.open((overlay) => {

                    <div class="game-instruction">Tap ${TOTAL} dots as fast as you can!</div>
                    <div class="game-score"><span id="dotCount">0</span> / ${TOTAL}</div>
                    <div class="game-area" style="height:300px;background:var(--c-surface);border-radius:var(--radius-sm);border:1px solid var(--c-border);position:relative;overflow:hidden" id="dotArea"></div>
                    <div id="dotResult"></div>
                </div>
            </div>`;

            overlay.querySelector('.modal-close').addEventListener('click', () => this.modals.closeCurrent());
            const area = overlay.querySelector('#dotArea');
            const countEl = overlay.querySelector('#dotCount');
            const resultEl = overlay.querySelector('#dotResult');

            const spawnDot = () => {
                area.innerHTML = '';
                const dot = document.createElement('div');
                const size = 30 + Math.random() * 20;
                const areaW = area.clientWidth || 300;
                const areaH = area.clientHeight || 260;
                const maxX = Math.max(0, areaW - size);
                const maxY = Math.max(0, areaH - size);
                dot.style.cssText = `width:${size}px;height:${size}px;border-radius:50%;background:var(--c-primary);position:absolute;cursor:pointer;transition:transform 0.1s;box-shadow:0 2px 8px var(--c-shadow)`;
                dot.style.left = Math.random() * maxX + 'px';
                dot.style.top = Math.random() * maxY + 'px';
                area.appendChild(dot);

                dot.addEventListener('click', () => {
                    if (!startTime) startTime = Date.now();
                    tapped++;
                    countEl.textContent = tapped;
                    dot.style.transform = 'scale(0)';
                    if (tapped >= TOTAL) {
                        clearTimeout(dotTimeout);
                        const elapsed = ((Date.now() - startTime) / 1000).toFixed(2);
                        area.innerHTML = '';
                        resultEl.innerHTML = `<div class="game-result"><div class="game-result__time">${elapsed}s</div><div class="game-result__label">Brain activated! Now go crush a task.</div><button class="btn btn--primary" style="margin-top:1rem" id="dotDone">Let's go!</button></div>`;
                        resultEl.querySelector('#dotDone').addEventListener('click', () => {
                            this._onFocusGameComplete('Brain warmed up! Time to focus.');
                        });
                    } else {
                        dotTimeout = setTimeout(spawnDot, 80);
                    }
                });
            };
            requestAnimationFrame(() => spawnDot()); // defer so area has layout dimensions

            return () => clearTimeout(dotTimeout);
        });
    }

    // --- Game 2: Capture the Shape ---
    _gameCapture() {
        let animFrame = null;
        this.modals.open((overlay) => {
            overlay.innerHTML = `<div class="modal" style="max-width:440px">
                <div class="modal__header">
                    <div class="modal__title">&#127912; Capture the Shape</div>
                    <button class="btn--icon modal-close">&times;</button>
                </div>
                <div class="modal__body">
                    <div class="game-instruction">Tap when the moving circle is inside the target zone!</div>
                    <div class="game-area" style="height:200px;position:relative;background:var(--c-surface);border-radius:var(--radius-sm);border:1px solid var(--c-border);overflow:hidden;cursor:pointer" id="captureArea">
                        <div id="captureZone" style="position:absolute;width:80px;height:100%;background:var(--c-success-bg);border-left:2px solid var(--c-success);border-right:2px solid var(--c-success)"></div>
                        <div id="captureCircle" style="position:absolute;top:50%;width:32px;height:32px;border-radius:50%;background:var(--c-primary);transform:translateY(-50%);box-shadow:0 2px 8px var(--c-shadow)"></div>
                    </div>
                    <div id="captureResult" style="margin-top:0.5rem"></div>
                </div>
            </div>`;

            overlay.querySelector('.modal-close').addEventListener('click', () => this.modals.closeCurrent());
            const area = overlay.querySelector('#captureArea');
            const circle = overlay.querySelector('#captureCircle');
            const zone = overlay.querySelector('#captureZone');
            const resultEl = overlay.querySelector('#captureResult');

            // Random zone position
            const areaW = 400;
            const zoneLeft = 100 + Math.random() * 200;
            zone.style.left = zoneLeft + 'px';

            let x = 0, speed = 3, round = 0, wins = 0;
            let curZoneLeft = zoneLeft;
            const totalRounds = 5;
            let gameOver = false;

            const animate = () => {
                x += speed;
                if (x > areaW - 32 || x < 0) speed = -speed;
                circle.style.left = x + 'px';
                // Real-time feedback: turn circle green when inside zone
                const cc = x + 16;
                if (cc >= curZoneLeft && cc <= curZoneLeft + 80) {
                    circle.style.background = 'var(--c-success)';
                } else {
                    circle.style.background = 'var(--c-primary)';
                }
                animFrame = requestAnimationFrame(animate);
            };
            animate();

            area.addEventListener('click', () => {
                if (gameOver) return;
                const circleCenter = x + 16;
                const inZone = circleCenter >= curZoneLeft && circleCenter <= curZoneLeft + 80;
                round++;
                if (inZone) {
                    wins++;
                    circle.style.background = 'var(--c-success)';
                    circle.style.boxShadow = '0 0 16px var(--c-success)';
                } else {
                    circle.style.background = 'var(--c-danger)';
                    circle.style.boxShadow = '0 0 16px var(--c-danger)';
                }
                setTimeout(() => { circle.style.boxShadow = '0 2px 8px var(--c-shadow)'; }, 400);

                resultEl.innerHTML = `<div style="text-align:center;font-size:0.85rem;color:var(--c-text-muted)">Round ${round}/${totalRounds} — ${wins} captured</div>`;

                if (round >= totalRounds) {
                    gameOver = true;
                    cancelAnimationFrame(animFrame);
                    const pct = Math.round(wins / totalRounds * 100);
                    const msg = wins >= 3 ? 'Sharp reflexes! You\'re ready to focus.' : 'Keep practicing! Let\'s try a task now.';
                    resultEl.innerHTML = `<div class="game-result"><div class="game-result__time">${wins}/${totalRounds} (${pct}%)</div><div class="game-result__label">${msg}</div><button class="btn btn--primary" style="margin-top:1rem" id="captureDone">Let's go!</button></div>`;
                    resultEl.querySelector('#captureDone').addEventListener('click', () => {
                        this._onFocusGameComplete('Reflexes sharpened! Time to work.');
                    });
                    return;
                }

                // Move zone for next round
                curZoneLeft = 80 + Math.random() * 240;
                zone.style.left = curZoneLeft + 'px';
                speed = speed > 0 ? speed + 0.5 : speed - 0.5; // gets faster
            });

            return () => cancelAnimationFrame(animFrame);
        });
    }

    // --- Game 3: F1 Reaction ---
    _gameF1() {
        let lightTimeout = null;
        let goTimeout = null;
        let startMs = 0;
        let state = 'waiting'; // waiting, lights, go, done, early

        this.modals.open((overlay) => {
            overlay.innerHTML = `<div class="modal" style="max-width:440px">
                <div class="modal__header">
                    <div class="modal__title">&#128998; F1 Reaction</div>
                    <button class="btn--icon modal-close">&times;</button>
                </div>
                <div class="modal__body" style="text-align:center">
                    <div class="game-instruction" id="f1Instruction">Watch the lights...</div>
                    <div style="display:flex;gap:0.75rem;justify-content:center;margin:1.5rem 0" id="f1Lights">
                        <div class="f1-light" id="f1L1"></div>
                        <div class="f1-light" id="f1L2"></div>
                        <div class="f1-light" id="f1L3"></div>
                        <div class="f1-light" id="f1L4"></div>
                    </div>
                    <div id="f1Result"></div>
                    <div class="game-area" style="height:120px;background:var(--c-surface);border-radius:var(--radius-sm);border:1px solid var(--c-border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:600;color:var(--c-text-muted);font-size:0.9rem" id="f1Tap">
                        Wait for green, then TAP here!
                    </div>
                </div>
            </div>`;

            overlay.querySelector('.modal-close').addEventListener('click', () => this.modals.closeCurrent());
            const lights = [1,2,3,4].map(i => overlay.querySelector('#f1L' + i));
            const tapArea = overlay.querySelector('#f1Tap');
            const instruction = overlay.querySelector('#f1Instruction');
            const resultEl = overlay.querySelector('#f1Result');

            // Sequence: light up red lights one by one, then all go off = GO
            state = 'lights';
            let lightIdx = 0;
            const lightUp = () => {
                if (lightIdx < 4) {
                    lights[lightIdx].classList.add('on');
                    lightIdx++;
                    lightTimeout = setTimeout(lightUp, 600 + Math.random() * 400);
                } else {
                    // Random delay before GO (1-3s)
                    goTimeout = setTimeout(() => {
                        lights.forEach(l => { l.classList.remove('on'); l.classList.add('go'); });
                        instruction.textContent = 'GO! TAP NOW!';
                        tapArea.textContent = 'TAP!';
                        tapArea.style.background = 'var(--c-success-bg)';
                        state = 'go';
                        startMs = Date.now();
                    }, 1000 + Math.random() * 2000);
                }
            };
            lightTimeout = setTimeout(lightUp, 500);

            tapArea.addEventListener('click', () => {
                if (state === 'lights') {
                    // Tapped too early
                    state = 'early';
                    clearTimeout(lightTimeout);
                    clearTimeout(goTimeout);
                    instruction.textContent = 'Too early! Jump start.';
                    tapArea.style.background = 'var(--c-danger-bg)';
                    tapArea.textContent = 'Tapped too early!';
                    resultEl.innerHTML = '<button class="btn btn--secondary" style="margin-top:1rem" id="f1Retry">Try Again</button>';
                    resultEl.querySelector('#f1Retry').addEventListener('click', () => {
                        this.modals.closeCurrent();
                        this._gameF1();
                    });
                } else if (state === 'go') {
                    state = 'done';
                    const reactionMs = Date.now() - startMs;
                    const rating = reactionMs < 250 ? 'Lightning fast!' : reactionMs < 400 ? 'Great reflexes!' : 'Good reaction!';
                    resultEl.innerHTML = `<div class="game-result"><div class="game-result__time">${reactionMs}ms</div><div class="game-result__label">${rating} Brain is firing.</div><button class="btn btn--primary" style="margin-top:1rem" id="f1Done">Start working!</button></div>`;
                    resultEl.querySelector('#f1Done').addEventListener('click', () => {
                        this._onFocusGameComplete(`${reactionMs}ms reaction! You're locked in. Go!`);
                    });
                }
            });

            return () => { clearTimeout(lightTimeout); clearTimeout(goTimeout); };
        });
    }
}

// ============= INITIALIZE =============
document.addEventListener('DOMContentLoaded', () => { new PriorityFlowApp(); });
    </script>
