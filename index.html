                    </div>
                `;

                modal.innerHTML = html;
                modalsContainer.appendChild(modal);

                let subtasks = isEdit ? [...task.subtasks] : [];

                const form = modal.querySelector('#taskForm');
                const closeBtn = modal.querySelector('.modal-close');
                const cancelBtn = modal.querySelector('#cancelBtn');
                const addSubtaskBtn = modal.querySelector('#addSubtaskBtn');
                const subtaskInput = modal.querySelector('#subtaskInput');
                const subtasksList = modal.querySelector('#subtasksList');
                const deleteBtn = modal.querySelector('#deleteBtn');

                closeBtn.addEventListener('click', () => modal.remove());
                cancelBtn.addEventListener('click', () => modal.remove());

                const updateSubtasksList = () => {
                    subtasksList.innerHTML = subtasks.map((s, i) => `
                        <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.5rem; background-color: var(--color-surface); border-radius: var(--border-radius);">
                            <span>${this.escapeHtml(s.text)}</span>
                            <button type="button" class="btn btn-danger" style="padding: 0.25rem 0.75rem; font-size: 0.8rem;" data-subtask-index="${i}">Remove</button>
                        </div>
                    `).join('');

                    subtasksList.querySelectorAll('[data-subtask-index]').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.preventDefault();
                            const index = parseInt(btn.dataset.subtaskIndex);
                            subtasks.splice(index, 1);
                            updateSubtasksList();
                        });
                    });
                };

                addSubtaskBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const text = subtaskInput.value.trim();
                    if (text) {
                        subtasks.push({text, done: false});
                        subtaskInput.value = '';
                        updateSubtasksList();
                    }
                });

                form.addEventListener('submit', (e) => {
                    e.preventDefault();

                    if (isEdit) {
                        task.title = document.getElementById('taskTitle').value;
                        task.notes = document.getElementById('taskNotes').value;
                        task.category = document.getElementById('taskCategory').value;
                        task.day = document.getElementById('taskDay').value;
                        task.duration = parseInt(document.getElementById('taskDuration').value);
                        task.urgency = parseInt(document.getElementById('taskUrgency').value);
                        task.impact = parseInt(document.getElementById('taskImpact').value);
                        task.energy = parseInt(document.getElementById('taskEnergy').value);
                        task.interest = parseInt(document.getElementById('taskInterest').value);
                        task.subtasks = subtasks;

                        const recType = document.getElementById('taskRecurrence').value;
                        if (recType === 'none') {
                            task.recurrence = null;
                            task.streak = null;
                        } else {
                            task.recurrence = {type: recType};
                            if (!task.streak) {
                                task.streak = {current: 0, best: 0, lastCompleted: null};
                            }
                        }
                    } else {
                        const newTask = {
                            id: Date.now() + Math.random(),
                            title: document.getElementById('taskTitle').value,
                            notes: document.getElementById('taskNotes').value,
                            category: document.getElementById('taskCategory').value,
                            day: document.getElementById('taskDay').value,
                            duration: parseInt(document.getElementById('taskDuration').value),
                            urgency: parseInt(document.getElementById('taskUrgency').value),
                            impact: parseInt(document.getElementById('taskImpact').value),
                            energy: parseInt(document.getElementById('taskEnergy').value),
                            interest: parseInt(document.getElementById('taskInterest').value),
                            calendarDate: null,
                            done: false,
                            subtasks: subtasks,
                            pomodoros: 0,
                            focusMinutes: 0,
                            manualRank: null,
                            streak: null
                        };

                        const recType = document.getElementById('taskRecurrence').value;
                        if (recType !== 'none') {
                            newTask.recurrence = {type: recType};
                            newTask.streak = {current: 0, best: 0, lastCompleted: null};
                        } else {
                            newTask.recurrence = null;
                        }

                        this.tasks.push(newTask);
                    }

                    this.saveTasks();
                    this.renderAllViews();
                    modal.remove();
                });

                if (deleteBtn) {
                    deleteBtn.addEventListener('click', () => {
                        if (confirm('Delete this task?')) {
                            this.tasks = this.tasks.filter(t => t.id !== task.id);
                            this.saveTasks();
                            this.renderAllViews();
                            modal.remove();
                        }
                    });
                }
            }

            confirmDelete(task) {
                if (confirm(`Delete "${task.title}"?`)) {
                    this.tasks = this.tasks.filter(t => t.id !== task.id);
                    this.saveTasks();
                    this.renderAllViews();
                }
            }

            showPomodoroSetup(task) {
                const modalsContainer = document.getElementById('modals');
                const modal = document.createElement('div');
                modal.className = 'modal-overlay';

                modal.innerHTML = `
                    <div class="modal">
                        <div class="modal-header">
                            <h2 class="modal-title">Focus on: ${this.escapeHtml(task.title)}</h2>
                        </div>
                        <div class="pomodoro-container">
                            <div class="pomodoro-setup">
                                <p>Choose focus duration:</p>
                                <div class="duration-options">
                                    <button class="duration-btn" data-duration="25">25 min (Short)</button>
                                    <button class="duration-btn" data-duration="50">50 min (Deep)</button>
                                </div>
                            </div>
                            <div class="modal-buttons">
                                <button class="btn btn-secondary" id="cancelPomBtn">Back</button>
                            </div>
                        </div>
                    </div>
                `;

                modalsContainer.appendChild(modal);

                const durationBtns = modal.querySelectorAll('.duration-btn');
                const cancelBtn = modal.querySelector('#cancelPomBtn');

                cancelBtn.addEventListener('click', () => modal.remove());

                durationBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        const duration = parseInt(btn.dataset.duration);
                        modal.remove();
                        this.startPomodoro(task, duration);
                    });
                });
            }

            startPomodoro(task, durationMinutes) {
                this.pomodoroState = {
                    taskId: task.id,
                    totalMinutes: durationMinutes,
                    workMinutes: durationMinutes,
                    remainingSeconds: durationMinutes * 60,
                    isRunning: true,
                    state: 'FOCUS',
                    sessionsCompleted: 0,
                    focusTimeLogged: 0
                };

                this.showPomodoroTimer();
                this.runPomodoroTick();
            }

            runPomodoroTick() {
                if (!this.pomodoroState || !this.pomodoroState.isRunning) return;

                this.pomodoroState.remainingSeconds--;

                if (this.pomodoroState.remainingSeconds <= 0) {
                    this.playBeep();

                    if (this.pomodoroState.state === 'FOCUS') {
                        this.pomodoroState.focusTimeLogged += this.pomodoroState.workMinutes;
                        this.pomodoroState.sessionsCompleted++;

                        const breakDuration = (this.pomodoroState.sessionsCompleted % 4 === 0) ? 10 : 5;
                        this.pomodoroState.state = (breakDuration === 10) ? 'LONG_BREAK' : 'SHORT_BREAK';
                        this.pomodoroState.remainingSeconds = breakDuration * 60;
                    } else {
                        this.pomodoroState.state = 'FOCUS';
                        this.pomodoroState.remainingSeconds = this.pomodoroState.workMinutes * 60;
                    }
                }

                this.updatePomodoroDisplay();

                if (this.pomodoroState.isRunning) {
                    setTimeout(() => this.runPomodoroTick(), 1000);
                }
            }

            showPomodoroTimer() {
                const modalsContainer = document.getElementById('modals');
                const modal = document.createElement('div');
                modal.className = 'modal-overlay';
                modal.id = 'pomodoroModal';

                const task = this.tasks.find(t => t.id === this.pomodoroState.taskId);
                const minutes = Math.floor(this.pomodoroState.remainingSeconds / 60);
                const seconds = this.pomodoroState.remainingSeconds % 60;

                modal.innerHTML = `
                    <div class="modal">
                        <div class="modal-header">
                            <h2 class="modal-title">${this.escapeHtml(task.title)}</h2>
                            <button class="modal-close">✕</button>
                        </div>
                        <div class="pomodoro-container">
                            <div class="pomodoro-timer">
                                <div class="timer-ring">
                                    <svg class="timer-svg" viewBox="0 0 200 200">
                                        <circle cx="100" cy="100" r="90" fill="none" stroke="var(--color-border)" stroke-width="8"></circle>
                                        <circle id="timerProgress" cx="100" cy="100" r="90" fill="none" stroke="var(--color-primary)" stroke-width="8" stroke-dasharray="565.48" stroke-dashoffset="565.48" transform="rotate(-90 100 100)"></circle>
                                    </svg>
                                    <div class="timer-display">
                                        <div class="timer-time" id="timerTime">${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}</div>
                                        <div class="timer-state" id="timerState">${this.pomodoroState.state}</div>
                                    </div>
                                </div>
                                <div class="timer-controls">
                                    <button class="timer-btn primary" id="pauseResumeBtn">⏸ Pause</button>
                                    <button class="timer-btn secondary" id="stopBtn">⏹ Stop</button>
                                </div>
                                <div class="timer-stats">
                                    <div class="timer-stat">
                                        <div class="timer-stat-label">Sessions</div>
                                        <div class="timer-stat-value" id="sessionCount">${this.pomodoroState.sessionsCompleted}</div>
                                    </div>
                                    <div class="timer-stat">
                                        <div class="timer-stat-label">Focus Time</div>
                                        <div class="timer-stat-value" id="focusTime">${this.pomodoroState.focusTimeLogged}m</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                modalsContainer.appendChild(modal);

                const closeBtn = modal.querySelector('.modal-close');
                const pauseResumeBtn = modal.querySelector('#pauseResumeBtn');
                const stopBtn = modal.querySelector('#stopBtn');

                closeBtn.addEventListener('click', () => {
                    this.pomodoroState.isRunning = false;
                    modal.remove();
                });

                pauseResumeBtn.addEventListener('click', () => {
                    this.pomodoroState.isRunning = !this.pomodoroState.isRunning;
                    pauseResumeBtn.textContent = this.pomodoroState.isRunning ? '⏸ Pause' : '▶ Resume';
                    if (this.pomodoroState.isRunning) {
                        this.runPomodoroTick();
                    }
                });

                stopBtn.addEventListener('click', () => {
                    if (confirm('Stop this session?')) {
                        const task = this.tasks.find(t => t.id === this.pomodoroState.taskId);
                        if (task) {
                            task.pomodoros += this.pomodoroState.sessionsCompleted;
                            task.focusMinutes += this.pomodoroState.focusTimeLogged;
                        }
                        this.pomodoroState = null;
                        this.saveTasks();
                        this.renderAllViews();
                        modal.remove();
                    }
                });
            }

            updatePomodoroDisplay() {
                const modal = document.getElementById('pomodoroModal');
                if (!modal) return;

                const minutes = Math.floor(this.pomodoroState.remainingSeconds / 60);
                const seconds = this.pomodoroState.remainingSeconds % 60;

                const timerTime = modal.querySelector('#timerTime');
                const timerState = modal.querySelector('#timerState');
                const sessionCount = modal.querySelector('#sessionCount');
                const focusTime = modal.querySelector('#focusTime');
                const progressCircle = modal.querySelector('#timerProgress');

                timerTime.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                timerState.textContent = this.pomodoroState.state;
                sessionCount.textContent = this.pomodoroState.sessionsCompleted;
                focusTime.textContent = `${this.pomodoroState.focusTimeLogged}m`;

                const circumference = 565.48;
                const totalSeconds = this.pomodoroState.state === 'FOCUS' ? this.pomodoroState.workMinutes * 60 : (this.pomodoroState.state === 'LONG_BREAK' ? 10 * 60 : 5 * 60);
                const progress = (this.pomodoroState.remainingSeconds / totalSeconds) * circumference;
                progressCircle.style.strokeDashoffset = circumference - progress;
            }

            playBeep() {
                try {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();

                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);

                    oscillator.frequency.value = 800;
                    oscillator.type = 'sine';

                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.5);
                } catch (e) {
                    console.log('Audio context not available');
                }
            }

                                    <div style="font-size: 1.5rem; font-weight: 700; color: var(--color-primary);">${totalFocusMinutes}m</div>
                                </div>
                            </div>
                        </div>

                        ${incompleteTasks.length > 0 ? `
                            <div style="margin-bottom: 2rem;">
                                <h3 style="font-weight: 600; margin-bottom: 1rem;">Incomplete Tasks</h3>
                                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                                    ${incompleteTasks.map(t => `
                                        <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; background-color: var(--color-surface); border-radius: var(--border-radius);">
                                            <span>${this.escapeHtml(t.title)}</span>
                                            <button class="btn btn-secondary" style="font-size: 0.8rem; padding: 0.25rem 0.75rem;" data-move-task-id="${t.id}">→ Tomorrow</button>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}

                        <div style="margin-bottom: 2rem;">
                            <label class="form-label">What went well?</label>
                            <textarea class="form-textarea" id="reviewWentWell">${existingReview.wentWell || ''}</textarea>
                        </div>

                        <div style="margin-bottom: 2rem;">
                            <label class="form-label">What to improve?</label>
                            <textarea class="form-textarea" id="reviewImprove">${existingReview.improve || ''}</textarea>
                        </div>

                        <div class="modal-buttons">
                            <button class="btn btn-secondary" id="closeReviewBtn">Close</button>
                            <button class="btn btn-primary" id="saveReviewBtn">Save Review</button>
                            <button class="btn btn-primary" id="planTomorrowBtn">Plan Tomorrow</button>
                        </div>
                    </div>
                `;

                modalsContainer.appendChild(modal);

                const closeBtn = modal.querySelector('.modal-close');
                const closeReviewBtn = modal.querySelector('#closeReviewBtn');
                const saveReviewBtn = modal.querySelector('#saveReviewBtn');
                const planTomorrowBtn = modal.querySelector('#planTomorrowBtn');

                closeBtn.addEventListener('click', () => modal.remove());
                closeReviewBtn.addEventListener('click', () => modal.remove());

                modal.querySelectorAll('[data-move-task-id]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const taskId = parseInt(btn.dataset.moveTaskId);
                        const task = this.tasks.find(t => t.id === taskId);
                        if (task) {
                            task.day = 'Tomorrow';
                            this.saveTasks();
                        }
                        btn.closest('div').remove();
                    });
                });

                saveReviewBtn.addEventListener('click', () => {
                    this.reviews[today] = {
                        wentWell: document.getElementById('reviewWentWell').value,
                        improve: document.getElementById('reviewImprove').value,
                        date: today
                    };
                    localStorage.setItem('priorityflow.reviews.v5', JSON.stringify(this.reviews));
                    this.renderReviewDots();
                    modal.remove();
                });

                planTomorrowBtn.addEventListener('click', () => {
                    incompleteTasks.forEach(t => {
                        t.day = 'Tomorrow';
                    });
                    this.reviews[today] = {

            showSettingsModal() {
                const modalsContainer = document.getElementById('modals');
                const modal = document.createElement('div');
                modal.className = 'modal-overlay';

                const token = localStorage.getItem('priorityflow.gist.token') || '';
                const gistId = localStorage.getItem('priorityflow.gist.id') || '';

                modal.innerHTML = `
                    <div class="modal">
                        <div class="modal-header">
                            <h2 class="modal-title">Settings</h2>
                            <button class="modal-close">✕</button>
                        </div>

                        <div style="margin-bottom: 2rem;">
                            <h3 style="font-weight: 600; margin-bottom: 1rem;">GitHub Sync</h3>
                            <div class="form-group">
                                <label class="form-label">GitHub Personal Access Token</label>
                                <input type="password" class="form-input" id="githubToken" value="${token}" placeholder="ghp_...">
                                <p style="font-size: 0.85rem; color: var(--color-text-light); margin-top: 0.5rem;">
                                    Create a token at <a href="https://github.com/settings/tokens" target="_blank" style="color: var(--color-primary);">github.com/settings/tokens</a> with 'gist' scope.
                                </p>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Gist ID (optional)</label>
                                <input type="text" class="form-input" id="gistId" value="${gistId}" placeholder="Auto-created if blank">
                            </div>
                            <button class="btn btn-primary" id="syncConnectBtn" style="width: 100%;">Connect GitHub</button>
                        </div>

                        <div class="modal-buttons">
                            <button class="btn btn-secondary" id="settingsCloseBtn">Close</button>
                        </div>
                    </div>
                `;

                modalsContainer.appendChild(modal);

                const closeBtn = modal.querySelector('.modal-close');
                const settingsCloseBtn = modal.querySelector('#settingsCloseBtn');
                const syncConnectBtn = modal.querySelector('#syncConnectBtn');

                closeBtn.addEventListener('click', () => modal.remove());
                settingsCloseBtn.addEventListener('click', () => modal.remove());

                syncConnectBtn.addEventListener('click', async () => {
                    const token = document.getElementById('githubToken').value;
                    const gistId = document.getElementById('gistId').value;

                    if (token) {
                        localStorage.setItem('priorityflow.gist.token', token);
                        if (gistId) {
                            localStorage.setItem('priorityflow.gist.id', gistId);
                        }
                        await this.fetchGitHubUser(token);
                        await this.syncWithGist();
                        modal.remove();
                    }
                });
            }

            async fetchGitHubUser(token) {
                try {
                    const response = await fetch('https://api.github.com/user', {
                        headers: {'Authorization': `token ${token}`}
                    });
                    if (response.ok) {
                        const user = await response.json();
                        this.userGitHub = {
                            username: user.login,
                            avatar: user.avatar_url
                        };
                        this.renderUserInfo();
                    }
                } catch (err) {
                    console.error('GitHub fetch error:', err);
                }
            }

            renderUserInfo() {
                const container = document.getElementById('userInfo');
                if (this.userGitHub) {
                    container.innerHTML = `
                        <img src="${this.userGitHub.avatar}" alt="${this.userGitHub.username}" class="user-avatar">
                        <div class="user-name">${this.userGitHub.username}</div>
                    `;
                }
            }

            syncWithGistDebounced = this.debounce(() => this.syncWithGist(), 3000);

            async syncWithGist() {
                const token = localStorage.getItem('priorityflow.gist.token');
                if (!token) return;

                const syncStatus = document.getElementById('syncStatus');
                const syncDot = syncStatus.querySelector('.sync-dot');

                syncDot.className = 'sync-dot syncing';

                try {
                    let gistId = localStorage.getItem('priorityflow.gist.id');

                    if (!gistId) {
                        const gists = await fetch('https://api.github.com/user/gists', {
                            headers: {'Authorization': `token ${token}`}
                        }).then(r => r.json());

                        const priorityFlowGist = gists.find(g => g.description === 'priorityflow-sync.json');
                        if (priorityFlowGist) {
                            gistId = priorityFlowGist.id;
                            localStorage.setItem('priorityflow.gist.id', gistId);
                        } else {
                            const newGist = await fetch('https://api.github.com/user/gists', {
                                method: 'POST',
                                headers: {
                                    'Authorization': `token ${token}`,
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({
                                    description: 'priorityflow-sync.json',
                                    public: false,
                                    files: {
                                        'priorityflow.json': {
                                            content: JSON.stringify({tasks: this.tasks, lastModified: Date.now()})
                                        }
                                    }
                                })
                            }).then(r => r.json());

                            gistId = newGist.id;
                            localStorage.setItem('priorityflow.gist.id', gistId);
                        }
                    }

                    const gistData = await fetch(`https://api.github.com/gists/${gistId}`, {
                        headers: {'Authorization': `token ${token}`}
                    }).then(r => r.json());

                    const remoteContent = gistData.files['priorityflow.json'].content;
                    const remoteData = JSON.parse(remoteContent);

                    const localData = {tasks: this.tasks, lastModified: Date.now()};

                    if (!remoteData.lastModified || remoteData.lastModified < localData.lastModified) {
                        await fetch(`https://api.github.com/gists/${gistId}`, {
                            method: 'PATCH',
                            headers: {
                                'Authorization': `token ${token}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                files: {
                                    'priorityflow.json': {
                                        content: JSON.stringify(localData)
                                    }
                                }
                            })
                        });
                    } else if (remoteData.lastModified > localData.lastModified) {
                        this.tasks = remoteData.tasks;
                        this.saveTasks();
                        this.renderAllViews();
                    }

                    syncDot.className = 'sync-dot connected';
                } catch (err) {
                    console.error('Sync error:', err);
                    syncDot.className = 'sync-dot error';
                    setTimeout(() => {
                        syncDot.className = 'sync-dot';
                    }, 3000);
                }
            }

            showMorningModal() {
                const modalsContainer = document.getElementById('modals');
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.style.zIndex = '2000';

                overlay.innerHTML = `
                    <div class="morning-modal">

                            <div class="morning-subtitle">Let's set up your day</div>
                        </div>

                        <form id="morningForm">
                            <div class="form-group">
                                <label class="form-label">How are you feeling?</label>
                                <div class="mood-selector">
                                    <button type="button" class="mood-btn" data-mood="rough" title="Rough">😫</button>
                                    <button type="button" class="mood-btn" data-mood="low" title="Low">😕</button>
                                    <button type="button" class="mood-btn" data-mood="okay" title="Okay">😐</button>
                                    <button type="button" class="mood-btn" data-mood="good" title="Good">😊</button>
                                    <button type="button" class="mood-btn" data-mood="fired" title="Fired Up">🔥</button>
                                </div>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Energy level (1-5)</label>
                                <div class="energy-slider">
                                    <input type="range" class="energy-input" id="energySlider" min="1" max="5" value="3">
                                    <div class="energy-labels">
                                        <span>Low</span>
                                        <span>High</span>
                                    </div>
                                </div>
                            </div>

                            <div class="form-group">
                                <label class="form-label">What's the ONE thing you want to accomplish today?</label>
                                <input type="text" class="intention-input" id="intentionInput" placeholder="Your primary focus for today...">
                            </div>

                            <div class="morning-buttons">
                                <button type="submit" class="morning-start-btn">Start My Day</button>
                                <button type="button" class="morning-skip-btn" id="skipMorningBtn">Skip for now</button>
                            </div>
                        </form>
                    </div>
                `;

                modalsContainer.appendChild(overlay);

                let selectedMood = null;

                const form = overlay.querySelector('#morningForm');
                const moodBtns = overlay.querySelectorAll('.mood-btn');
                const skipBtn = overlay.querySelector('#skipMorningBtn');

                moodBtns.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.preventDefault();
                        moodBtns.forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        selectedMood = btn.dataset.mood;
                    });
                });

                skipBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const today = this.getDateString(new Date());
                    let completed = localStorage.getItem('priorityflow.morning.v5') || '';
                    completed += (completed ? ',' : '') + today;
                    localStorage.setItem('priorityflow.morning.v5', completed);
                    overlay.remove();
                });

                form.addEventListener('submit', (e) => {
                    e.preventDefault();

                    const energy = parseInt(document.getElementById('energySlider').value);
                    const intention = document.getElementById('intentionInput').value;
                    const today = this.getDateString(new Date());

                    const morningData = {
                        mood: selectedMood,
                        energy,
                        intention,
                        date: today
                    };

                    let completed = localStorage.getItem('priorityflow.morning.v5') || '';
                    completed += (completed ? ',' : '') + today;
                    localStorage.setItem('priorityflow.morning.v5', completed);

                    if (intention) {
                        this.morning = morningData;
                        this.showIntentionBanner(intention);
                    }

                    if (energy <= 2) {
                        this.adjustForLowEnergy();
                    } else if (energy >= 4) {
                        this.adjustForHighEnergy();
                    }

                    overlay.remove();
                    this.renderAllViews();
                });
            }

            showIntentionBanner(intention) {
                const banner = document.getElementById('intentionBanner');
                const bannerText = document.getElementById('intentionText');
                if (banner && bannerText) {
                    bannerText.textContent = intention;
                    banner.classList.remove('hidden');
                }
            }

            adjustForLowEnergy() {
                const lightTasks = this.tasks.filter(t => !t.done && (t.energy || 2) === 1);
                lightTasks.forEach((t, i) => {
                    t.manualRank = i;
                });
            }

            adjustForHighEnergy() {
                const deepTasks = this.tasks.filter(t => !t.done && (t.energy || 2) === 3);
                deepTasks.forEach((t, i) => {
                    t.manualRank = i;
                });
            }

            toggleTheme() {
                const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('priorityflow.theme', newTheme);
            }

            // ============= UTILITIES =============
            getDateString(date) {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            }

            escapeHtml(text) {
                const map = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;'
                };
                return text.replace(/[&<>"']/g, m => map[m]);
            }

            debounce(func, delay) {
                let timeout;
                return (...args) => {
                    clearTimeout(timeout);
                    timeout = setTimeout(() => func(...args), delay);
                };
            }
        }

        // ============= INITIALIZE APP =============
        document.addEventListener('DOMContentLoaded', () => {
            new PriorityFlowApp();
        });
    </script>
